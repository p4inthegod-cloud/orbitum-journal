<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Journal — ORBITUM</title>

  <!-- CSS -->
  <link rel="stylesheet" href="journal.css" />

  <!-- (опционально) Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- JS -->
  <script defer src="journal.js"></script>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <div>
        <div class="title">Journal</div>
        <div class="subtitle">Track your trades. Understand your patterns.</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="card">
      <div class="card-title">Overview</div>
      <div id="stats" class="stats"></div>
    </div>

    <!-- ADD TRADE -->
    <div class="card">
      <div class="card-title">Add trade</div>

      <form id="tradeForm">

        <div class="form-grid">
          <div>
            <label>Pair</label>
            <input name="pair" placeholder="BTCUSDT" required />
          </div>

          <div>
            <label>PNL ($)</label>
            <input name="pnl" placeholder="50 or -25" required />
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn">Add trade</button>
        </div>

      </form>
    </div>

    <!-- TRADES LIST -->
    <div class="card">
      <div class="card-title">Trades</div>

      <div id="trades"></div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="empty hidden">
        <div class="empty-title">No trades yet</div>
        <div class="empty-text">
          Add your first trade to start tracking your performance.
        </div>
      </div>
    </div>

  </div>

</body>
</html>
