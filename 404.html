<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM · 404</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap">
    <!-- Global design tokens and premium styles -->
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="orbitum-premium.css">
<style>
/* Reset and basic layout */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg-main);color:var(--t);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,color-mix(in srgb,var(--accent), transparent 80%),transparent 60%);pointer-events:none;}
.wrap{text-align:center;position:relative;z-index:1;padding:40px 20px;}
.code{font-family:'Bebas Neue',sans-serif;font-size:120px;line-height:1;color:var(--accent);opacity:0.15;letter-spacing:8px;margin-bottom:-20px;}
.title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--t);margin-bottom:12px;}
.sub{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1px;line-height:1.8;margin-bottom:32px;}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{padding:var(--space-1) var(--space-3);border-radius:var(--radius);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;text-decoration:none;text-transform:uppercase;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);}
.btn-primary:hover{background:color-mix(in srgb,var(--accent) 80%, #fff 20%);box-shadow:0 6px 24px rgba(255,106,0,0.4);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(8px);}
.btn-ghost:hover{color:var(--t);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:40px;}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:5px;color:var(--accent);}
</style>
<link rel="stylesheet" href="/redesign.css">
</head>
<body class="page-404 redesign">
<div class="wrap">
  <div class="logo-wrap">
    <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="3.2" fill="#FF3923"/>
      <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="#FF3923" stroke-width="1.2" opacity="0.7" transform="rotate(-30 11 11)" fill="none"/>
      <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="rgba(255,255,255,0.25)" stroke-width="1" transform="rotate(60 11 11)" fill="none"/>
    </svg>
    <span class="logo-text">ORBITUM</span>
  </div>
  <div class="code">404</div>
  <div class="title">Page not found</div>
  <div class="sub">The page you're looking for doesn't exist<br>or has been moved.</div>
  <div class="links">
    <a href="/" class="btn btn-primary">Go to home</a>
    <a href="/journal" class="btn btn-ghost">Open journal</a>
    <a href="/login" class="btn btn-ghost">Sign in</a>
  </div>
</div>
</body>
</html>
