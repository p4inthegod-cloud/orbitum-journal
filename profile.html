<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM — Профиль трейдера</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// ═══════════════════════════════════════════════
// DEEP ANALYTICS
// ═══════════════════════════════════════════════
function renderAnalyticsTab(trades, tab){
  if(!trades.length) return '<div class="an-empty">Недостаточно данных — нужны сделки</div>';

  if(tab==='setups'){
    // Breakdown by setup type
    const pm={};
    trades.forEach(t=>{
      const k=t.setup_type||'Без сетапа';
      if(!pm[k])pm[k]={n:0,w:0,pnl:0};
      pm[k].n++;
      if(t.result==='win')pm[k].w++;
      pm[k].pnl+=(t.pnl_pct||0);
    });
    const setups=Object.keys(pm).map(name=>({
      name,n:pm[name].n,
      wr:Math.round(pm[name].w/pm[name].n*100),
      pnl:pm[name].pnl,
      avg:pm[name].pnl/pm[name].n
    })).sort((a,b)=>b.n-a.n);
    const maxN=Math.max(...setups.map(s=>s.n));
    
    // Avg win vs loss
    const wins=trades.filter(t=>t.result==='win');
    const losses=trades.filter(t=>t.result==='loss');
    const avgW=wins.length?wins.reduce((s,t)=>s+(t.pnl_pct||0),0)/wins.length:0;
    const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+(t.pnl_pct||0),0)/losses.length):0;
    const rr=avgL>0?(avgW/avgL).toFixed(2):'∞';
    const expectancy=avgW*(wins.length/trades.length)-avgL*(losses.length/trades.length);
    const profitFactor=avgL>0?((wins.length*avgW)/(losses.length*avgL)).toFixed(2):'∞';

    return `
    <div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">Ключевые метрики</div>
        ${[
          {l:'Средний выигрыш',v:'+'+(avgW.toFixed(2))+'%',c:'var(--g)'},
          {l:'Средний убыток',v:'-'+(avgL.toFixed(2))+'%',c:'var(--r)'},
          {l:'Risk:Reward',v:rr,c:'var(--a)'},
          {l:'Profit Factor',v:profitFactor,c:parseFloat(profitFactor)>=1?'var(--g)':'var(--r)'},
          {l:'Матожидание',v:(expectancy>=0?'+':'')+expectancy.toFixed(2)+'%',c:expectancy>=0?'var(--g)':'var(--r)'},
        ].map(r=>`<div class="an-stat-row"><span class="an-stat-label">${r.l}</span><span class="an-stat-val" style="color:${r.c}">${r.v}</span></div>`).join('')}
      </div>
      <div class="an-card" style="grid-column:span 2">
        <div class="an-card-title">Результативность по сетапам</div>
        ${setups.map(s=>{
          const barColor=s.wr>=60?'var(--g)':s.wr>=45?'var(--a)':'var(--r)';
          return `<div class="an-bar-row">
            <div class="an-bar-head">
              <span class="an-bar-label">${s.name} <span style="color:var(--m);font-size:8px">(${s.n} сд.)</span></span>
              <span class="an-bar-meta">WR: <span style="color:${barColor}">${s.wr}%</span> · avg: <span style="color:${s.avg>=0?'var(--g)':'var(--r)'}">${s.avg>=0?'+':''}${s.avg.toFixed(1)}%</span></span>
            </div>
            <div class="an-bar-track"><div class="an-bar-fill" style="width:${s.wr}%;background:${barColor}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if(tab==='time'){
    // Day of week analysis
    const days=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const byDow={};
    trades.forEach(t=>{
      const d=new Date(t.created_at).getDay();
      if(!byDow[d])byDow[d]={n:0,w:0,pnl:0};
      byDow[d].n++;
      if(t.result==='win')byDow[d].w++;
      byDow[d].pnl+=(t.pnl_pct||0);
    });
    const activeDays=Object.keys(byDow).map(d=>({
      day:days[d],n:byDow[d].n,
      wr:Math.round(byDow[d].w/byDow[d].n*100),
      pnl:byDow[d].pnl
    })).sort((a,b)=>[1,2,3,4,5,6,0].indexOf(parseInt(Object.keys(byDow).find(k=>days[k]===a.day)))-[1,2,3,4,5,6,0].indexOf(parseInt(Object.keys(byDow).find(k=>days[k]===b.day))));
    
    // Monthly P&L
    const byMonth={};
    trades.forEach(t=>{
      const k=new Date(t.created_at).toLocaleDateString('ru-RU',{month:'short',year:'2-digit'});
      if(!byMonth[k])byMonth[k]=0;
      byMonth[k]+=(t.pnl_pct||0);
    });
    const months=Object.keys(byMonth).slice(-6);
    const maxAbs=Math.max(...months.map(m=>Math.abs(byMonth[m]))||[1]);

    return `
    <div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">По дням недели</div>
        ${activeDays.length?activeDays.map(d=>{
          const c=d.wr>=55?'var(--g)':d.wr>=45?'var(--a)':'var(--r)';
          return `<div class="an-stat-row">
            <span class="an-stat-label">${d.day} <span style="color:var(--m);font-size:8px">(${d.n})</span></span>
            <span class="an-stat-val" style="color:${c}">${d.wr}% WR</span>
          </div>`;
        }).join(''):'<div class="an-empty">Нет данных</div>'}
      </div>
      <div class="an-card" style="grid-column:span 2">
        <div class="an-card-title">P&L по месяцам (последние 6)</div>
        ${months.length?months.map(m=>{
          const v=byMonth[m];
          const pct=Math.abs(v)/maxAbs*100;
          const c=v>=0?'var(--g)':'var(--r)';
          return `<div class="an-bar-row">
            <div class="an-bar-head">
              <span class="an-bar-label">${m}</span>
              <span class="an-bar-meta" style="color:${c}">${v>=0?'+':''}${v.toFixed(1)}%</span>
            </div>
            <div class="an-bar-track"><div class="an-bar-fill" style="width:${pct}%;background:${c}"></div></div>
          </div>`;
        }).join(''):'<div class="an-empty">Нет данных</div>'}
      </div>
    </div>`;
  }

  if(tab==='streaks'){
    // Win/loss streaks analysis
    const sorted=[...trades].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    let maxWin=0,maxLoss=0,curWin=0,curLoss=0;
    let currentStreak=0,currentType='';
    sorted.forEach(t=>{
      if(t.result==='win'){curWin++;curLoss=0;if(curWin>maxWin)maxWin=curWin;}
      else if(t.result==='loss'){curLoss++;curWin=0;if(curLoss>maxLoss)maxLoss=curLoss;}
    });
    // After last trade
    if(sorted.length){
      const last=sorted[sorted.length-1];
      if(last.result==='win'){currentStreak=curWin;currentType='win';}
      else if(last.result==='loss'){currentStreak=curLoss;currentType='loss';}
    }
    
    // Recovery after loss streak
    const afterLoss=[];
    for(let i=1;i<sorted.length;i++){
      if(sorted[i-1].result==='loss'&&sorted[i].result==='win') afterLoss.push(sorted[i]);
    }
    const recoveryWR=afterLoss.length?Math.round(afterLoss.filter(t=>t.result==='win').length/afterLoss.length*100):null;

    // Consecutive results distribution
    let streaks={win:[],loss:[]};let cw=0,cl=0;
    sorted.forEach((t,i)=>{
      if(t.result==='win'){cw++;if(cl>0){streaks.loss.push(cl);cl=0;}}
      else{cl++;if(cw>0){streaks.win.push(cw);cw=0;}}
    });
    if(cw>0)streaks.win.push(cw);if(cl>0)streaks.loss.push(cl);
    const avgWinStreak=streaks.win.length?(streaks.win.reduce((s,v)=>s+v,0)/streaks.win.length).toFixed(1):0;
    const avgLossStreak=streaks.loss.length?(streaks.loss.reduce((s,v)=>s+v,0)/streaks.loss.length).toFixed(1):0;

    return `
    <div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">Серии</div>
        ${[
          {l:'Макс. серия побед',v:maxWin+' подряд',c:'var(--g)'},
          {l:'Макс. серия убытков',v:maxLoss+' подряд',c:'var(--r)'},
          {l:'Текущая серия',v:currentStreak+(currentType==='win'?' 🔥':currentType==='loss'?' 💀':''),c:currentType==='win'?'var(--g)':currentType==='loss'?'var(--r)':'var(--m)'},
          {l:'Ср. серия побед',v:avgWinStreak,c:'var(--g)'},
          {l:'Ср. серия убытков',v:avgLossStreak,c:'var(--r)'},
        ].map(r=>`<div class="an-stat-row"><span class="an-stat-label">${r.l}</span><span class="an-stat-val" style="color:${r.c}">${r.v}</span></div>`).join('')}
      </div>
      <div class="an-card">
        <div class="an-card-title">Психология серий</div>
        ${[
          {l:'Сделок после убытка',v:afterLoss.length,c:'var(--m)'},
          {l:'WR после убытка',v:recoveryWR!==null?recoveryWR+'%':'—',c:recoveryWR>=50?'var(--g)':'var(--r)'},
          {l:'Риск реванша',v:recoveryWR!==null&&recoveryWR<45?'⚠️ Высокий':'✅ Норма',c:recoveryWR!==null&&recoveryWR<45?'var(--r)':'var(--g)'},
        ].map(r=>`<div class="an-stat-row"><span class="an-stat-label">${r.l}</span><span class="an-stat-val" style="color:${r.c}">${r.v}</span></div>`).join('')}
        <div style="margin-top:12px;padding:10px;background:rgba(255,255,255,0.02);border-radius:6px;font-family:var(--font-mono);font-size:9px;color:var(--m);line-height:1.6">
          ${recoveryWR!==null&&recoveryWR<45?'⚠️ После убытка WR падает — возможна торговля из мести. Сделай паузу перед следующей сделкой.':recoveryWR!==null&&recoveryWR>=55?'✅ После убытка ты торгуешь стабильно — хороший психологический контроль.':'Недостаточно данных для анализа паттернов мести.'}
        </div>
      </div>
      <div class="an-card">
        <div class="an-card-title">Консистентность</div>
        ${(()=>{
          const totalDays=Object.keys(trades.reduce((acc,t)=>{acc[new Date(t.created_at).toDateString()]=1;return acc;},{})).length;
          const firstDate=sorted.length?new Date(sorted[0].created_at):new Date();
          const calendarDays=Math.max(1,Math.round((new Date()-firstDate)/(1000*60*60*24)));
          const activity=Math.round(totalDays/Math.min(calendarDays,90)*100);
          const avgPerDay=sorted.length?(sorted.length/totalDays).toFixed(1):0;
          return [
            {l:'Активных дней',v:totalDays,c:'var(--a)'},
            {l:'Сделок в день',v:avgPerDay,c:avgPerDay>5?'var(--r)':avgPerDay>=1?'var(--g)':'var(--m)'},
            {l:'Активность (90д)',v:activity+'%',c:activity>=60?'var(--g)':activity>=30?'var(--a)':'var(--r)'},
          ].map(r=>`<div class="an-stat-row"><span class="an-stat-label">${r.l}</span><span class="an-stat-val" style="color:${r.c}">${r.v}</span></div>`).join('');
        })()}
      </div>
    </div>`;
  }

  if(tab==='psych'){
    const avg=(arr,key)=>{const v=arr.map(t=>t[key]).filter(x=>x!=null);return v.length?v.reduce((s,x)=>s+x,0)/v.length:5;};
    const wins=trades.filter(t=>t.result==='win');
    const losses=trades.filter(t=>t.result==='loss');
    const emotions=['emotion_conf','emotion_fear','emotion_greed','emotion_calm'];
    const labels={emotion_conf:'Уверенность',emotion_fear:'Страх',emotion_greed:'Жадность',emotion_calm:'Фокус'};
    const icons={emotion_conf:'💪',emotion_fear:'😰',emotion_greed:'🤑',emotion_calm:'🎯'};

    const rows=emotions.map(key=>{
      const all=avg(trades,key),w=avg(wins,key),l=avg(losses,key);
      const diff=w-l;
      return {key,label:labels[key],icon:icons[key],all,win:w,loss:l,diff};
    });

    // Best emotion state for trading
    const bestState=rows.filter(r=>Math.abs(r.diff)>0.5).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));

    return `
    <div class="an-grid">
      <div class="an-card" style="grid-column:span 2">
        <div class="an-card-title">Эмоции при победах vs убытках</div>
        <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px">
          <div></div>
          <div style="font-family:var(--font-mono);font-size:8px;color:var(--m);text-align:center">СРЕДНЕЕ</div>
          <div style="font-family:var(--font-mono);font-size:8px;color:var(--g);text-align:center">ПОБЕДЫ</div>
          <div style="font-family:var(--font-mono);font-size:8px;color:var(--r);text-align:center">УБЫТКИ</div>
        </div>
        ${rows.map(r=>`
          <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
            <div style="font-family:var(--font-body);font-size:12px">${r.icon} ${r.label}</div>
            <div style="font-family:var(--font-mono);font-size:11px;text-align:center;color:var(--m2)">${r.all.toFixed(1)}</div>
            <div style="font-family:var(--font-mono);font-size:11px;text-align:center;color:var(--g)">${r.win.toFixed(1)}</div>
            <div style="font-family:var(--font-mono);font-size:11px;text-align:center;color:var(--r)">${r.loss.toFixed(1)}</div>
          </div>
        `).join('')}
      </div>
      <div class="an-card">
        <div class="an-card-title">Ключевые инсайты</div>
        ${bestState.length?bestState.map(r=>{
          const isPositive=r.diff>0;
          return `<div style="padding:8px;background:rgba(255,255,255,0.02);border-radius:6px;margin-bottom:6px;font-family:var(--font-mono);font-size:9px;line-height:1.6;color:var(--m2)">
            ${r.icon} <strong style="color:var(--t)">${r.label}</strong> ${isPositive?'выше при победах':'выше при убытках'} на <span style="color:${isPositive?'var(--g)':'var(--r)'}">${Math.abs(r.diff).toFixed(1)}</span> пункта
          </div>`;
        }).join(''):`<div style="font-family:var(--font-mono);font-size:9px;color:var(--m);line-height:1.6">Нужно больше сделок с заполненными эмоциями</div>`}
      </div>
    </div>`;
  }
  return '<div class="an-empty">Вкладка в разработке</div>';
}

function switchAnalyticsTab(tab, btn){
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const el=document.getElementById('analytics-content');
  if(el) el.innerHTML=renderAnalyticsTab(window._profileTrades||[],tab);
}

// ═══════════════════════════════════════════════
// IDEAS SYSTEM
// ═══════════════════════════════════════════════
let ideaType='bullish';
async function loadIdeas(userId){
  const el=document.getElementById('ideas-feed');
  if(!el)return;
  try{
    const {data,error}=await sb.from('ideas').select('*').eq('user_id',userId).order('created_at',{ascending:false});
    if(error||!data||!data.length){el.innerHTML='<div class="feed-empty">Идей пока нет. '+(isOwnProfile?'Опубликуй первый разбор!':'')+'</div>';return;}
    el.innerHTML=data.map(idea=>renderIdeaCard(idea)).join('');
  } catch(e){
    el.innerHTML='<div class="feed-empty">Нет таблицы ideas — создай её в Supabase</div>';
  }
}

function renderIdeaCard(idea){
  const typeLabel={bullish:'📈 ЛОНГ',bearish:'📉 ШОРТ',neutral:'➡️ НЕЙТРАЛЬНО'};
  const typeClass={bullish:'bullish',bearish:'bearish',neutral:'neutral'};
  const statusLabel={active:'🟢 Активна',closed:'⚪ Закрыта',pending:'🟡 Ожидание'};
  const d=new Date(idea.created_at).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
  const shareUrl=window.location.origin+window.location.pathname+'?id='+(idea.user_id||'')+'#idea-'+(idea.id||'');
  return `<div class="idea-card" id="idea-${idea.id||''}">
    <div class="idea-top">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="idea-pair">${idea.pair||'?'}</span>
          <span class="idea-type ${typeClass[idea.direction]||'neutral'}">${typeLabel[idea.direction]||'РАЗБОР'}</span>
          <span class="idea-status ${idea.status||'active'}">${statusLabel[idea.status||'active']}</span>
        </div>
        <div class="idea-title">${idea.title||''}</div>
      </div>
    </div>
    <div class="idea-body">${(idea.body||'').replace(/
/g,'<br>')}</div>
    ${(idea.entry||idea.tp||idea.sl)?`<div class="idea-targets">
      ${idea.entry?`<span class="idea-target entry">🎯 Вход: ${idea.entry}</span>`:''}
      ${idea.tp?`<span class="idea-target tp">✅ TP: ${idea.tp}</span>`:''}
      ${idea.sl?`<span class="idea-target sl">❌ SL: ${idea.sl}</span>`:''}
    </div>`:''}
    <div class="idea-footer">
      <span class="idea-date">${d}</span>
      <button class="idea-share-btn" onclick="copyIdeaLink('${shareUrl}')">🔗 Поделиться</button>
      ${isOwnProfile?`<button class="idea-share-btn" style="color:var(--r)" onclick="deleteIdea('${idea.id}')">✕ Удалить</button>`:''}
    </div>
  </div>`;
}

function copyIdeaLink(url){
  navigator.clipboard.writeText(url).then(()=>{
    const btn=event.target;const orig=btn.textContent;
    btn.textContent='✅ Скопировано!';setTimeout(()=>btn.textContent=orig,2000);
  });
}

async function deleteIdea(id){
  if(!confirm('Удалить идею?'))return;
  await sb.from('ideas').delete().eq('id',id);
  loadIdeas(profileUser?.id||currentUser?.id);
}

let _ideaTypeSelected='bullish';
function openIdeaModal(){
  _ideaTypeSelected='bullish';
  document.querySelectorAll('.idea-type-btn').forEach(b=>b.classList.remove('sel-bull','sel-bear','sel-neut'));
  const b=document.getElementById('ib-bull');if(b)b.classList.add('sel-bull');
  const m=document.getElementById('idea-modal');if(m)m.classList.add('open');
}
function closeIdeaModal(){const m=document.getElementById('idea-modal');if(m)m.classList.remove('open');}
function setIdeaType(t,btn){
  _ideaTypeSelected=t;
  document.querySelectorAll('.idea-type-btn').forEach(b=>b.classList.remove('sel-bull','sel-bear','sel-neut'));
  const cls=t==='bullish'?'sel-bull':t==='bearish'?'sel-bear':'sel-neut';
  if(btn)btn.classList.add(cls);
}
async function submitIdea(){
  const pair=(document.getElementById('idea-pair-input')||{}).value||'';
  const title=(document.getElementById('idea-title-input')||{}).value||'';
  const body=(document.getElementById('idea-body-input')||{}).value||'';
  const entry=(document.getElementById('idea-entry-input')||{}).value||null;
  const tp=(document.getElementById('idea-tp-input')||{}).value||null;
  const sl=(document.getElementById('idea-sl-input')||{}).value||null;
  if(!pair||!title||!body){alert('Заполни пару, заголовок и описание');return;}
  const uid=currentUser?.id;if(!uid){alert('Нужно войти');return;}
  const {error}=await sb.from('ideas').insert({user_id:uid,pair:pair.toUpperCase(),title,body,direction:_ideaTypeSelected,entry,tp,sl,status:'active'});
  if(error){alert('Ошибка: '+error.message);return;}
  closeIdeaModal();
  loadIdeas(uid);
}

</script>
<style>
:root{
  --a:#e8722a;--a2:rgba(232,114,42,0.12);--a3:rgba(232,114,42,0.35);
  --bg:#05070a;--bg2:rgba(255,255,255,0.025);--bg3:rgba(255,255,255,0.04);
  --bd:rgba(255,255,255,0.07);--t:#ebebeb;--m:rgba(255,255,255,0.4);--m2:rgba(255,255,255,0.6);
  --g:#34d058;--r:#ff4d4d;--y:#f5a623;
  --gd:rgba(52,208,88,0.08);--rd:rgba(255,77,77,0.08);
  --font-mono:'JetBrains Mono',monospace;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--t);font-family:var(--font-body);min-height:100vh;}

/* ── BG ATMOSPHERE ── */
.bg-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.bg-orb1{
  position:absolute;width:800px;height:800px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,114,42,0.055),transparent 60%);
  filter:blur(120px);top:-300px;left:50%;transform:translateX(-50%);
}
.bg-orb2{
  position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(52,208,88,0.025),transparent 65%);
  filter:blur(100px);bottom:-200px;right:-100px;
}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── TOP NAV ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(5,7,10,0.85);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  height:54px;display:flex;align-items:center;
  padding:0 32px;gap:12px;
}
.tb-logo{
  font-family:var(--font-display);font-size:20px;letter-spacing:5px;
  color:var(--t);text-decoration:none;
  text-shadow:0 0 20px rgba(255,255,255,0.1);
}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--a);box-shadow:0 0 8px var(--a),0 0 16px rgba(232,114,42,0.4);}
.tb-spacer{flex:1;}
.tb-back{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:8px;border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);color:var(--m);
  font-family:var(--font-mono);font-size:9px;letter-spacing:1px;
  text-decoration:none;transition:all 0.15s;
}
.tb-back:hover{border-color:var(--a3);color:var(--a);background:var(--a2);}
.tb-badge{
  background:rgba(232,114,42,0.1);border:1px solid rgba(232,114,42,0.25);
  border-radius:6px;padding:3px 10px;
  font-family:var(--font-mono);font-size:8px;color:var(--a);letter-spacing:2px;
}
.tb-share-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  border-radius:8px;background:var(--a2);border:1px solid var(--a3);
  color:var(--a);font-family:var(--font-mono);font-size:9px;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;
}
.tb-share-btn:hover{background:rgba(232,114,42,0.2);}

/* ── LAYOUT ── */
.wrap{max-width:960px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1;}

/* ── HERO SECTION ── */
.hero{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.018);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;padding:32px;margin-bottom:16px;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,114,42,0.6),rgba(232,114,42,0.3),transparent);
}
.hero::after{
  content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;
  border-radius:50%;background:radial-gradient(circle,rgba(232,114,42,0.07),transparent 65%);
  pointer-events:none;
}
.hero-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;}
.hero-avatar{
  width:72px;height:72px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(232,114,42,0.3),rgba(232,114,42,0.1));
  border:2px solid rgba(232,114,42,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:32px;color:var(--a);
  box-shadow:0 0 30px rgba(232,114,42,0.2),inset 0 0 20px rgba(232,114,42,0.05);
  position:relative;z-index:1;
}
.hero-info{flex:1;position:relative;z-index:1;}
.hero-name{
  font-family:var(--font-display);font-size:32px;letter-spacing:4px;
  color:var(--t);line-height:1;margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,255,255,0.1);
}
.hero-handle{font-family:var(--font-mono);font-size:10px;color:var(--m);letter-spacing:1.5px;margin-bottom:10px;}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;}
.hbadge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-family:var(--font-mono);font-size:8px;
  letter-spacing:0.5px;transition:all 0.2s;
}
.hbadge-gold{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--y);box-shadow:0 0 10px rgba(245,166,35,0.1);}
.hbadge-green{background:rgba(52,208,88,0.08);border:1px solid rgba(52,208,88,0.25);color:var(--g);}
.hbadge-orange{background:rgba(232,114,42,0.1);border:1px solid rgba(232,114,42,0.3);color:var(--a);}
.hbadge-blue{background:rgba(52,152,219,0.08);border:1px solid rgba(52,152,219,0.25);color:#3498db;}
.hero-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;position:relative;z-index:1;}
.hero-stat-big{text-align:right;}
.hsb-val{
  font-family:var(--font-display);font-size:38px;letter-spacing:2px;
  text-shadow:0 0 20px currentColor;
}
.hsb-val.pos{color:var(--g);text-shadow:0 0 24px rgba(52,208,88,0.4);}
.hsb-val.neg{color:var(--r);}
.hsb-label{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:2px;text-align:right;}
.hero-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.hm-cell{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;}
.hm-label{font-family:var(--font-mono);font-size:7px;color:var(--m);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.hm-val{font-family:var(--font-mono);font-size:18px;font-weight:500;}
.hm-val.g{color:var(--g);text-shadow:0 0 12px rgba(52,208,88,0.35);}
.hm-val.a{color:var(--a);text-shadow:0 0 12px rgba(232,114,42,0.35);}
.hm-val.y{color:var(--y);text-shadow:0 0 12px rgba(245,166,35,0.3);}

/* ── ANALYTICS TABS ── */
.analytics-tabs{display:flex;gap:4px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:3px;width:fit-content;}
.atab{padding:5px 14px;border-radius:5px;border:none;background:transparent;color:var(--m);font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
.atab.active{background:rgba(232,114,42,0.12);border:1px solid rgba(232,114,42,0.25);color:var(--a);}
.atab:hover:not(.active){color:var(--m2);}

/* Analytics content */
.an-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.an-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;}
.an-card-title{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
.an-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.an-stat-row:last-child{border-bottom:none;}
.an-stat-label{font-family:var(--font-mono);font-size:10px;color:var(--m2);}
.an-stat-val{font-family:var(--font-mono);font-size:11px;font-weight:500;}
.an-bar-row{margin-bottom:8px;}
.an-bar-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.an-bar-label{font-family:var(--font-mono);font-size:9px;color:var(--m2);}
.an-bar-meta{font-family:var(--font-mono);font-size:9px;color:var(--m);}
.an-bar-track{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.an-bar-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.an-empty{text-align:center;padding:30px;font-family:var(--font-mono);font-size:9px;color:var(--m);}

/* ── IDEAS / РАЗБОРЫ ── */
.ideas-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.idea-new-btn{padding:6px 14px;border-radius:7px;border:1px solid rgba(232,114,42,0.3);background:rgba(232,114,42,0.08);color:var(--a);font-family:var(--font-mono);font-size:9px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.idea-new-btn:hover{background:rgba(232,114,42,0.15);border-color:var(--a3);}
.idea-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:18px;margin-bottom:10px;transition:border-color 0.2s;}
.idea-card:hover{border-color:rgba(255,255,255,0.1);}
.idea-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.idea-type{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-family:var(--font-mono);font-size:8px;letter-spacing:1px;flex-shrink:0;}
.idea-type.bullish{background:rgba(52,208,88,0.1);border:1px solid rgba(52,208,88,0.25);color:var(--g);}
.idea-type.bearish{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);color:var(--r);}
.idea-type.neutral{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--m2);}
.idea-pair{font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--t);}
.idea-title{font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--t);margin-bottom:6px;flex:1;}
.idea-body{font-family:var(--font-body);font-size:12px;color:rgba(255,255,255,0.65);line-height:1.7;margin-bottom:12px;}
.idea-targets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.idea-target{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-family:var(--font-mono);font-size:9px;}
.idea-target.tp{background:rgba(52,208,88,0.08);border:1px solid rgba(52,208,88,0.2);color:var(--g);}
.idea-target.sl{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);color:var(--r);}
.idea-target.entry{background:rgba(232,114,42,0.08);border:1px solid rgba(232,114,42,0.2);color:var(--a);}
.idea-footer{display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,0.05);padding-top:10px;}
.idea-date{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1px;}
.idea-share-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--m);font-family:var(--font-mono);font-size:8px;cursor:pointer;transition:all 0.15s;}
.idea-share-btn:hover{border-color:var(--a3);color:var(--a);}
.idea-status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-family:var(--font-mono);font-size:8px;}
.idea-status.active{background:rgba(52,208,88,0.08);color:var(--g);}
.idea-status.closed{background:rgba(255,255,255,0.04);color:var(--m);}
.idea-status.pending{background:rgba(245,166,35,0.08);color:var(--y);}

/* Idea modal */
.idea-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:600;align-items:center;justify-content:center;padding:16px;}
.idea-modal.open{display:flex;}
.idea-box{background:#0d0f14;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;}
.idea-box-title{font-family:var(--font-display);font-size:18px;letter-spacing:3px;color:var(--a);margin-bottom:20px;}
.idea-box-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--m);font-size:22px;cursor:pointer;line-height:1;}
.idea-box-close:hover{color:var(--r);}
.idea-field{margin-bottom:12px;}
.idea-field label{display:block;font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.idea-field input,.idea-field select,.idea-field textarea{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:9px 12px;color:var(--t);font-family:var(--font-mono);font-size:11px;outline:none;transition:border-color 0.15s;}
.idea-field input:focus,.idea-field select:focus,.idea-field textarea:focus{border-color:rgba(232,114,42,0.4);}
.idea-field textarea{resize:vertical;min-height:90px;}
.idea-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.idea-type-btns{display:flex;gap:6px;}
.idea-type-btn{flex:1;padding:8px;border-radius:7px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--m);font-family:var(--font-mono);font-size:9px;cursor:pointer;transition:all 0.15s;text-align:center;}
.idea-type-btn.sel-bull{background:rgba(52,208,88,0.1);border-color:rgba(52,208,88,0.3);color:var(--g);}
.idea-type-btn.sel-bear{background:rgba(255,77,77,0.08);border-color:rgba(255,77,77,0.25);color:var(--r);}
.idea-type-btn.sel-neut{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);color:var(--m2);}
.idea-submit{width:100%;padding:12px;background:linear-gradient(135deg,var(--a),#c85e18);border:none;border-radius:9px;color:#fff;font-family:var(--font-display);font-size:14px;letter-spacing:3px;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 4px 18px rgba(232,114,42,0.3);}
.idea-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,114,42,0.42);}

/* ── VISIBILITY TOGGLE ── */

.vis-toggle{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  color:var(--m);font-family:var(--font-mono);font-size:8px;
  letter-spacing:1px;cursor:pointer;transition:all 0.2s;
}
.vis-toggle:hover{border-color:var(--a3);color:var(--a);}
.vis-toggle.public{background:var(--gd);border-color:rgba(52,208,88,0.3);color:var(--g);}

/* ── SECTION CARD ── */
.section-card{
  background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;
}
.section-card::before{
  content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,114,42,0.3),transparent);
}
.sc-title{
  font-family:var(--font-display);font-size:12px;letter-spacing:3px;
  color:rgba(232,114,42,0.8);margin-bottom:16px;
  text-shadow:0 0 14px rgba(232,114,42,0.3);
  display:flex;align-items:center;gap:8px;
}
.sc-title-dot{width:4px;height:4px;border-radius:50%;background:var(--a);box-shadow:0 0 6px var(--a);}

/* ── EQUITY CURVE ── */
.equity-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.equity-delta{
  font-family:var(--font-display);font-size:22px;letter-spacing:2px;
}
.equity-delta.pos{color:var(--g);text-shadow:0 0 16px rgba(52,208,88,0.4);}
.equity-delta.neg{color:var(--r);}
.equity-period{
  display:flex;gap:4px;
}
.ep-btn{
  padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.07);
  background:transparent;color:var(--m);font-family:var(--font-mono);
  font-size:8px;letter-spacing:1px;cursor:pointer;transition:all 0.15s;
}
.ep-btn.active{background:var(--a2);border-color:var(--a3);color:var(--a);}
#equity-canvas{width:100%;height:160px;display:block;}

/* ── PSYCHOLOGY PORTRAIT ── */
.psych-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.psych-block{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:14px;
}
.pb-label{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.pb-val{font-family:var(--font-display);font-size:22px;letter-spacing:1px;margin-bottom:2px;}
.pb-sub{font-family:var(--font-mono);font-size:8px;color:var(--m);}
.pb-val.pos{color:var(--g);text-shadow:0 0 14px rgba(52,208,88,0.35);}
.pb-val.neg{color:var(--r);}
.pb-val.neutral{color:var(--a);text-shadow:0 0 14px rgba(232,114,42,0.3);}

/* ── DISCIPLINE RING ── */
.disc-wrap{display:flex;align-items:center;gap:20px;}
.disc-ring-svg{flex-shrink:0;}
.disc-info{flex:1;}
.disc-level{font-family:var(--font-display);font-size:18px;letter-spacing:2px;margin-bottom:3px;}
.disc-desc{font-family:var(--font-mono);font-size:9px;color:var(--m);line-height:1.5;}
.disc-bars{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.db-row{display:flex;flex-direction:column;gap:3px;}
.db-head{display:flex;justify-content:space-between;}
.db-label{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1px;}
.db-val{font-family:var(--font-mono);font-size:9px;color:var(--t);}
.db-track{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;}
.db-fill{height:100%;border-radius:1px;transition:width 1s ease;}

/* ── EMOTION PROFILE ── */
.emo-radar{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.er-item{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);
  border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.er-icon{font-size:18px;flex-shrink:0;}
.er-body{flex:1;}
.er-label{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.er-bar-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.er-bar-fill{height:100%;border-radius:2px;}
.er-val{font-family:var(--font-display);font-size:14px;}

/* ── PSYCH INSIGHTS (fear/confidence correlations) ── */
.insight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.insight-card{
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;padding:14px;
}
.ic-cond{font-family:var(--font-mono);font-size:8px;color:var(--m);letter-spacing:1px;margin-bottom:6px;}
.ic-result{font-family:var(--font-display);font-size:26px;letter-spacing:1px;}
.ic-result.pos{color:var(--g);text-shadow:0 0 16px rgba(52,208,88,0.35);}
.ic-result.neg{color:var(--r);text-shadow:0 0 16px rgba(255,77,77,0.3);}
.ic-sub{font-family:var(--font-mono);font-size:8px;color:var(--m);margin-top:2px;}

/* ── BEST PAIRS ── */
.pairs-wrap{display:flex;flex-direction:column;gap:8px;}
.pair-row{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);
  border-radius:9px;transition:all 0.15s;
}
.pair-row:hover{border-color:rgba(232,114,42,0.2);}
.pair-rank{font-family:var(--font-display);font-size:14px;color:var(--m);width:20px;flex-shrink:0;}
.pair-name{font-family:var(--font-display);font-size:18px;letter-spacing:2px;flex:1;}
.pair-stats{display:flex;gap:16px;}
.ps-item{text-align:right;}
.ps-val{font-family:var(--font-mono);font-size:11px;}
.ps-val.g{color:var(--g);}
.ps-val.r{color:var(--r);}
.ps-val.a{color:var(--a);}
.ps-label{font-family:var(--font-mono);font-size:7px;color:var(--m);letter-spacing:1px;}

/* ── RECENT ACTIVITY (heatmap) ── */
.hm-weeks-pub{display:flex;gap:3px;}
.hm-week-pub{display:flex;flex-direction:column;gap:3px;}
.hm-cell-pub{
  width:12px;height:12px;border-radius:2px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.03);
  cursor:pointer;transition:transform 0.1s;
  position:relative;
}
.hm-cell-pub:hover{transform:scale(1.5);z-index:10;}
.hm-cell-pub:hover .hm-tip-pub{display:block;}
.hm-tip-pub{
  display:none;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);
  background:rgba(5,7,10,0.98);border:1px solid rgba(255,255,255,0.12);
  border-radius:7px;padding:6px 10px;font-family:var(--font-mono);font-size:8px;
  white-space:nowrap;z-index:30;color:var(--t);pointer-events:none;

function render(p, trades){
  const wrap=document.getElementById('main-wrap');
  const wins=trades.filter(t=>t.result==='win');
  const losses=trades.filter(t=>t.result==='loss');
  const wr=trades.length?Math.round(wins.length/trades.length*100):0;
  const totalPnl=trades.reduce((s,t)=>s+(t.pnl_pct||0),0);
  const avgWin=wins.length?wins.reduce((s,t)=>s+(t.pnl_pct||0),0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce((s,t)=>s+(t.pnl_pct||0),0)/losses.length):0;
  const rr=avgLoss?(avgWin/avgLoss).toFixed(1):'∞';

  // Discipline score calc
  const withSL=trades.filter(t=>t.stop_loss).length;
  const slScore=trades.length?Math.round(withSL/trades.length*100):0;
  const avgFear=avg(trades,'emotion_fear');
  const avgConf=avg(trades,'emotion_conf');
  const avgGreed=avg(trades,'emotion_greed');
  const avgCalm=avg(trades,'emotion_calm');
  const emotionScore=Math.round(((10-avgFear)/10*25)+((10-avgGreed)/10*25)+(avgConf/10*25)+(avgCalm/10*25));
  const withSetup=trades.filter(t=>t.setup_type).length;
  const setupScore=trades.length?Math.round(withSetup/trades.length*100):0;
  const byDay={};
  trades.forEach(t=>{const d=new Date(t.created_at).toDateString();byDay[d]=(byDay[d]||0)+1;});
  const avgPD=Object.values(byDay).length?Object.values(byDay).reduce((s,v)=>s+v,0)/Object.values(byDay).length:1;
  const consistScore=Math.round(Math.max(0,100-(avgPD-3)*20)*0.5+wr*0.5);
  const disciplineScore=Math.round(slScore*0.3+emotionScore*0.3+setupScore*0.2+consistScore*0.2);

  // Badges
  const badges=calcBadges(trades,totalPnl,wr,disciplineScore,avgWin,avgLoss);

  // Best/worst trade
  const bestTrade=trades.length?trades.reduce((b,t)=>(t.pnl_pct||0)>(b.pnl_pct||0)?t:b,trades[0]):null;
  const worstTrade=trades.length?trades.reduce((b,t)=>(t.pnl_pct||0)<(b.pnl_pct||0)?t:b,trades[0]):null;

  // Streak
  const streak=calcStreak(trades);

  // Pairs breakdown
  const pairs=calcPairs(trades);

        <div class="hero-handle">ORBITUM · ${trades.length} сделок · ${p.plan==='lifetime'?'∞ PRO':p.plan==='monthly'?'MONTHLY':'FREE'}</div>
        <div class="hero-badges" id="hero-badges">

        </svg>
        <div class="disc-info">
          <div class="disc-level" style="color:${disciplineScore>=90?'var(--g)':disciplineScore>=70?'var(--a)':disciplineScore>=40?'var(--y)':'var(--r)'}">${
            disciplineScore>=90?'ПРОФЕССИОНАЛ':disciplineScore>=70?'ДИСЦИПЛИНИРОВАННЫЙ':disciplineScore>=40?'НЕСТАБИЛЬНЫЙ':'GAMBLING'

function avg(arr,key){
  const v=arr.map(t=>t[key]).filter(x=>x!=null);
  return v.length?v.reduce((s,x)=>s+x,0)/v.length:5;
}

function calcStreak(trades){
  if(!trades.length)return 0;
  const days=new Set(trades.map(t=>new Date(t.created_at).toDateString()));
  let streak=0;const now=new Date();
  for(let i=0;i<365;i++){const d=new Date(now);d.setDate(d.getDate()-i);if(days.has(d.toDateString()))streak++;else if(i>0)break;}
  return streak;
}

function calcPairs(trades){
  const pm={};
  trades.forEach(t=>{
    if(!t.pair)return;
    if(!pm[t.pair])pm[t.pair]={n:0,w:0,pnl:0};
    pm[t.pair].n++;
    if(t.result==='win')pm[t.pair].w++;
    pm[t.pair].pnl+=(t.pnl_pct||0);
  });
  return Object.keys(pm).map(name=>({
    name,n:pm[name].n,
    wr:Math.round(pm[name].w/pm[name].n*100),
    pnl:pm[name].pnl
  })).sort((a,b)=>b.n-a.n);
}

function calcBadges(trades,roi,wr,disc,avgW,avgL){
  const badges=[];
  if(roi>20||(wr>=60&&trades.length>=50))badges.push({icon:'👑',name:'Top Trader',cls:'hbadge-gold'});
  if(disc>=80&&trades.length>=20)badges.push({icon:'🎖',name:'Discipline Master',cls:'hbadge-blue'});
  if(wr>=50&&trades.length>=15&&avgL>0&&avgW/avgL>2.5)badges.push({icon:'🎯',name:'Sniper',cls:'hbadge-green'});
  if(calcStreak(trades)>=7)badges.push({icon:'🔥',name:'Hot Streak',cls:'hbadge-orange'});
  if(trades.length>=100)badges.push({icon:'📋',name:'Veteran',cls:'hbadge-blue'});
  return badges;
}

function renderInsights(trades){
  if(trades.length<3)return `<div style="grid-column:span 2;text-align:center;padding:20px;font-family:var(--font-mono);font-size:9px;color:var(--m)">Нужно больше сделок для анализа</div>`;
  const avgPnl=arr=>arr.length?arr.reduce((s,t)=>s+(t.pnl_pct||0),0)/arr.length:0;
  const insights=[];

  const hFear=trades.filter(t=>(t.emotion_fear||0)>7);
  if(hFear.length>=2){const p=avgPnl(hFear);insights.push({cond:'Страх > 7',pnl:p,n:hFear.length,icon:'😰'});}
  const gConf=trades.filter(t=>{const c=t.emotion_conf||0;return c>=6&&c<=8;});
  if(gConf.length>=2){const p=avgPnl(gConf);insights.push({cond:'Уверенность 6–8',pnl:p,n:gConf.length,icon:'💪'});}
  const hGreed=trades.filter(t=>(t.emotion_greed||0)>7);
  if(hGreed.length>=2){const p=avgPnl(hGreed);insights.push({cond:'Жадность > 7',pnl:p,n:hGreed.length,icon:'💰'});}
  const hCalm=trades.filter(t=>(t.emotion_calm||0)>7);
  if(hCalm.length>=2){const p=avgPnl(hCalm);insights.push({cond:'Фокус > 7',pnl:p,n:hCalm.length,icon:'🎯'});}

  if(!insights.length)return `<div style="grid-column:span 2;text-align:center;padding:20px;font-family:var(--font-mono);font-size:9px;color:var(--m)">Нет данных — нужно заполнять эмоции в сделках</div>`;
  return insights.map(ins=>{
    const pos=ins.pnl>=0;
    return `<div class="insight-card">
      <div class="ic-cond">${ins.icon} ${ins.cond}</div>
      <div class="ic-result ${pos?'pos':'neg'}">${pos?'+':''}${ins.pnl.toFixed(1)}%</div>
      <div class="ic-sub">avg из ${ins.n} сделок</div>
    </div>`;
  }).join('');
}

function renderPublicFeed(trades){
  // Show trades that have notes (treat as "shared") — up to 10 most recent
  const shown=trades.filter(t=>t.note_why||t.note_lesson).slice(0,10);
  if(!shown.length)return `<div class="feed-empty">Публичных сделок нет</div>`;
  return shown.map(t=>{
    const pnl=t.pnl_pct!=null?(t.pnl_pct>=0?'+':'')+t.pnl_pct.toFixed(2)+'%':'—';
    const d=new Date(t.created_at).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
    const cls=t.result==='win'?'win':'loss';
    const pnlCls=t.result==='win'?'p':'n';
    return `<div class="feed-trade ${cls}">
      <div class="ft-pair">${t.pair||'?'}</div>
      <span class="ft-dir ${t.direction||'long'}">${(t.direction||'').toUpperCase()}</span>
      ${t.setup_type?`<span class="ft-setup">${t.setup_type}</span>`:''}
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--m);margin-left:4px">${d}</span>
      <span class="ft-pnl ${pnlCls}">${pnl}</span>
      ${t.note_why||t.note_lesson?`<div class="ft-note">${t.note_why||''} ${t.note_lesson?`<span style="color:rgba(52,208,88,0.6);font-family:var(--font-mono);font-size:9px">💡 ${t.note_lesson}</span>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function renderEquity(trades){
  const canvas=document.getElementById('eq-canvas');
  if(!canvas||trades.length<2)return;
  const sorted=[...trades].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const W=canvas.parentElement.offsetWidth||700,H=150;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  let cum=0;
  const pts=[{y:0}];
  sorted.forEach(t=>{cum+=(t.pnl_pct||0);pts.push({y:cum,res:t.result});});

  const minY=Math.min(...pts.map(p=>p.y));
  const maxY=Math.max(...pts.map(p=>p.y));
  const rng=maxY-minY||1;
  const px=16,py=12,cW=W-px*2,cH=H-py*2;
  const tx=i=>px+i/(pts.length-1)*cW;
  const ty=v=>py+cH-((v-minY)/rng)*cH;

  // Zero line
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(px,ty(0));ctx.lineTo(px+cW,ty(0));ctx.stroke();
  ctx.setLineDash([]);

  const isGreen=cum>=0;
  const color=isGreen?'#34d058':'#ff4d4d';

  // Fill gradient
  const grad=ctx.createLinearGradient(0,py,0,H);
  grad.addColorStop(0,isGreen?'rgba(52,208,88,0.2)':'rgba(255,77,77,0.18)');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(tx(0),ty(0));
  pts.forEach((p,i)=>ctx.lineTo(tx(i),ty(p.y)));
  ctx.lineTo(tx(pts.length-1),ty(0));
  ctx.closePath();ctx.fill();

  // Line
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.shadowColor=color;ctx.shadowBlur=8;
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(tx(i),ty(p.y)):ctx.lineTo(tx(i),ty(p.y)));
  ctx.stroke();
  ctx.shadowBlur=0;

  // Dots
  pts.slice(1).forEach((p,i)=>{
    ctx.beginPath();ctx.arc(tx(i+1),ty(p.y),2.5,0,Math.PI*2);
    ctx.fillStyle=p.res==='win'?'#34d058':'#ff4d4d';ctx.fill();
  });
}

function renderHeatmapPub(trades){
  const wrap=document.getElementById('hm-pub-wrap');
  if(!wrap)return;
  const byDay={};
  trades.forEach(t=>{
    if(!t.created_at)return;
    const d=new Date(t.created_at).toISOString().split('T')[0];
    if(!byDay[d])byDay[d]={n:0,pnl:0,wins:0};
    byDay[d].n++;byDay[d].pnl+=(t.pnl_pct||0);
    if(t.result==='win')byDay[d].wins++;
  });

  const WEEKS=20;
  const today=new Date();today.setHours(0,0,0,0);
  const startDate=new Date(today);startDate.setDate(today.getDate()-(WEEKS*7)+1);
  const dow=startDate.getDay();
  const adj=dow===0?-6:1-dow;startDate.setDate(startDate.getDate()+adj);

  const months=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  let lastMo=-1,html='<div class="hm-weeks-pub">';

  for(let w=0;w<WEEKS;w++){
    html+='<div class="hm-week-pub">';
    const fd=new Date(startDate);fd.setDate(startDate.getDate()+w*7);
    const mo=fd.getMonth();
    html+=`<div class="hm-month-pub">${mo!==lastMo?(lastMo=mo,months[mo]):''}</div>`;
    for(let d=0;d<7;d++){
      const dt=new Date(startDate);dt.setDate(startDate.getDate()+w*7+d);
      const key=dt.toISOString().split('T')[0];
      const isFuture=dt>today;
      const dd=byDay[key];
      let bg='rgba(255,255,255,0.04)',glow='',tip=key;
      if(!isFuture&&dd){
        const intensity=Math.min(1,0.25+dd.n*0.2);
        bg=dd.pnl>=0?`rgba(52,208,88,${intensity})`:`rgba(255,77,77,${intensity})`;
        if(dd.n>=3)glow=`box-shadow:0 0 6px ${dd.pnl>=0?'rgba(52,208,88,0.4)':'rgba(255,77,77,0.4)'}`;
        const wr=Math.round(dd.wins/dd.n*100);
        tip=dt.toLocaleDateString('ru-RU',{weekday:'short',day:'2-digit',month:'short'})+` · ${dd.n} сд. · WR ${wr}% · ${(dd.pnl>=0?'+':'')+dd.pnl.toFixed(1)}%`;
      } else if(!isFuture){
        tip=dt.toLocaleDateString('ru-RU',{weekday:'short',day:'2-digit',month:'short'})+' · нет сделок';
      }
      html+=`<div class="hm-cell-pub" style="background:${bg};${glow}"><div class="hm-tip-pub">${tip}</div></div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  wrap.innerHTML=html;
}

function toggleFollow(){
  const btn=document.querySelector('.follow-btn');
  if(!btn)return;
  const isFollowing=btn.classList.contains('following');
  btn.classList.toggle('following');
  btn.textContent=isFollowing?'+ FOLLOW':'✓ FOLLOWING';
}

function copyLink(){
  const url=location.href.includes('uid=')
    ?location.href
    :(location.origin+'/profile.html?uid='+(profileUser?.id||''));
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      const btn=document.getElementById('copy-btn');
      if(btn){const orig=btn.textContent;btn.textContent='✅ Скопировано!';setTimeout(()=>btn.textContent=orig,2500);}
    });
  }
}

  </div>`;
}
