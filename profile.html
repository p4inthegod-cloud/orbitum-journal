<!DOCTYPE html>
<html lang="ru" data-theme="dark" style="background:#161616;color:#ffffff;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM · Профиль</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script>window.addEventListener('DOMContentLoaded',function(){if(typeof supabase==='undefined'){var s=document.createElement('script');s.src='https://unpkg.com/@supabase/supabase-js@2';document.head.appendChild(s);}});</script>
<style>

  4%  {opacity:0.75;}
  92% {opacity:0.75;}
  100%{left:-8%; opacity:0;}
}

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');


/* ══ TOKENS ══ */
:root {
  --bg:#161616; --bg2:#1c1c1c; --bg3:#222222; --bg4:#282828;
  --bd:   rgba(255,255,255,0.06); --bd2:rgba(255,255,255,0.11);
  --t:#ffffff; --m:rgba(255,255,255,0.55); --m2:rgba(255,255,255,0.28); --m3:rgba(255,255,255,0.12);
  --a:    #FF3923; --a2:rgba(255,57,35,0.10); --a3:rgba(255,57,35,0.28);
  --g:    #2ecc71; --g2:rgba(46,204,113,0.10);
  --r:    #e74c3c; --r2:rgba(231,76,60,0.10);
  --y:    #f0c040; --y2:rgba(240,192,64,0.10);
  --mono: 'Plus Jakarta Sans', sans-serif;
  --disp:'Plus Jakarta Sans',sans-serif;
}
[data-theme="light"] {
  --bg:#f5f5f5;--bg2:#fff;--bg3:#e8eaef;--bg4:#dde0e8;
  --bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.13);
  --t:#141820;--m:rgba(20,24,32,.6);--m2:rgba(20,24,32,.3);--m3:rgba(20,24,32,.07);
  --g:#1a8a42;--r:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#161616;color:var(--t);font-family:var(--mono);min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;font-family:var(--mono);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── TOPBAR ── */
.topbar{
  height:48px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:12px;padding:0 20px;
  position:sticky;top:0;z-index:200;
}
.tb-logo{font-family:var(--disp);font-size:16px;letter-spacing:2px;color:var(--a);}
.tb-dot{width:4px;height:4px;border-radius:50%;background:var(--bd2);}
.tb-badge{font-size:8px;letter-spacing:2px;color:var(--m2);border:1px solid var(--bd);padding:3px 8px;border-radius:3px;}
.tb-spacer{flex:1;}
.tb-nav{
  height:26px;padding:0 10px;border:1px solid var(--bd);border-radius:5px;
  background:transparent;color:var(--m);font-size:9px;letter-spacing:1px;transition:all .15s;
}
.tb-nav:hover{color:var(--t);border-color:var(--bd2);}
.tb-theme-btn{
  width:26px;height:26px;border:1px solid var(--bd);border-radius:5px;
  background:transparent;color:var(--m);font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.tb-theme-btn:hover{color:var(--t);}

/* ── LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  min-height:calc(100vh - 48px);
}

/* ── LEFT: Profile Card ── */
.profile-left{
  border-right:1px solid var(--bd);background:var(--bg2);
  display:flex;flex-direction:column;
  position:sticky;top:48px;height:calc(100vh - 48px);
  overflow-y:auto;
}

/* Hero Card */
.hero-card{
  padding:20px 20px 16px;border-bottom:1px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;
}
.avatar-wrap{position:relative;}
.avatar{
  width:72px;height:72px;border-radius:50%;
  background:var(--a2);border:2px solid var(--a3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:28px;color:var(--a);
  font-weight:400;overflow:hidden;flex-shrink:0;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-upload{
  position:absolute;bottom:0;right:0;
  width:22px;height:22px;border-radius:50%;
  background:var(--bg2);border:2px solid var(--bg2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;transition:all .15s;
  color:var(--m2);
}
.avatar-upload:hover{color:var(--a);}
.profile-name{font-family:var(--disp);font-size:22px;letter-spacing:2px;line-height:1;}
.profile-handle{font-size:8px;letter-spacing:2px;color:var(--m2);margin-top:3px;}
.profile-plan{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:3px;font-size:8px;letter-spacing:1.5px;
  border:1px solid;
}
.plan-lifetime{background:var(--a2);border-color:var(--a3);color:var(--a);}
.plan-monthly {background:var(--g2);border-color:rgba(46,204,113,.2);color:var(--g);}
.plan-free    {background:var(--m3);border-color:var(--bd);color:var(--m2);}

/* Badges row */
.badges-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.badge{
  font-size:7px;letter-spacing:1px;padding:2px 7px;border-radius:3px;
  border:1px solid var(--bd);color:var(--m2);background:var(--m3);
}
.badge-gold  {background:rgba(240,192,64,.1);border-color:rgba(240,192,64,.25);color:var(--y);}
.badge-blue  {background:rgba(52,152,219,.1);border-color:rgba(52,152,219,.2);color:#3498db;}
.badge-green {background:var(--g2);border-color:rgba(46,204,113,.2);color:var(--g);}
.badge-orange{background:var(--a2);border-color:var(--a3);color:var(--a);}

/* Rank */
.rank-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:4px;
  font-size:9px;letter-spacing:2px;font-weight:600;
}
.rank-owner  {background:var(--a2);border:1px solid var(--a3);color:var(--a);}
.rank-master {background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.3);color:var(--y);}
.rank-diamond{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.25);color:#3498db;}
.rank-gold   {background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.25);color:#f39c12;}
.rank-silver {background:var(--m3);border:1px solid var(--bd2);color:var(--m);}
.rank-bronze {background:rgba(180,80,30,.1);border:1px solid rgba(180,80,30,.2);color:#b4501e;}

/* Follow/Share row */
.action-row{display:flex;gap:6px;width:100%;}
.action-btn{
  flex:1;height:30px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.action-btn:hover{border-color:var(--bd2);color:var(--t);}
.action-btn.primary{background:var(--a2);border-color:var(--a3);color:var(--a);animation:btnBreathe 2.4s ease-in-out infinite;}
.action-btn.primary:hover{background:var(--a3);color:var(--t);}
.action-btn.following{background:var(--g2);border-color:rgba(46,204,113,.2);color:var(--g);}

/* Stats grid in sidebar */
.sidebar-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  border-bottom:1px solid var(--bd);background:var(--bd);
}
.ss-item{
  background:var(--bg2);padding:12px 14px;
  display:flex;flex-direction:column;gap:3px;
}
.ss-lbl{font-size:7px;letter-spacing:1.5px;color:var(--m2);text-transform:uppercase;}
.ss-val{font-family:var(--disp);font-size:20px;letter-spacing:.5px;line-height:1;}

/* Follow stats */
.follow-row{
  display:flex;justify-content:center;gap:20px;
  padding:12px 16px;border-bottom:1px solid var(--bd);
}
.fs-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.fs-num{font-family:var(--disp);font-size:18px;letter-spacing:.5px;}
.fs-lbl{font-size:7px;letter-spacing:1.5px;color:var(--m2);}

/* Quick links */
.quick-links{padding:12px 16px;border-bottom:1px solid var(--bd);}
.ql-label{font-size:7px;letter-spacing:2px;color:var(--m2);text-transform:uppercase;margin-bottom:8px;}
.ql-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;
  font-size:10px;color:var(--m);transition:all .13s;cursor:pointer;
  border:1px solid transparent;
}
.ql-item:hover{background:var(--bg3);border-color:var(--bd);color:var(--t);}
.ql-item svg{flex-shrink:0;opacity:.6;}

/* TG Settings mini */
.tg-mini{padding:12px 16px;border-bottom:1px solid var(--bd);}
.tg-status-row{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.tg-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tg-linked  {background:var(--g);box-shadow:0 0 6px var(--g);}
.tg-unlinked{background:var(--m2);}
.tg-status-name{font-size:10px;color:var(--t);flex:1;}
.tg-status-sub{font-size:8px;color:var(--m2);}
.tg-notif-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tg-notif-item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:6px 8px;
}
.tg-notif-lbl{font-size:8px;color:var(--m2);letter-spacing:.3px;}
.tg-toggle{
  width:28px;height:16px;border-radius:8px;background:var(--bg4);
  position:relative;cursor:pointer;transition:background .2s;border:1px solid var(--bd);
  flex-shrink:0;
}
.tg-toggle.on{background:var(--a);border-color:var(--a3);}
.tg-toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:10px;height:10px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.tg-toggle.on::after{transform:translateX(12px);}

/* Theme section */
.theme-mini{padding:12px 16px;}
.theme-btns{display:flex;gap:4px;margin-top:8px;}
.theme-opt{
  flex:1;height:28px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m2);font-size:8px;letter-spacing:1px;
  transition:all .15s;
}
.theme-opt.active{background:var(--a2);border-color:var(--a3);color:var(--a);}

/* ── RIGHT: Main Content ── */
.profile-right{
  overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:12px;
}

/* Section card */
.sec{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  overflow:hidden;
}
.sec-head{
  display:flex;align-items:center;gap:8px;padding:12px 16px;
  border-bottom:1px solid var(--bd);
}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--a);flex-shrink:0;}
.sec-title{font-size:8px;letter-spacing:2.5px;color:var(--a);text-transform:uppercase;}
.sec-sub{font-size:8px;color:var(--m2);margin-left:auto;}

/* KPI row */
.kpi-row{
  display:grid;gap:8px;padding:14px 16px;
  grid-template-columns:repeat(6,1fr);
}
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
.kpi{
  background:var(--bg3);border:1px solid var(--bd);border-radius:8px;
  padding:10px 12px;position:relative;overflow:hidden;
}
.kpi::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.kpi.pos::before{background:linear-gradient(90deg,transparent,rgba(46,204,113,.5),transparent);}
.kpi.neg::before{background:linear-gradient(90deg,transparent,rgba(231,76,60,.4),transparent);}
.kpi.acc::before{background:linear-gradient(90deg,transparent,rgba(255,57,35,.5),transparent);}
.kpi.neu::before{background:linear-gradient(90deg,transparent,var(--bd2),transparent);}
.kpi-lbl{font-size:7px;letter-spacing:1.5px;color:var(--m2);text-transform:uppercase;margin-bottom:5px;}
.kpi-val{font-family:var(--disp);font-size:22px;letter-spacing:.5px;line-height:1;margin-bottom:2px;}
.kpi.pos .kpi-val{color:var(--g);}
.kpi.neg .kpi-val{color:var(--r);}
.kpi.acc .kpi-val{color:var(--a);}
.kpi-sub{font-size:7px;color:var(--m2);}

/* Equity canvas */
.equity-wrap{padding:14px 16px;}

/* Two-col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* Discipline Ring */
.disc-wrap{display:flex;align-items:center;gap:14px;padding:14px 16px;}
.disc-ring-svg{flex-shrink:0;}
.disc-info{}
.disc-level{font-family:var(--disp);font-size:18px;letter-spacing:1px;margin-bottom:4px;}
.disc-desc{font-size:9px;color:var(--m);line-height:1.5;}
.disc-bars{padding:0 16px 14px;}
.db-row{margin-bottom:8px;}
.db-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.db-label{font-size:9px;color:var(--m);}
.db-val{font-size:9px;color:var(--m2);}
.db-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.db-fill{height:100%;border-radius:2px;transition:width .8s ease;}

/* Emotion radar */
.emo-wrap{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.er-item{display:flex;align-items:center;gap:10px;}
.er-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.er-body{flex:1;}
.er-label{font-size:8px;color:var(--m2);letter-spacing:.5px;margin-bottom:4px;}
.er-bar-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.er-bar-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.er-vals{display:flex;justify-content:space-between;}
.er-val{font-family:var(--disp);font-size:14px;letter-spacing:.5px;}
.er-sub{font-size:7px;color:var(--m2);}

/* Analytics tabs */
.analytics-tabs{display:flex;gap:2px;padding:10px 16px;border-bottom:1px solid var(--bd);}
.atab{
  height:24px;padding:0 12px;border-radius:4px;border:1px solid transparent;
  background:transparent;color:var(--m2);font-size:9px;letter-spacing:.5px;transition:all .12s;
}
.atab:hover{color:var(--m);}
.atab.active{background:var(--a2);border-color:var(--a3);color:var(--a);}
.analytics-body{padding:14px 16px;}

/* Analytics cards */
.an-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
@media(max-width:1100px){.an-grid{grid-template-columns:1fr 1fr;}}
.an-card{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:12px;}
.an-card-title{font-size:8px;letter-spacing:1.5px;color:var(--a);text-transform:uppercase;margin-bottom:10px;}
.an-stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);}
.an-stat-row:last-child{border-bottom:none;}
.an-stat-label{font-size:9px;color:var(--m);}
.an-stat-val{font-size:10px;font-weight:500;}
.an-bar-row{margin-bottom:8px;}
.an-bar-head{display:flex;justify-content:space-between;margin-bottom:3px;}
.an-bar-label{font-size:9px;color:var(--m);}
.an-bar-meta{font-size:8px;color:var(--m2);}
.an-bar-track{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.an-bar-fill{height:100%;border-radius:2px;}
.an-empty{font-size:9px;color:var(--m2);padding:16px;text-align:center;}

/* Insight grid */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 14px;}
.insight-card{
  background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;
}
.ic-cond{font-size:9px;color:var(--m);margin-bottom:5px;}
.ic-result{font-family:var(--disp);font-size:20px;letter-spacing:.5px;}
.ic-result.pos{color:var(--g);}.ic-result.neg{color:var(--r);}
.ic-sub{font-size:7px;color:var(--m2);margin-top:2px;}

/* Best/Worst */
.trade-showcase{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px;}
.ts-card{background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:12px;}
.ts-card.best{border-color:rgba(46,204,113,.2);}
.ts-card.worst{border-color:rgba(231,76,60,.15);}
.ts-label{font-size:8px;color:var(--m2);letter-spacing:1px;margin-bottom:6px;}
.ts-pair{font-family:var(--disp);font-size:16px;letter-spacing:.5px;margin-bottom:3px;}
.ts-pnl{font-size:13px;font-weight:500;margin-bottom:3px;}
.ts-card.best .ts-pnl{color:var(--g);}
.ts-card.worst .ts-pnl{color:var(--r);}
.ts-meta{font-size:7px;color:var(--m2);}

/* Pairs */
.pairs-wrap{padding:0 16px 14px;display:flex;flex-direction:column;gap:5px;}
.pair-row{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
}
.pair-rank{font-size:8px;color:var(--m2);min-width:16px;}
.pair-name{font-size:11px;font-weight:500;flex:1;}
.pair-stats{display:flex;gap:10px;}
.ps-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.ps-val{font-size:10px;font-weight:500;}
.ps-val.g{color:var(--g);}.ps-val.r{color:var(--r);}.ps-val.a{color:var(--a);}
.ps-label{font-size:7px;color:var(--m2);}

/* Heatmap */
.hm-wrap{padding:14px 16px;overflow-x:auto;}
.hm-weeks{display:flex;gap:2px;}
.hm-week{display:flex;flex-direction:column;gap:2px;}
.hm-month{font-size:7px;color:var(--m2);height:12px;display:flex;align-items:center;letter-spacing:.5px;}
.hm-cell{
  width:12px;height:12px;border-radius:2px;background:rgba(255,255,255,0.04);
  position:relative;cursor:default;transition:transform .1s;
}
.hm-cell:hover{transform:scale(1.3);}
.hm-tip{
  position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:var(--bg2);border:1px solid var(--bd2);border-radius:5px;
  padding:5px 8px;font-size:8px;white-space:nowrap;
  z-index:100;display:none;letter-spacing:.3px;color:var(--t);pointer-events:none;
}
.hm-cell:hover .hm-tip{display:block;}
.hm-legend{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:7px;color:var(--m2);}

/* Plan Upgrade CTA */
.upgrade-card{
  background:var(--bg2);border:1px solid var(--a3);border-radius:10px;overflow:hidden;
  position:relative;
}
.upgrade-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);
}
.upgrade-inner{padding:18px 20px;}
.upgrade-title{font-family:var(--disp);font-size:20px;letter-spacing:2px;color:var(--a);margin-bottom:6px;}
.upgrade-desc{font-size:10px;color:var(--m);line-height:1.7;margin-bottom:14px;}
.upgrade-features{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:16px;}
.uf-item{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--m);}
.uf-check{color:var(--g);font-size:11px;}
.upgrade-btns{display:flex;gap:8px;}
.upgrade-btn{
  flex:1;height:38px;border-radius:6px;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;transition:all .18s;display:flex;align-items:center;
  justify-content:center;gap:6px;
}
.upgrade-btn.primary{background:var(--a);border:none;color:#fff;}
.upgrade-btn.primary:hover{background:#d4661e;}
.upgrade-btn.secondary{background:transparent;border:1px solid var(--bd2);color:var(--m);}
.upgrade-btn.secondary:hover{border-color:var(--bd2);color:var(--t);}

/* Ideas */
.ideas-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--bd);}
.ideas-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.idea-card{
  background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;
}
.idea-top{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.idea-pair{font-family:var(--disp);font-size:15px;letter-spacing:.5px;}
.idea-type{font-size:7px;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;}
.idea-type.bullish{background:var(--g2);color:var(--g);border:1px solid rgba(46,204,113,.2);}
.idea-type.bearish{background:var(--r2);color:var(--r);border:1px solid rgba(231,76,60,.2);}
.idea-type.neutral{background:var(--m3);color:var(--m2);border:1px solid var(--bd);}
.idea-title{font-size:11px;color:var(--t);margin-bottom:6px;line-height:1.4;}
.idea-body{font-size:9px;color:var(--m);line-height:1.7;margin-bottom:8px;}
.idea-targets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.idea-target{font-size:8px;padding:2px 7px;border-radius:3px;background:var(--m3);color:var(--m);}
.idea-footer{display:flex;justify-content:space-between;align-items:center;}
.idea-date{font-size:7px;color:var(--m2);}
.idea-del-btn{font-size:9px;color:var(--r2,rgba(231,76,60,.5));background:none;border:none;cursor:pointer;}
.idea-del-btn:hover{color:var(--r);}
.idea-new-btn{
  height:26px;padding:0 12px;background:var(--a2);border:1px solid var(--a3);
  border-radius:5px;color:var(--a);font-size:8px;letter-spacing:1px;transition:all .15s;
}
.idea-new-btn:hover{background:var(--a3);color:var(--t);}

/* Share dropdown */
.share-wrap{position:relative;}
.share-dd{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;
  min-width:200px;z-index:300;overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.share-dd.open{display:block;}
.sd-hd{padding:9px 14px 6px;font-size:7px;color:var(--m2);letter-spacing:2px;border-bottom:1px solid var(--bd);}
.sd-row{
  display:flex;align-items:center;gap:9px;padding:9px 14px;
  cursor:pointer;transition:background .12s;font-size:10px;color:var(--m);
}
.sd-row:hover{background:var(--bg3);color:var(--t);}
.sd-icon{width:18px;text-align:center;font-size:14px;}

/* Modals */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:var(--bg2);border:1px solid var(--a3);border-radius:12px;
  width:100%;max-width:440px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--bd);
}
.modal-title{font-size:9px;letter-spacing:2px;color:var(--a);text-transform:uppercase;}
.modal-close{
  width:24px;height:24px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{color:var(--r);}
.modal-body{padding:18px;}

/* Idea modal form */
.idea-field{margin-bottom:12px;}
.idea-field label{display:block;font-size:8px;letter-spacing:1.5px;color:var(--m2);text-transform:uppercase;margin-bottom:5px;}
.idea-field input,.idea-field textarea{
  width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
  color:var(--t);font-family:var(--mono);font-size:11px;padding:8px 10px;
  outline:none;transition:border-color .15s;
}
.idea-field input:focus,.idea-field textarea:focus{border-color:var(--a3);}
.idea-field textarea{height:80px;resize:none;}
.idea-type-btns{display:flex;gap:5px;}
.idea-type-btn{
  flex:1;height:28px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:9px;transition:all .12s;
}
.idea-type-btn.sel-bull{background:var(--g2);border-color:rgba(46,204,113,.2);color:var(--g);}
.idea-type-btn.sel-bear{background:var(--r2);border-color:rgba(231,76,60,.2);color:var(--r);}
.idea-type-btn.sel-neut{background:var(--m3);border-color:var(--bd2);color:var(--m);}
.idea-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.idea-submit{
  width:100%;height:38px;background:var(--a);border:none;border-radius:6px;
  color:#fff;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all .18s;
}
.idea-submit:hover{background:#d4661e;}

/* TG Widget Card */
.tg-card{
  background:linear-gradient(135deg,#0a0e14,#0d1118);
  border:1px solid var(--a3);border-radius:10px;
  padding:14px;margin-bottom:14px;position:relative;overflow:hidden;
}
.tg-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--a),rgba(255,57,35,.2),transparent);
}
.tgc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.tgc-avatar{
  width:36px;height:36px;border-radius:50%;
  background:var(--a2);border:1.5px solid var(--a3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:14px;color:var(--a);flex-shrink:0;
}
.tgc-info{flex:1;}
.tgc-name{font-size:12px;font-weight:600;color:#fff;font-family:var(--mono);}
.tgc-sub{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.tgc-orb{font-size:7px;color:var(--a);letter-spacing:1.5px;}
.tgc-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.tgcs{background:rgba(255,255,255,.03);border-radius:6px;padding:6px 5px;text-align:center;border:1px solid rgba(255,255,255,.05);}
.tgcs-val{font-size:12px;font-weight:600;font-family:var(--mono);color:#fff;}
.tgcs-val.pos{color:var(--g);}.tgcs-val.neg{color:var(--r);}
.tgcs-lbl{font-size:6px;color:rgba(255,255,255,.3);letter-spacing:.8px;margin-top:1px;}
.tgc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);}
.tgc-link{font-size:7px;color:rgba(255,255,255,.2);font-family:var(--mono);}
.tgc-badge{font-size:7px;color:var(--a);background:var(--a2);border:1px solid var(--a3);border-radius:3px;padding:2px 5px;}
.tgw-actions{display:flex;gap:7px;margin-top:12px;}
.tgw-btn{
  flex:1;height:36px;border-radius:6px;font-family:var(--mono);font-size:9px;
  letter-spacing:.8px;cursor:pointer;transition:all .15s;border:1px solid var(--bd2);
}
.tgw-btn.primary{background:var(--a);border-color:var(--a);color:#fff;animation:btnBreathe 2.4s ease-in-out infinite;}
.tgw-btn.primary:hover{background:#d4661e;}
.tgw-btn.secondary{background:transparent;color:var(--m);}
.tgw-btn.secondary:hover{color:var(--t);}
.tgw-note{font-size:8px;color:var(--m2);text-align:center;margin-top:8px;line-height:1.6;}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:2000;
  background:var(--bg3);border:1px solid var(--a3);border-radius:8px;
  padding:10px 14px;font-size:10px;color:var(--t);
  transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(46,204,113,.3);}
.toast.err{border-color:rgba(231,76,60,.3);}

/* Feed empty */
.feed-empty{padding:20px;font-size:9px;color:var(--m2);text-align:center;letter-spacing:1px;}

/* Loading */
.loading-state{
  display:flex;align-items:center;justify-content:center;
  min-height:60vh;font-size:9px;color:var(--m2);letter-spacing:2px;
}

/* Not found */
.not-found{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:12px;text-align:center;
}
.nf-title{font-family:var(--disp);font-size:64px;color:var(--bd2);letter-spacing:2px;}
.nf-sub{font-size:10px;color:var(--m2);letter-spacing:1px;}

/* up/dn */
.up{color:var(--g);}.dn{color:var(--r);}

/* responsive */
@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
  .profile-left{position:static;height:auto;}
  .kpi-row{grid-template-columns:repeat(3,1fr);}
}
@keyframes btnBreathe{
  0%,100%{box-shadow:0 0 14px rgba(255,57,35,0.18),inset 0 1px 0 rgba(255,255,255,0.07);}
  50%{box-shadow:0 0 28px rgba(255,57,35,0.42),inset 0 1px 0 rgba(255,255,255,0.1);}
}
</style>
</head>

<script>
/* ══════════════════════════════════════════════════
   ORBITUM PROFILE v2 — Cockpit Redesign
   Same Supabase schema, same logic, new layout
══════════════════════════════════════════════════ */

const SB_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
const OWNER_ID = '474c000f-79d3-4b8f-b9af-e3c581bbffbc';

let sb, currentUser = null, profileUser = null, allTrades = [], isOwnProfile = false;
let _ideaType = 'bullish', _analyticsTab = 'setups', _shareOpen = false;

// ── INIT ────────────────────────────────────────
async function init() {
  const { createClient } = supabase;
  sb = createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;

  const params = new URLSearchParams(location.search);
  let uid = params.get('uid');
  if (!uid && currentUser) uid = currentUser.id;
  if (!uid) { showNotFound('Войди в аккаунт или укажи uid= в URL'); return; }

  isOwnProfile = !!(currentUser && currentUser.id === uid);

  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', uid).single();
  if (error || !profile) { showNotFound('Профиль не найден'); return; }
  profileUser = profile;

  const { data: tradeData } = await sb.from('trades').select('*').eq('user_id', uid).order('created_at', { ascending: false });
  allTrades = tradeData || [];

  renderLeft(profile);
  renderRight(profile, allTrades);

  if (currentUser && !isOwnProfile) checkFollow(uid);
  loadFollowStats(uid);
  loadIdeas(uid);
}

// ── HELPERS ──────────────────────────────────────
function avg(arr, key) {
  const v = arr.map(t => t[key]).filter(x => x != null && x !== 0);
  return v.length ? v.reduce((s, x) => s + x, 0) / v.length : 0;
}
function clamp(v, mn, mx) { return Math.min(mx, Math.max(mn, v)); }

function computeStats(trades) {
  const wins   = trades.filter(t => t.result === 'win');
  const losses = trades.filter(t => t.result === 'loss');
  const wr     = trades.length ? Math.round(wins.length / trades.length * 100) : 0;
  const totalPnl = trades.reduce((s, t) => s + (t.pnl_pct || 0), 0);
  const avgWin  = wins.length   ? wins.reduce((s,t)=>s+(t.pnl_pct||0),0)/wins.length : 0;
  const avgLoss = losses.length ? Math.abs(losses.reduce((s,t)=>s+(t.pnl_pct||0),0)/losses.length) : 0;
  const rr      = avgLoss ? (avgWin / avgLoss).toFixed(1) : '∞';

  // Discipline
  const withSL     = trades.filter(t => t.stop_loss).length;
  const slScore    = trades.length ? Math.round(withSL / trades.length * 100) : 0;
  const avgFear    = avg(trades, 'emotion_fear');
  const avgConf    = avg(trades, 'emotion_conf');
  const avgGreed   = avg(trades, 'emotion_greed');
  const avgCalm    = avg(trades, 'emotion_calm');
  const hasEm      = trades.filter(t => t.emotion_conf || t.emotion_fear).length;
  const emotionScore = hasEm >= 3
    ? clamp(Math.round(((10-avgFear)/10*25)+((10-avgGreed)/10*25)+(avgConf/10*25)+(avgCalm/10*25)), 0, 100)
    : 50;
  const withSetup  = trades.filter(t => t.setup_type).length;
  const setupScore = trades.length ? Math.round(withSetup / trades.length * 100) : 0;
  const byDay = {};
  trades.forEach(t => { const d = new Date(t.created_at).toDateString(); byDay[d] = (byDay[d]||0)+1; });
  const days = Object.values(byDay);
  const avgPD = days.length ? days.reduce((s,v)=>s+v,0)/days.length : 1;
  const overtrade = clamp(Math.round(100 - (Math.max(0,avgPD-5)*12)), 0, 100);
  const consistScore = clamp(Math.round(overtrade*0.5 + wr*0.5), 0, 100);
  const discScore = clamp(Math.round(slScore*0.30 + emotionScore*0.25 + setupScore*0.25 + consistScore*0.20), 0, 100);

  return { wins, losses, wr, totalPnl, avgWin, avgLoss, rr, discScore, slScore, emotionScore, setupScore, consistScore, avgFear, avgConf, avgGreed, avgCalm };
}

function getRank(uid, trades, wr, roi) {
  if (uid === OWNER_ID) return { key:'owner', label:'⚡ OWNER', cls:'rank-owner' };
  const n = trades.length;
  if (n >= 200 && wr >= 65 && roi >= 50) return { key:'master',  label:'👑 MASTER',  cls:'rank-master'  };
  if (n >= 100 && wr >= 60 && roi >= 25) return { key:'diamond', label:'💎 DIAMOND', cls:'rank-diamond' };
  if (n >= 50  && wr >= 55 && roi >= 10) return { key:'gold',    label:'🥇 GOLD',    cls:'rank-gold'    };
  if (n >= 20  && wr >= 50)              return { key:'silver',  label:'🥈 SILVER',  cls:'rank-silver'  };
  if (n >= 5)                            return { key:'bronze',  label:'🥉 BRONZE',  cls:'rank-bronze'  };
  return null;
}

function calcBadges(trades, roi, wr, disc, avgW, avgL) {
  const badges = [];
  if (roi > 20 || (wr >= 60 && trades.length >= 50)) badges.push({ icon:'👑', name:'Top Trader', cls:'badge-gold' });
  if (disc >= 80 && trades.length >= 20) badges.push({ icon:'🎖', name:'Discipline Master', cls:'badge-blue' });
  if (wr >= 50 && trades.length >= 15 && avgL > 0 && avgW/avgL > 2.5) badges.push({ icon:'🎯', name:'Sniper', cls:'badge-green' });
  if (trades.length >= 100) badges.push({ icon:'📋', name:'Veteran', cls:'badge-blue' });
  return badges;
}

// ── RENDER LEFT ──────────────────────────────────
function renderLeft(p) {
  const st = computeStats(allTrades);
  const displayName = p.full_name || p.username || 'Trader';
  const initial = displayName[0].toUpperCase();
  const planCls = p.plan === 'lifetime' ? 'plan-lifetime' : p.plan === 'monthly' ? 'plan-monthly' : 'plan-free';
  const planLabel = p.plan === 'lifetime' ? '∞ LIFETIME' : p.plan === 'monthly' ? 'MONTHLY' : 'FREE';
  const rank = getRank(profileUser?.id, allTrades, st.wr, st.totalPnl);
  const badges = calcBadges(allTrades, st.totalPnl, st.wr, st.discScore, st.avgWin, st.avgLoss);
  const tgLinked = p.tg_linked && p.tg_chat_id;

  document.getElementById('profile-left').innerHTML = `
    <div class="hero-card">
      <div class="avatar-wrap">
        <div class="avatar" id="hero-avatar">
          ${p.avatar_url ? `<img src="${p.avatar_url}" alt="">` : initial}
        </div>
        ${isOwnProfile ? '<div class="avatar-upload" onclick="document.getElementById(\'av-inp\').click()" title="Сменить фото">📷</div><input type="file" id="av-inp" accept="image/*" style="display:none" onchange="uploadAvatar(this)">' : ''}
      </div>
      <div>
        <div class="profile-name">${esc(displayName)}</div>
        <div class="profile-handle">ORBITUM · ${allTrades.length} СДЕЛОК</div>
      </div>
      ${rank ? `<div class="rank-pill ${rank.cls}">${rank.label}</div>` : ''}
      <span class="profile-plan ${planCls}">${planLabel}</span>
      ${badges.length ? `<div class="badges-row">${badges.map(b=>`<span class="badge ${b.cls}">${b.icon} ${b.name}</span>`).join('')}</div>` : ''}
      <div class="action-row">
        ${isOwnProfile
          ? `<div class="share-wrap"><button class="action-btn primary" onclick="toggleShare()">⬆ Поделиться</button>
             <div class="share-dd" id="share-dd">
               <div class="sd-hd">ПОДЕЛИТЬСЯ</div>
               <div class="sd-row" onclick="copyProfileLink()"><span class="sd-icon">🔗</span>Скопировать ссылку</div>
               <div class="sd-row" onclick="shareToTelegram()"><span class="sd-icon">✈️</span>Telegram</div>
               <div class="sd-row" onclick="shareToTwitter()"><span class="sd-icon">𝕏</span>Twitter / X</div>
               <div class="sd-row" onclick="openTgModal()"><span class="sd-icon">🃏</span>TG карточка</div>
             </div></div>`
          : `<button class="action-btn" id="follow-btn" onclick="toggleFollow()">+ FOLLOW</button>`}
        <a href="/journal" class="action-btn">← Журнал</a>
      </div>
    </div>

    <div class="sidebar-stats">
      <div class="ss-item">
        <div class="ss-lbl">Winrate</div>

// ── ANALYTICS TABS ───────────────────────────────
function switchTab(tab, btn) {
  _analyticsTab = tab;
  document.querySelectorAll('.atab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('analytics-body').innerHTML = renderAnalyticsContent(allTrades, tab);
}

function renderAnalyticsContent(trades, tab) {
  if (!trades.length) return '<div class="an-empty">Нет данных — добавь сделки</div>';

  if (tab === 'setups') {
    const pm = {};
    trades.forEach(t => {
      const k = t.setup_type || 'Без сетапа';
      if (!pm[k]) pm[k] = {n:0, w:0, pnl:0};
      pm[k].n++; if(t.result==='win') pm[k].w++; pm[k].pnl += (t.pnl_pct||0);
    });
    const setups = Object.keys(pm).map(name => ({
      name, n:pm[name].n, wr:Math.round(pm[name].w/pm[name].n*100),
      pnl:pm[name].pnl, avg:pm[name].pnl/pm[name].n
    })).sort((a,b) => b.n - a.n);

    const wins   = trades.filter(t => t.result==='win');
    const losses = trades.filter(t => t.result==='loss');
    const avgW   = wins.length   ? wins.reduce((s,t)=>s+(t.pnl_pct||0),0)/wins.length : 0;
    const avgL   = losses.length ? Math.abs(losses.reduce((s,t)=>s+(t.pnl_pct||0),0)/losses.length) : 0;
    const rr     = avgL > 0 ? (avgW/avgL).toFixed(2) : '∞';
    const expect = avgW*(wins.length/trades.length) - avgL*(losses.length/trades.length);
    const pf     = avgL > 0 ? ((wins.length*avgW)/(losses.length*avgL)).toFixed(2) : '∞';

    return `<div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">Ключевые метрики</div>
        ${[
          {l:'Средний выигрыш', v:'+'+(avgW.toFixed(2))+'%', c:'var(--g)'},
          {l:'Средний убыток',  v:'-'+(avgL.toFixed(2))+'%', c:'var(--r)'},
          {l:'Risk:Reward',     v:rr,                        c:'var(--a)'},
          {l:'Profit Factor',   v:pf,                        c:parseFloat(pf)>=1?'var(--g)':'var(--r)'},
          {l:'Матожидание',     v:(expect>=0?'+':'')+expect.toFixed(2)+'%', c:expect>=0?'var(--g)':'var(--r)'},
        ].map(r=>`<div class="an-stat-row"><span class="an-stat-label">${r.l}</span><span class="an-stat-val" style="color:${r.c}">${r.v}</span></div>`).join('')}
      </div>
      <div class="an-card" style="grid-column:span 2">
        <div class="an-card-title">По сетапам</div>
        ${setups.map(s => {
          const c = s.wr>=60?'var(--g)':s.wr>=45?'var(--a)':'var(--r)';
          return `<div class="an-bar-row">
            <div class="an-bar-head">
              <span class="an-bar-label">${s.name} <span style="color:var(--m2);font-size:8px">(${s.n} сд.)</span></span>
              <span class="an-bar-meta">WR: <span style="color:${c}">${s.wr}%</span> · avg: <span style="color:${s.avg>=0?'var(--g)':'var(--r)'}">${s.avg>=0?'+':''}${s.avg.toFixed(1)}%</span></span>
            </div>
            <div class="an-bar-track"><div class="an-bar-fill" style="width:${s.wr}%;background:${c}"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (tab === 'time') {
    const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const byDow = {};
    trades.forEach(t => {
      const d = new Date(t.created_at).getDay();
      if (!byDow[d]) byDow[d] = {n:0,w:0,pnl:0};
      byDow[d].n++; if(t.result==='win') byDow[d].w++; byDow[d].pnl+=(t.pnl_pct||0);
    });
    const byHour = {};
    trades.forEach(t => {
      const h = new Date(t.created_at).getHours();
      const slot = Math.floor(h/4)*4;
      const label = slot+':00–'+(slot+4)+':00';
      if (!byHour[label]) byHour[label] = {n:0,w:0};
      byHour[label].n++; if(t.result==='win') byHour[label].w++;
    });
    return `<div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">По дням недели</div>
        ${Object.keys(byDow).map(d => {
          const dd = byDow[d]; const c = dd.wr>=55?'var(--g)':dd.wr>=45?'var(--a)':'var(--r)'; const wr=Math.round(dd.w/dd.n*100);
          return `<div class="an-stat-row"><span class="an-stat-label">${days[d]} <span style="color:var(--m2);font-size:8px">(${dd.n})</span></span><span class="an-stat-val" style="color:${c}">${wr}% WR</span></div>`;
        }).join('')}
      </div>
      <div class="an-card">
        <div class="an-card-title">По времени суток</div>
        ${Object.entries(byHour).map(([label,v]) => {
          const wr=Math.round(v.w/v.n*100); const c=wr>=55?'var(--g)':wr>=45?'var(--a)':'var(--r)';
          return `<div class="an-stat-row"><span class="an-stat-label">${label}</span><span class="an-stat-val" style="color:${c}">${wr}% WR</span></div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if (tab === 'streaks') {
    let maxWS=0,maxLS=0,curW=0,curL=0;
    [...trades].reverse().forEach(t => {
      if(t.result==='win'){curW++;curL=0;maxWS=Math.max(maxWS,curW);}
      else if(t.result==='loss'){curL++;curW=0;maxLS=Math.max(maxLS,curL);}
    });
    const last10 = trades.slice(0,10).map(t => t.result==='win'?'🟢':t.result==='loss'?'🔴':'🟡').join(' ');
    return `<div class="an-grid">
      <div class="an-card">
        <div class="an-card-title">Серии</div>
        <div class="an-stat-row"><span class="an-stat-label">Макс. серия побед</span><span class="an-stat-val" style="color:var(--g)">${maxWS}</span></div>
        <div class="an-stat-row"><span class="an-stat-label">Макс. серия убытков</span><span class="an-stat-val" style="color:var(--r)">${maxLS}</span></div>
        <div class="an-stat-row"><span class="an-stat-label">Текущая серия W</span><span class="an-stat-val" style="color:var(--g)">${curW}</span></div>
        <div class="an-stat-row"><span class="an-stat-label">Текущая серия L</span><span class="an-stat-val" style="color:var(--r)">${curL}</span></div>
      </div>
      <div class="an-card">
        <div class="an-card-title">Последние 10</div>
        <div style="font-size:18px;letter-spacing:2px;padding:10px 0">${last10 || '—'}</div>
      </div>
    </div>`;
  }

  if (tab === 'psych') {
    const em = [
      {l:'Уверенность', k:'emotion_conf'},
      {l:'Страх',       k:'emotion_fear'},
      {l:'Жадность',    k:'emotion_greed'},
      {l:'Фокус',       k:'emotion_calm'},
    ];
    return `<div class="an-grid">
      ${em.map(e => {
        const hi = trades.filter(t=>(t[e.k]||0)>6);
        const lo = trades.filter(t=>(t[e.k]||0)>0&&(t[e.k]||0)<=4);
        const avgHi = hi.length ? (hi.reduce((s,t)=>s+(t.pnl_pct||0),0)/hi.length).toFixed(1) : null;
        const avgLo = lo.length ? (lo.reduce((s,t)=>s+(t.pnl_pct||0),0)/lo.length).toFixed(1) : null;
        return `<div class="an-card">
          <div class="an-card-title">${e.l}</div>
          ${avgHi!=null?`<div class="an-stat-row"><span class="an-stat-label">Высокий (>6)</span><span class="an-stat-val" style="color:${parseFloat(avgHi)>=0?'var(--g)':'var(--r)'}">${parseFloat(avgHi)>=0?'+':''}${avgHi}%</span></div>`:''}
          ${avgLo!=null?`<div class="an-stat-row"><span class="an-stat-label">Низкий (≤4)</span><span class="an-stat-val" style="color:${parseFloat(avgLo)>=0?'var(--g)':'var(--r)'}">${parseFloat(avgLo)>=0?'+':''}${avgLo}%</span></div>`:''}
          ${!avgHi&&!avgLo?`<div class="an-empty">Нет данных</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }
  return '';
}

// ── INSIGHTS ─────────────────────────────────────
function renderInsights(trades) {
  if (trades.length < 3) return `<div style="grid-column:span 2;text-align:center;padding:20px;font-size:9px;color:var(--m2)">Нужно больше сделок для анализа</div>`;
  const avgPnl = arr => arr.length ? arr.reduce((s,t)=>s+(t.pnl_pct||0),0)/arr.length : 0;
  const insights = [];
  const hFear = trades.filter(t=>(t.emotion_fear||0)>7); if(hFear.length>=2) insights.push({cond:'😰 Страх > 7', pnl:avgPnl(hFear), n:hFear.length});
  const gConf = trades.filter(t=>{ const c=t.emotion_conf||0; return c>=6&&c<=8; }); if(gConf.length>=2) insights.push({cond:'💪 Уверенность 6–8', pnl:avgPnl(gConf), n:gConf.length});
  const hGreed = trades.filter(t=>(t.emotion_greed||0)>7); if(hGreed.length>=2) insights.push({cond:'💰 Жадность > 7', pnl:avgPnl(hGreed), n:hGreed.length});
  const hCalm = trades.filter(t=>(t.emotion_calm||0)>7); if(hCalm.length>=2) insights.push({cond:'🎯 Фокус > 7', pnl:avgPnl(hCalm), n:hCalm.length});
  if (!insights.length) return `<div style="grid-column:span 2;text-align:center;padding:20px;font-size:9px;color:var(--m2)">Заполняй эмоции в сделках для анализа</div>`;
  return insights.map(ins => {
    const pos = ins.pnl >= 0;
    return `<div class="insight-card">
      <div class="ic-cond">${ins.cond}</div>
      <div class="ic-result ${pos?'pos':'neg'}">${pos?'+':''}${ins.pnl.toFixed(1)}%</div>
      <div class="ic-sub">avg из ${ins.n} сделок</div>
    </div>`;
  }).join('');
}

// ── EQUITY CANVAS ────────────────────────────────
function renderEquity(trades) {
  const canvas = document.getElementById('eq-canvas');
  if (!canvas || trades.length < 2) return;
  const sorted = [...trades].sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  const W = canvas.parentElement.offsetWidth || 700, H = 130;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  let cum = 0;
  const pts = [{y:0}];
  sorted.forEach(t => { cum += (t.pnl_pct||0); pts.push({y:cum, res:t.result}); });
  const minY = Math.min(...pts.map(p=>p.y)), maxY = Math.max(...pts.map(p=>p.y)), rng = maxY-minY||1;
  const px=14, py=10, cW=W-px*2, cH=H-py*2;
  const tx = i => px + i/(pts.length-1)*cW;
  const ty = v => py + cH - ((v-minY)/rng)*cH;
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(px,ty(0)); ctx.lineTo(px+cW,ty(0)); ctx.stroke();
  ctx.setLineDash([]);
  const isGreen = cum >= 0;
  const color = isGreen ? '#2ecc71' : '#e74c3c';
  const grad = ctx.createLinearGradient(0,py,0,H);
  grad.addColorStop(0, isGreen ? 'rgba(46,204,113,0.2)' : 'rgba(231,76,60,0.18)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(tx(0),ty(0));
  pts.forEach((p,i) => ctx.lineTo(tx(i), ty(p.y)));
  ctx.lineTo(tx(pts.length-1),ty(0)); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
  ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(tx(i),ty(p.y)) : ctx.lineTo(tx(i),ty(p.y))); ctx.stroke();
  ctx.shadowBlur = 0;
  pts.slice(1).forEach((p,i) => {
    ctx.beginPath(); ctx.arc(tx(i+1),ty(p.y),2,0,Math.PI*2);
    ctx.fillStyle = p.res==='win'?'#2ecc71':'#e74c3c'; ctx.fill();
  });
}

// ── HEATMAP ──────────────────────────────────────
function renderHeatmap(trades) {
  const wrap = document.getElementById('hm-wrap');
  if (!wrap) return;
  const byDay = {};
  trades.forEach(t => {
    if (!t.created_at) return;
    const dt = new Date(t.created_at);
    const d = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    if (!byDay[d]) byDay[d] = {n:0,pnl:0,wins:0};
    byDay[d].n++; byDay[d].pnl += (t.pnl_pct||0);
    if (t.result==='win') byDay[d].wins++;
  });
  const WEEKS=20, today=new Date(); today.setHours(0,0,0,0);
  const dow=today.getDay();
  const curMon=new Date(today); curMon.setDate(today.getDate()-(dow===0?6:dow-1));
  const startDate=new Date(curMon); startDate.setDate(curMon.getDate()-(WEEKS-1)*7);
  const months=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  let lastMo=-1, html='<div class="hm-weeks">';
  for(let w=0;w<WEEKS;w++){
    html+='<div class="hm-week">';
    const fd=new Date(startDate); fd.setDate(startDate.getDate()+w*7);
    const mo=fd.getMonth();
    html+=`<div class="hm-month">${mo!==lastMo?(lastMo=mo,months[mo]):''}</div>`;
    for(let d=0;d<7;d++){
      const dt=new Date(startDate); dt.setDate(startDate.getDate()+w*7+d);
      const key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
      const isFuture=dt>today; const dd=byDay[key];
      let bg='rgba(255,255,255,0.04)', glow='', tip=key;
      if(!isFuture&&dd){
        const intensity=Math.min(1,0.25+dd.n*0.2);
        bg=dd.pnl>=0?`rgba(46,204,113,${intensity})`:`rgba(231,76,60,${intensity})`;
        if(dd.n>=3)glow=`box-shadow:0 0 5px ${dd.pnl>=0?'rgba(46,204,113,0.4)':'rgba(231,76,60,0.4)'}`;
        const wr=Math.round(dd.wins/dd.n*100);
        tip=dt.toLocaleDateString('ru-RU',{weekday:'short',day:'2-digit',month:'short'})+` · ${dd.n} сд. · WR ${wr}% · ${(dd.pnl>=0?'+':'')+dd.pnl.toFixed(1)}%`;
      } else if(!isFuture) { tip=dt.toLocaleDateString('ru-RU',{weekday:'short',day:'2-digit',month:'short'})+' · нет сделок'; }
      html+=`<div class="hm-cell" style="background:${bg};${glow}"><div class="hm-tip">${tip}</div></div>`;
    }
    html+='</div>';
  }
  html+='</div>';
  html+=`<div class="hm-legend">Меньше
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.04)"></div>
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(46,204,113,0.5)"></div>
    Больше
    <div style="width:10px;height:10px;border-radius:2px;background:rgba(231,76,60,0.5);margin-left:8px"></div>
    Убыток
  </div>`;
  wrap.innerHTML = html;
}

// ── PAIRS ─────────────────────────────────────────
function calcPairs(trades) {
  const pm = {};
  trades.forEach(t => {
    if (!t.pair) return;
    if (!pm[t.pair]) pm[t.pair] = {n:0,w:0,pnl:0};
    pm[t.pair].n++; if(t.result==='win') pm[t.pair].w++; pm[t.pair].pnl+=(t.pnl_pct||0);
  });
  return Object.keys(pm).map(name=>({
    name, n:pm[name].n, wr:Math.round(pm[name].w/pm[name].n*100), pnl:pm[name].pnl
  })).sort((a,b)=>b.n-a.n);
}

// ── AVATAR UPLOAD ─────────────────────────────────
async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file || !currentUser) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Максимум 2MB', 'err'); return; }
  try {
    const ext = file.name.split('.').pop();
    const path = `avatars/${currentUser.id}.${ext}`;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
    if (upErr) throw upErr;
    const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
    await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id);
    const av = document.getElementById('hero-avatar');
    if (av) av.innerHTML = `<img src="${publicUrl}?t=${Date.now()}" alt="">`;
    showToast('✓ Фото обновлено', 'ok');
  } catch(e) { showToast('Ошибка загрузки: ' + e.message, 'err'); }
}

async function checkFollow(uid) {

  const btn = document.getElementById('follow-btn');
  if (btn && data) { btn.classList.add('following'); btn.textContent = '✓ Following'; }
}

async function toggleFollow() {
  if (!currentUser || !profileUser) return;
  const btn = document.getElementById('follow-btn');
  if (!btn) return;
  const isFollowing = btn.classList.contains('following');
  btn.disabled = true;
  try {
    if (isFollowing) {
      await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('target_id', profileUser.id);
      btn.classList.remove('following'); btn.textContent = '+ FOLLOW';
    } else {
      await sb.from('follows').insert({ follower_id: currentUser.id, target_id: profileUser.id });
      btn.classList.add('following'); btn.textContent = '✓ FOLLOWING';
    }
    loadFollowStats(profileUser.id);
  } catch(e) { console.warn('Follow error:', e); }
  btn.disabled = false;
}

async function loadFollowStats(uid) {
  const [{ count: fwing }, { count: fwers }] = await Promise.all([
    sb.from('follows').select('*', {count:'exact',head:true}).eq('follower_id', uid),
    sb.from('follows').select('*', {count:'exact',head:true}).eq('target_id', uid),
  ]).catch(() => [{count:0},{count:0}]);
  const el1 = document.getElementById('fs-following');
  const el2 = document.getElementById('fs-followers');
  if (el1) el1.textContent = fwing || 0;
  if (el2) el2.textContent = fwers || 0;
}

// ── IDEAS ─────────────────────────────────────────
let _ideaTypeSelected = 'bullish';
function openIdeaModal()  { document.getElementById('idea-modal').classList.add('open'); }
function closeIdeaModal() { document.getElementById('idea-modal').classList.remove('open'); }
function setIdeaType(t, btn) {
  _ideaTypeSelected = t;
  document.querySelectorAll('.idea-type-btn').forEach(b => b.classList.remove('sel-bull','sel-bear','sel-neut'));
  btn.classList.add(t==='bullish'?'sel-bull':t==='bearish'?'sel-bear':'sel-neut');
}
async function submitIdea() {
  const pair  = document.getElementById('idea-pair')?.value || '';
  const title = document.getElementById('idea-title')?.value || '';
  const body  = document.getElementById('idea-body')?.value || '';
  const entry = document.getElementById('idea-entry')?.value || null;
  const tp    = document.getElementById('idea-tp')?.value || null;
  const sl    = document.getElementById('idea-sl')?.value || null;
  if (!pair || !title || !body) { showToast('Заполни пару, заголовок и описание', 'err'); return; }
  const { error } = await sb.from('ideas').insert({ user_id:currentUser.id, pair:pair.toUpperCase(), title, body, direction:_ideaTypeSelected, entry, tp, sl, status:'active' });
  if (error) { showToast('Ошибка: ' + error.message, 'err'); return; }
  closeIdeaModal();
  loadIdeas(currentUser.id);
  showToast('✓ Идея опубликована', 'ok');
}
async function loadIdeas(uid) {
  const body = document.getElementById('ideas-body');
  if (!body) return;
  try {
    const { data } = await sb.from('ideas').select('*').eq('user_id', uid).order('created_at', { ascending: false });
    if (!data?.length) { body.innerHTML = `<div class="feed-empty">Идей пока нет.${isOwnProfile?' Опубликуй первый разбор!':''}</div>`; return; }
    body.innerHTML = data.map(idea => {
      const typeLabel = {bullish:'📈 ЛОНГ',bearish:'📉 ШОРТ',neutral:'➡️ НЕЙТРАЛЬНО'};
      const d = new Date(idea.created_at).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="idea-card">
        <div class="idea-top">
          <span class="idea-pair">${idea.pair||'?'}</span>
          <span class="idea-type ${idea.direction||'neutral'}">${typeLabel[idea.direction]||'РАЗБОР'}</span>
        </div>
        <div class="idea-title">${esc(idea.title||'')}</div>
        <div class="idea-body">${esc(idea.body||'').replace(/\n/g,'<br>')}</div>
        ${idea.entry||idea.tp||idea.sl?`<div class="idea-targets">${idea.entry?`<span class="idea-target">🎯 ${idea.entry}</span>`:''}${idea.tp?`<span class="idea-target">✅ TP: ${idea.tp}</span>`:''}${idea.sl?`<span class="idea-target">❌ SL: ${idea.sl}</span>`:''}</div>`:''}
        <div class="idea-footer">
          <span class="idea-date">${d}</span>
          ${isOwnProfile?`<button class="idea-del-btn" onclick="deleteIdea('${idea.id}')">✕ Удалить</button>`:''}
        </div>
      </div>`;
    }).join('');
  } catch(e) { body.innerHTML = '<div class="feed-empty">Таблица ideas не найдена</div>'; }
}
async function deleteIdea(id) {
  if (!confirm('Удалить идею?')) return;
  await sb.from('ideas').delete().eq('id', id);
  loadIdeas(profileUser?.id || currentUser?.id);
}

(function restoreTheme() {

  document.documentElement.setAttribute('data-theme', t);

function waitAndInit() {
  if (typeof supabase !== 'undefined') { init(); return; }
  const t = setInterval(() => { if (typeof supabase !== 'undefined') { clearInterval(t); init(); } }, 100);
  setTimeout(() => clearInterval(t), 8000);
}
document.addEventListener('DOMContentLoaded', waitAndInit);
