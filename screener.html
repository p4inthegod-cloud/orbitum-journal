<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbitum · Screener</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.mjs" type="module" id="lwc-script"></script>
<style>
/* ── TOKENS ── */
:root {
  --bg:    #06080c;
  --bg2:   #0c0f15;
  --bg3:   #111520;
  --bg4:   #161b24;
  --bd:    rgba(255,255,255,0.07);
  --bd2:   rgba(255,255,255,0.12);
  --t:     #e8eaf0;
  --m:     rgba(232,234,240,0.55);
  --m2:    rgba(232,234,240,0.25);
  --a:     #e8722a;
  --a2:    rgba(232,114,42,0.15);
  --g:     #2ecc71;
  --r:     #e74c3c;
  --y:     #f0c040;
  --radius:8px;
  --font-mono:'JetBrains Mono',monospace;
  --font-ui:'Inter',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f4f5f7; --bg2:#ffffff; --bg3:#eaecf0; --bg4:#dde0e6;
  --bd:rgba(0,0,0,0.08); --bd2:rgba(0,0,0,0.14);
  --t:#141820; --m:rgba(20,24,32,0.6); --m2:rgba(20,24,32,0.3);
}

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:var(--font-ui);font-size:13px;min-height:100vh;overflow:hidden;}
button{cursor:pointer;font-family:inherit;}
img{display:block;}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:52px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:4px;z-index:10;
}
.sb-logo{width:32px;height:32px;margin-bottom:12px;border-radius:8px;overflow:hidden;}
.sb-logo img{width:100%;height:100%;object-fit:cover;}
.sb-btn{
  width:36px;height:36px;border-radius:8px;border:none;
  background:transparent;color:var(--m);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .15s;position:relative;
}
.sb-btn:hover{background:var(--a2);color:var(--a);}
.sb-btn.active{background:var(--a2);color:var(--a);}
.sb-btn[title]:hover::after{
  content:attr(title);position:absolute;left:44px;top:50%;transform:translateY(-50%);
  background:var(--bg3);color:var(--t);font-size:11px;padding:4px 8px;border-radius:5px;
  white-space:nowrap;z-index:100;border:1px solid var(--bd2);pointer-events:none;
}
.sb-sep{width:24px;height:1px;background:var(--bd);margin:4px 0;}
.sb-bottom{margin-top:auto;}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{
  height:44px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;padding:0 12px;
}
.tb-title{font-size:11px;color:var(--m2);letter-spacing:2px;font-family:var(--font-mono);margin-right:4px;}

/* Filters */
.filter-row{display:flex;gap:3px;flex-shrink:0;}
.flt-btn{
  height:26px;padding:0 10px;border-radius:5px;border:1px solid transparent;
  background:transparent;color:var(--m);font-size:11px;letter-spacing:.5px;
  transition:all .12s;font-family:var(--font-mono);
}
.flt-btn:hover{color:var(--t);background:var(--bg3);}
.flt-btn.active{color:var(--a);background:var(--a2);border-color:rgba(232,114,42,0.25);}

/* Sort */
.sort-row{display:flex;gap:2px;flex-shrink:0;margin-left:4px;}
.sort-btn{
  height:26px;padding:0 8px;border-radius:5px;border:1px solid transparent;
  background:transparent;color:var(--m2);font-size:10px;letter-spacing:.5px;
  transition:all .12s;font-family:var(--font-mono);
}
.sort-btn.active{color:var(--t);background:var(--bg3);}

/* Search */
.tb-search{
  height:28px;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
  color:var(--t);font-size:12px;padding:0 10px;outline:none;width:140px;
  font-family:var(--font-mono);transition:border-color .15s;margin-left:auto;
}
.tb-search:focus{border-color:rgba(232,114,42,0.4);}
.tb-search::placeholder{color:var(--m2);}

/* View toggle */
.view-btns{display:flex;gap:2px;flex-shrink:0;}
.view-btn{
  width:26px;height:26px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m2);font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.view-btn.active{color:var(--a);background:var(--a2);border-color:rgba(232,114,42,0.25);}

/* Live indicator */
.live-ind{
  display:flex;align-items:center;gap:5px;
  font-size:9px;color:var(--m2);letter-spacing:1px;font-family:var(--font-mono);
  flex-shrink:0;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--m2);transition:background .3s;}
.live-ind.live .live-dot{background:var(--g);box-shadow:0 0 6px var(--g);}
.live-ind.stale .live-dot{background:var(--y);}

/* Theme toggle */
.theme-btn{
  height:26px;padding:0 8px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:11px;letter-spacing:.5px;
  transition:all .12s;
}
.theme-btn:hover{color:var(--t);}

/* ── SIGNALS TICKER ── */
.signals-bar{
  height:28px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);
  overflow:hidden;display:flex;align-items:center;
}
.signals-track{display:flex;gap:0;white-space:nowrap;will-change:transform;}
.signal-item{
  display:inline-flex;align-items:center;gap:6px;
  padding:0 14px;height:28px;border-right:1px solid var(--bd);
  font-size:10px;font-family:var(--font-mono);letter-spacing:.5px;cursor:pointer;
  transition:background .12s;flex-shrink:0;
}
.signal-item:hover{background:var(--bg3);}
.signal-item .si-sym{color:var(--t);font-weight:600;}
.signal-item .si-type{
  padding:1px 5px;border-radius:3px;font-size:8px;letter-spacing:1px;
}
.signal-item.pump .si-type{background:rgba(46,204,113,0.15);color:var(--g);}
.signal-item.dump .si-type{background:rgba(231,76,60,0.12);color:var(--r);}
.signal-item.break-high .si-type{background:rgba(232,114,42,0.15);color:var(--a);}
.signal-item.break-low .si-type{background:rgba(231,76,60,0.1);color:var(--r);}
.signal-item.vol .si-type{background:rgba(59,130,246,0.15);color:#3b82f6;}
.signal-item .si-val{color:var(--m2);}

/* ── STATS STRIP ── */
.stats-strip{
  height:30px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:0;overflow:hidden;
}
.ss-item{
  display:flex;align-items:center;gap:6px;padding:0 12px;height:100%;
  border-right:1px solid var(--bd);font-size:10px;font-family:var(--font-mono);
}
.ss-lbl{color:var(--m2);letter-spacing:.5px;}
.ss-val{color:var(--t);font-weight:600;}
.ss-chg{font-size:9px;padding:1px 4px;border-radius:3px;}
.ss-chg.up{color:var(--g);background:rgba(46,204,113,0.1);}
.ss-chg.dn{color:var(--r);background:rgba(231,76,60,0.1);}
.ss-gainer,.ss-loser{display:flex;align-items:center;gap:5px;padding:0 10px;height:100%;
  border-right:1px solid var(--bd);font-size:10px;font-family:var(--font-mono);}
.ss-g-label{color:var(--m2);}
.ss-g-sym{color:var(--t);font-weight:600;}
.ss-g-chg{font-size:9px;}
.fng-pill{
  padding:0 12px;height:100%;display:flex;align-items:center;gap:5px;
  font-size:10px;font-family:var(--font-mono);
}
.fng-label{color:var(--m2);}
.fng-val{font-weight:700;}
.fng-val.greed{color:var(--g);}
.fng-val.fear{color:var(--r);}
.fng-val.neutral{color:var(--y);}

/* ── CONTENT AREA ── */
.content-area{flex:1;overflow-y:auto;padding:10px;position:relative;}
.content-area::-webkit-scrollbar{width:4px;}
.content-area::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── LOADING / ERROR ── */
.load-msg{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.load-spinner{
  width:28px;height:28px;border:2px solid var(--bd2);
  border-top-color:var(--a);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:11px;color:var(--m2);letter-spacing:2px;font-family:var(--font-mono);}
.err-box{
  background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);
  border-radius:8px;padding:16px;max-width:340px;text-align:center;
}
.err-title{font-size:12px;color:var(--r);letter-spacing:1px;margin-bottom:6px;font-family:var(--font-mono);}
.err-msg{font-size:11px;color:var(--m);line-height:1.6;}
.err-retry{
  margin-top:12px;padding:6px 16px;background:transparent;
  border:1px solid var(--r);color:var(--r);border-radius:5px;font-size:11px;
}

/* ── GRID ── */
.coins-grid{
  display:grid;gap:6px;
  grid-template-columns:repeat(auto-fill,minmax(172px,1fr));
}
.coins-grid.view-large{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}

/* ── COIN CARD ── */
.coin-card{
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--radius);padding:9px 11px;cursor:pointer;
  transition:border-color .15s,background .15s;
  position:relative;overflow:hidden;user-select:none;
}
.coin-card:hover{border-color:rgba(232,114,42,0.35);background:var(--bg3);}
.coin-card.watched{border-color:rgba(240,192,64,0.3);}
.coin-card.has-alert{border-color:rgba(232,114,42,0.2);}

/* Card top row */
.cc-top{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.cc-rank{font-size:7.5px;color:var(--m2);min-width:18px;flex-shrink:0;font-family:var(--font-mono);}
.cc-ico{width:16px;height:16px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.cc-ico-ph{
  width:16px;height:16px;border-radius:50%;flex-shrink:0;
  background:var(--a2);display:flex;align-items:center;justify-content:center;
  font-size:7px;color:var(--a);font-weight:700;
}
.cc-sym{font-size:11px;font-weight:700;color:var(--t);flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-mono);}
.cc-chg{font-size:9.5px;font-weight:600;flex-shrink:0;font-family:var(--font-mono);}
.cc-chg.up{color:var(--g);}
.cc-chg.dn{color:var(--r);}
/* action buttons — always visible */
.cc-actions{display:flex;gap:2px;flex-shrink:0;position:relative;z-index:2;}
.cc-btn{
  width:20px;height:20px;border-radius:4px;border:1px solid var(--bd);
  background:transparent;color:var(--m2);font-size:10px;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;padding:0;line-height:1;
}
.cc-btn:hover{background:var(--a2);color:var(--a);border-color:rgba(232,114,42,0.3);}
.cc-btn.watch-active{color:var(--y);background:rgba(240,192,64,0.08);border-color:rgba(240,192,64,0.25);}
.cc-btn.alert-active{color:var(--a);background:var(--a2);border-color:rgba(232,114,42,0.3);}

/* Price */
.cc-price{
  font-size:14px;font-weight:700;color:var(--t);
  font-family:var(--font-mono);margin-bottom:6px;
  transition:color .2s;
}
.cc-price.flash-up{color:var(--g);}
.cc-price.flash-dn{color:var(--r);}

/* 3×2 mini metrics */
.cc-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:2px 6px;margin-bottom:5px;}
.cc-m{display:flex;flex-direction:column;}
.cc-ml{font-size:6px;color:var(--m2);letter-spacing:1px;text-transform:uppercase;font-family:var(--font-mono);}
.cc-mv{font-size:9px;color:var(--m);font-family:var(--font-mono);}
.cc-mv.up{color:var(--g);}
.cc-mv.dn{color:var(--r);}
.cc-mv.warn{color:var(--y);}
.cc-mv.hot{color:var(--a);}

/* RSI badge */
.cc-rsi{
  display:inline-block;font-size:8px;padding:1px 5px;border-radius:3px;
  font-family:var(--font-mono);margin-left:3px;vertical-align:middle;
}
.cc-rsi.ob{background:rgba(231,76,60,0.15);color:var(--r);}
.cc-rsi.os{background:rgba(46,204,113,0.12);color:var(--g);}
.cc-rsi.mid{background:rgba(255,255,255,0.05);color:var(--m2);}

/* Sparkline */
.cc-spark{height:28px;width:100%;overflow:hidden;border-radius:2px;margin-bottom:4px;}
.cc-spark canvas{width:100%!important;height:28px!important;}

/* Volume bar */
.cc-volbar{height:1.5px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;}
.cc-volfill{height:100%;background:rgba(232,114,42,0.4);border-radius:1px;transition:width .4s;}

/* ── LIST VIEW ── */
.coins-list{display:flex;flex-direction:column;gap:2px;}
.list-row{
  display:grid;align-items:center;
  grid-template-columns:18px 20px 90px 1fr 80px 70px 70px 70px 26px 26px;
  gap:6px;padding:7px 10px;border-radius:var(--radius);
  background:var(--bg2);border:1px solid var(--bd);cursor:pointer;
  transition:border-color .12s;font-family:var(--font-mono);
}
.list-row:hover{border-color:rgba(232,114,42,0.3);background:var(--bg3);}
.list-row.watched{border-color:rgba(240,192,64,0.2);}
.lr-rank{font-size:9px;color:var(--m2);}
.lr-ico{width:18px;height:18px;border-radius:50%;object-fit:cover;}
.lr-sym{font-size:11px;font-weight:700;color:var(--t);}
.lr-name{font-size:10px;color:var(--m2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lr-price{font-size:11px;color:var(--t);text-align:right;}
.lr-chg{font-size:10px;font-weight:600;text-align:right;}
.lr-chg.up{color:var(--g);}
.lr-chg.dn{color:var(--r);}
.lr-vol{font-size:9px;color:var(--m);text-align:right;}
.lr-mcap{font-size:9px;color:var(--m2);text-align:right;}
.list-header{
  display:grid;align-items:center;
  grid-template-columns:18px 20px 90px 1fr 80px 70px 70px 70px 26px 26px;
  gap:6px;padding:4px 10px;margin-bottom:2px;
}
.lh-cell{font-size:8px;color:var(--m2);letter-spacing:1px;text-transform:uppercase;
  font-family:var(--font-mono);text-align:right;}
.lh-cell:nth-child(1),.lh-cell:nth-child(2),.lh-cell:nth-child(3){text-align:left;}

/* ── DETAIL PANEL ── */
.detail-overlay{
  display:none;position:fixed;inset:0;z-index:490;
  background:rgba(0,0,6,0.5);backdrop-filter:blur(2px);
  transition:opacity .2s;opacity:0;
}
.detail-overlay.open{display:block;opacity:1;}
.detail-panel{
  display:flex;flex-direction:column;
  position:fixed;top:0;right:-480px;width:480px;height:100vh;
  background:linear-gradient(180deg,#0d1017 0%,#080c10 100%);
  border-left:1px solid rgba(232,114,42,0.15);
  z-index:500;transition:right .3s cubic-bezier(.4,0,.2,1);
  overflow:hidden;box-shadow:-12px 0 60px rgba(0,0,0,0.6);
}
.detail-panel.open{right:0;}

/* Panel head */
.dp-head{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;
}
.dp-icon{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.dp-info{flex:1;min-width:0;}
.dp-sym{font-size:16px;font-weight:700;color:var(--t);font-family:var(--font-mono);}
.dp-full{font-size:10px;color:var(--m2);}
.dp-close{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.dp-close:hover{background:rgba(231,76,60,0.12);color:var(--r);border-color:rgba(231,76,60,0.2);}

/* Panel body */
.dp-body{flex:1;overflow-y:auto;padding:14px 16px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* Price block */
.dp-price-block{margin-bottom:12px;}
.dp-price{font-size:26px;font-weight:700;color:var(--t);font-family:var(--font-mono);letter-spacing:-0.5px;}
.dp-chg-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.dp-tf-chg{
  display:flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;
  font-family:var(--font-mono);
}
.dp-tf-chg .tf-label{font-size:8px;color:var(--m2);letter-spacing:1px;}
.dp-tf-chg.up{color:var(--g);background:rgba(46,204,113,0.08);}
.dp-tf-chg.dn{color:var(--r);background:rgba(231,76,60,0.08);}

/* Actions */
.dp-actions{display:flex;gap:6px;margin-bottom:14px;}
.dp-btn{
  flex:1;height:32px;border-radius:6px;border:1px solid var(--bd2);
  background:transparent;color:var(--m);font-size:10px;
  font-family:var(--font-mono);letter-spacing:.5px;transition:all .15s;
}
.dp-btn:hover{border-color:rgba(232,114,42,0.4);color:var(--a);background:var(--a2);}
.dp-btn.primary{background:var(--a);border-color:var(--a);color:#fff;font-weight:600;}
.dp-btn.primary:hover{background:#d4661e;}
.dp-btn.watched{color:var(--y);border-color:rgba(240,192,64,0.3);background:rgba(240,192,64,0.06);}

/* ── LW CHART SECTION ── */
.dp-chart-section{margin-bottom:14px;}
.dp-chart-head{
  display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.dp-chart-label{font-size:8px;color:var(--m2);letter-spacing:2px;font-family:var(--font-mono);}
.dp-tf-row{display:flex;gap:2px;margin-left:auto;}
.dp-tf-btn{
  height:22px;padding:0 7px;border-radius:4px;border:1px solid transparent;
  background:transparent;color:var(--m2);font-size:8px;letter-spacing:.5px;
  font-family:var(--font-mono);transition:all .12s;
}
.dp-tf-btn:hover{color:var(--t);}
.dp-tf-btn.active{color:var(--a);background:var(--a2);border-color:rgba(232,114,42,0.25);}

/* Indicators row */
.dp-ind-row{display:flex;gap:2px;}
.dp-ind-btn{
  height:20px;padding:0 6px;border-radius:4px;border:1px solid var(--bd);
  background:transparent;color:var(--m2);font-size:7.5px;letter-spacing:.5px;
  font-family:var(--font-mono);transition:all .12s;
}
.dp-ind-btn.active{color:var(--t);background:var(--bg3);border-color:var(--bd2);}
.dp-ind-btn:hover{color:var(--t);}

/* OHLCV info bar */
.dp-ohlcv{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:rgba(255,255,255,0.02);border-radius:5px;padding:5px 8px;
  margin:6px 0;
}
.dp-oi{display:flex;align-items:center;gap:3px;font-size:9px;font-family:var(--font-mono);}
.dp-oi-l{color:var(--m2);font-size:7.5px;letter-spacing:.5px;}
.dp-ohlcv .spacer{flex:1;}

/* Chart container */
.dp-chart-wrap{
  border:1px solid rgba(232,114,42,0.12);border-radius:6px;
  overflow:hidden;position:relative;height:260px;background:#06080c;
}
#dp-lwc-container{width:100%;height:100%;}
.dp-chart-loading{
  position:absolute;inset:0;background:#06080c;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--m2);letter-spacing:2px;font-family:var(--font-mono);
  z-index:5;transition:opacity .3s;
}

/* Alert price line info */
.dp-alert-lines{
  display:flex;flex-direction:column;gap:4px;margin-top:6px;
}
.dp-alert-line-item{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(232,114,42,0.06);border:1px solid rgba(232,114,42,0.15);
  border-radius:5px;padding:5px 8px;font-size:10px;font-family:var(--font-mono);
}
.dp-ali-price{color:var(--a);}
.dp-ali-cond{font-size:8px;color:var(--m2);letter-spacing:.5px;}
.dp-ali-del{
  width:18px;height:18px;border-radius:4px;border:none;
  background:transparent;color:var(--m2);font-size:11px;
  display:flex;align-items:center;justify-content:center;transition:color .12s;
}
.dp-ali-del:hover{color:var(--r);}

/* Metrics grid */
.dp-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.dp-metric{
  background:rgba(255,255,255,0.025);border:1px solid var(--bd);
  border-radius:6px;padding:8px 10px;
}
.dp-m-label{font-size:7.5px;color:var(--m2);letter-spacing:1.5px;font-family:var(--font-mono);margin-bottom:3px;}
.dp-m-val{font-size:12px;color:var(--t);font-family:var(--font-mono);font-weight:600;}

/* ── ALERT MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:9500;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#0d1017;border:1px solid rgba(232,114,42,0.2);
  border-radius:12px;width:360px;max-width:95vw;padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.modal-close{
  position:absolute;top:14px;right:14px;width:26px;height:26px;
  border-radius:5px;border:1px solid var(--bd);background:transparent;
  color:var(--m);font-size:14px;display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{color:var(--r);}
.modal-header{position:relative;margin-bottom:14px;}
.modal-title{font-size:13px;font-weight:700;color:var(--a);letter-spacing:1px;font-family:var(--font-mono);}
.modal-sub{font-size:10px;color:var(--m2);margin-top:3px;font-family:var(--font-mono);}

/* Condition buttons */
.cond-row{display:flex;gap:4px;margin:12px 0 8px;}
.cond-btn{
  flex:1;height:30px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:10px;letter-spacing:.5px;
  font-family:var(--font-mono);transition:all .12s;
}
.cond-btn.active-up{color:var(--g);background:rgba(46,204,113,0.1);border-color:rgba(46,204,113,0.25);}
.cond-btn.active-dn{color:var(--r);background:rgba(231,76,60,0.1);border-color:rgba(231,76,60,0.2);}
.cond-btn:hover:not(.active-up):not(.active-dn){color:var(--t);background:var(--bg3);}

/* Input */
.alert-input{
  width:100%;height:38px;background:var(--bg3);border:1px solid var(--bd2);
  border-radius:6px;color:var(--t);font-size:13px;padding:0 12px;
  font-family:var(--font-mono);outline:none;margin-bottom:8px;transition:border-color .15s;
}
.alert-input:focus{border-color:rgba(232,114,42,0.4);}
.alert-input::placeholder{color:var(--m2);}
.alert-label{font-size:9px;color:var(--m2);letter-spacing:1px;font-family:var(--font-mono);margin-bottom:4px;display:block;}

/* Repeat mode */
.repeat-row{display:flex;gap:4px;margin:10px 0;}
.repeat-btn{
  flex:1;height:28px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m2);font-size:9px;letter-spacing:.5px;
  font-family:var(--font-mono);transition:all .12s;
}
.repeat-btn.active{color:var(--t);background:var(--bg3);border-color:var(--bd2);}

/* Note */
.alert-note{
  width:100%;height:56px;background:var(--bg3);border:1px solid var(--bd2);
  border-radius:6px;color:var(--t);font-size:11px;padding:8px 12px;
  font-family:var(--font-mono);outline:none;resize:none;
  transition:border-color .15s;margin-bottom:10px;
}
.alert-note:focus{border-color:rgba(232,114,42,0.4);}

/* TG status */
.tg-status{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.03);border:1px solid var(--bd);
  border-radius:6px;padding:6px 10px;margin-bottom:12px;font-size:9px;
  font-family:var(--font-mono);color:var(--m2);
}
.tg-dot{width:6px;height:6px;border-radius:50%;background:var(--m2);flex-shrink:0;}
.tg-dot.on{background:var(--g);box-shadow:0 0 5px var(--g);}
.tg-dot.warn{background:var(--y);}

/* Create button */
.btn-create{
  width:100%;height:40px;border-radius:8px;border:none;
  background:var(--a);color:#fff;font-size:12px;font-weight:700;
  letter-spacing:1px;font-family:var(--font-mono);transition:background .15s;
}
.btn-create:hover{background:#d4661e;}
.btn-cancel{
  width:100%;height:34px;border-radius:8px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:11px;
  font-family:var(--font-mono);margin-top:6px;transition:all .12s;
}
.btn-cancel:hover{color:var(--t);}

/* ── ALERTS PANEL (sidebar) ── */
.alerts-panel{
  position:fixed;top:0;left:52px;width:300px;height:100vh;
  background:var(--bg2);border-right:1px solid var(--bd);
  z-index:400;transform:translateX(-300px);transition:transform .3s;
  display:flex;flex-direction:column;
}
.alerts-panel.open{transform:translateX(0);}
.ap-head{
  display:flex;align-items:center;gap:8px;padding:14px 14px 12px;
  border-bottom:1px solid var(--bd);flex-shrink:0;
}
.ap-title{font-size:11px;color:var(--a);letter-spacing:2px;font-family:var(--font-mono);flex:1;}
.ap-close{
  width:24px;height:24px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--m);font-size:12px;
  display:flex;align-items:center;justify-content:center;
}
.ap-close:hover{color:var(--r);}
.ap-list{flex:1;overflow-y:auto;padding:8px;}
.ap-list::-webkit-scrollbar{width:3px;}
.ap-empty{
  text-align:center;padding:32px 16px;
  font-size:11px;color:var(--m2);font-family:var(--font-mono);line-height:1.7;
}
.ap-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:6px;border:1px solid var(--bd);background:rgba(255,255,255,0.02);
  margin-bottom:5px;font-family:var(--font-mono);
}
.ap-item.triggered{opacity:.45;}
.ap-sym{font-size:11px;font-weight:700;color:var(--t);}
.ap-cond{font-size:8px;color:var(--m2);letter-spacing:.5px;margin-top:1px;}
.ap-price{font-size:11px;color:var(--a);margin-left:auto;}
.ap-del{
  width:20px;height:20px;border-radius:4px;border:none;
  background:transparent;color:var(--m2);font-size:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ap-del:hover{color:var(--r);}

/* ── HEATMAP VIEW ── */
.heatmap-wrap{width:100%;position:relative;}
.hm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:3px;}
.hm-cell{
  border-radius:5px;padding:8px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:64px;transition:filter .15s;border:1px solid rgba(255,255,255,0.04);
}
.hm-cell:hover{filter:brightness(1.2);}
.hm-sym{font-size:11px;font-weight:700;color:rgba(255,255,255,0.9);font-family:var(--font-mono);}
.hm-chg{font-size:10px;font-family:var(--font-mono);color:rgba(255,255,255,0.75);margin-top:2px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:99999;
  background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;
  padding:10px 16px;font-size:11px;font-family:var(--font-mono);
  color:var(--t);box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation:toast-in .2s ease;max-width:280px;
}
@keyframes toast-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.toast.ok{border-color:rgba(46,204,113,0.3);color:var(--g);}
.toast.err{border-color:rgba(231,76,60,0.3);color:var(--r);}

/* ── PRICE FLASH ── */
@keyframes flash-up{0%,100%{color:var(--t);}50%{color:var(--g);}}
@keyframes flash-dn{0%,100%{color:var(--t);}50%{color:var(--r);}}
.pf-up{animation:flash-up .5s ease;}
.pf-dn{animation:flash-dn .5s ease;}
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sb-logo"><img src="orbitum-logo.jpg" alt="Orbitum" onerror="this.style.display='none'"></div>

</nav>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="tb-title">ORBITUM · SCREENER</span>

    <div class="filter-row">
      <button class="flt-btn active" data-filter="all" onclick="setFilter('all',this)">ALL</button>
      <button class="flt-btn" data-filter="gainers" onclick="setFilter('gainers',this)">▲ TOP</button>

      <button class="flt-btn" data-filter="volume" onclick="setFilter('volume',this)">VOL↑</button>
      <button class="flt-btn" data-filter="ath" onclick="setFilter('ath',this)">ATH-</button>

    <div class="sort-row">

      <button class="sort-btn" data-sort="chg" onclick="setSort('chg',this)">%CHG</button>

    <input class="tb-search" id="search-inp" placeholder="Поиск..." oninput="applySearch(this.value)">

    <div class="view-btns">

// ── Config ──────────────────────────────────

const BINANCE_WS_PAIRS = [

// ── State ────────────────────────────────────

// ── Formatters ───────────────────────────────
function fmtPrice(p){
  if(p == null || isNaN(p)) return '$—';
  if(p >= 1000) return '$' + p.toLocaleString('en',{maximumFractionDigits:2});
  if(p >= 1)    return '$' + p.toFixed(4);
  if(p >= 0.01) return '$' + p.toFixed(6);
  return '$' + p.toFixed(8);
}
function fmtBig(n){
  if(!n) return '—';
  if(n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if(n >= 1e9)  return '$' + (n/1e9).toFixed(1) + 'B';
  if(n >= 1e6)  return '$' + (n/1e6).toFixed(0) + 'M';
  if(n >= 1e3)  return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function fmtChg(v){
  if(v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function calcRSI(closes, period=14){
  if(closes.length < period+1) return null;
  let gains=0, losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  if(losses===0) return 100;
  const rs=gains/losses;
  return 100 - 100/(1+rs);
}

async function safeFetch(url){

async function loadCoins(){
  showLoadMsg('ЗАГРУЗКА ДАННЫХ...', false);
  const cgPath = '/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=80&page=1&sparkline=true&price_change_percentage=1h,24h,7d,30d';
  const attempts = [
    'https://api.coingecko.com' + cgPath,
    'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.coingecko.com' + cgPath),
    'https://corsproxy.io/?' + encodeURIComponent('https://api.coingecko.com' + cgPath),
  ];
  let data = null;
  for(const url of attempts){
    data = await safeFetch(url);
    if(Array.isArray(data) && data.length > 0) break;
    data = null;
  }
  if(!data){
    showLoadMsg('Ошибка загрузки данных.\nПроверь подключение или попробуй позже.', true);
    return;
  }
  allCoins = data;
  document.getElementById('load-msg').style.display = 'none';
  document.getElementById('coins-container').style.display = 'block';
  renderCoins();
  updateStatsStrip();
  initWS();
  fetchFNG();
  // Schedule metadata refresh every 5 min
  setInterval(refreshMetadata, 300000);
}

async function refreshMetadata(){

  const data = await safeFetch('https://api.coingecko.com' + cgPath);

// Alert check on WS tick
function checkAlerts(cgId, price, prevPrice){
  if(!userAlerts.length) return;
  userAlerts.filter(a =>
    a.coingecko_id === cgId &&
    a.alert_type === 'price' &&
    !_triggeredAlerts.has(a.id)
  ).forEach(async a => {
    const target = parseFloat(a.target_price);
    let fired = false;
    if(a.condition === 'above' && prevPrice < target && price >= target) fired = true;
    if(a.condition === 'below' && prevPrice > target && price <= target) fired = true;
    if(!fired) return;
    _triggeredAlerts.add(a.id);
    // Show toast
    const dir = a.condition === 'above' ? '▲' : '▼';
    showToast(`🔔 ${a.symbol} ${dir} ${fmtPrice(target)}`, 'ok');
    // Send TG
    if(_tgProfile?.tg_linked && _tgProfile?.tg_notify_alerts){
      sendTgNotify(a, price);
    }
    // Update DB
    if(a.repeat_mode === 'once'){
      await sb.from('price_alerts').update({triggered:true, triggered_at: new Date().toISOString()}).eq('id', a.id);
      userAlerts = userAlerts.filter(x => x.id !== a.id);
    } else {
      // Every: reset after 5s
      setTimeout(() => _triggeredAlerts.delete(a.id), 5000);
    }
    renderAlertsPanel();
    renderDetailAlertLines();
    renderCoins();
  });
}

// ── Binance WebSocket ─────────────────────────
function initWS(){
  if(_wsConn) try{ _wsConn.close(); }catch(e){}
  const streams = BINANCE_WS_PAIRS.map(p => p.pair + '@miniTicker').join('/');
  const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;
  const ws = new WebSocket(url);
  _wsConn = ws;
  ws.onopen = () => setLive(true);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if(!msg?.data) return;
    _wsLiveAt = Date.now();
    const d = msg.data;
    const sym = d.s?.toLowerCase();
    const cfg = BINANCE_WS_PAIRS.find(p => p.pair === sym);
    if(!cfg) return;
    const price    = parseFloat(d.c);
    const open24   = parseFloat(d.o);
    const high24   = parseFloat(d.h);
    const low24    = parseFloat(d.l);
    const vol24    = parseFloat(d.v) * price;
    const chg24    = ((price - open24) / open24) * 100;
    const prevPrice = _wsCache[cfg.cgId]?.price || open24;
    const prevVol   = _wsCache[cfg.cgId]?.vol24 || vol24;
    _wsCache[cfg.cgId] = { price, chg24, prevPrice, high24, low24, vol24 };
    // Patch DOM
    patchDOM(cfg.cgId, price, chg24, prevPrice);
    // Check alerts
    checkAlerts(cfg.cgId, price, prevPrice);
    // Signal analysis
    analyzeSignal(cfg, price, prevPrice, chg24, vol24, prevVol, high24, low24);
    // Update detail panel if open
    if(_detailCoin?.id === cfg.cgId) updateDetailPrice(price, chg24);
  };
  ws.onclose = () => {
    setLive(false);
    setTimeout(initWS, 3000);
  };
  ws.onerror = () => ws.close();
}

function setLive(on){
  const ind = document.getElementById('live-ind');
  const txt = document.getElementById('live-text');
  if(!ind) return;
  ind.className = 'live-ind ' + (on ? 'live' : 'stale');
  txt.textContent = on ? 'LIVE' : 'RECONNECTING';

  }
  // Card chg
  const chgEl = document.getElementById('ccc-' + cgId);
  if(chgEl){ chgEl.textContent = fmtChg(chg24); chgEl.className = 'cc-chg ' + (chg24>=0?'up':'dn'); }
  // List row price
  const lp = document.getElementById('lp-' + cgId);
  if(lp) lp.textContent = fmtPrice(price);
  const lc = document.getElementById('lc-' + cgId);
  if(lc){ lc.textContent = fmtChg(chg24); lc.className = 'lr-chg ' + (chg24>=0?'up':'dn'); }
  // Stats strip BTC/ETH
  if(cgId === 'bitcoin'){
    const p = document.getElementById('ss-btc-price'); if(p) p.textContent = fmtPrice(price);
    const c = document.getElementById('ss-btc-chg');
    if(c){ c.textContent = fmtChg(chg24); c.className = 'ss-chg ' + (chg24>=0?'up':'dn'); }
  }
  if(cgId === 'ethereum'){
    const p = document.getElementById('ss-eth-price'); if(p) p.textContent = fmtPrice(price);
    const c = document.getElementById('ss-eth-chg');
    if(c){ c.textContent = fmtChg(chg24); c.className = 'ss-chg ' + (chg24>=0?'up':'dn'); }
  }
  // Heatmap cell
  const hmCell = document.getElementById('hm-' + cgId);
  if(hmCell){
    hmCell.querySelector('.hm-chg').textContent = fmtChg(chg24);
    hmCell.style.background = heatColor(chg24);

  // Update allCoins cache for sorting
  const coin = allCoins.find(c => c.id === cgId);
  if(coin){ coin.current_price = price; coin.price_change_percentage_24h = chg24; }
}

// ── Signal engine ────────────────────────────
function analyzeSignal(cfg, price, prevPrice, chg24, vol24, prevVol, high24, low24){
  const cgId = cfg.cgId;
  const now = Date.now();
  const cooldown = 60000;
  const fire = (type, val) => {
    const key = cgId + '_' + type;
    if(_sigCooldown[key] && now - _sigCooldown[key] < cooldown) return;
    _sigCooldown[key] = now;
    const chgTick = prevPrice > 0 ? ((price - prevPrice)/prevPrice*100) : 0;
    addSignal({ cgId, sym: cfg.sym, type, val: fmtChg(val||chgTick), time: new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) });
  };
  const tickChg = prevPrice > 0 ? ((price - prevPrice)/prevPrice*100) : 0;
  if(tickChg >= 0.5)  fire('pump', tickChg);
  if(tickChg <= -0.5) fire('dump', tickChg);
  if(prevPrice < high24 * 0.99 && price >= high24) fire('break-high', chg24);
  if(prevPrice > low24  * 1.01 && price <= low24)  fire('break-low', chg24);
  if(vol24 > prevVol * 1.3 && vol24 > 1e6)        fire('vol', chg24);
}

function addSignal(sig){
  _signals.unshift(sig);
  if(_signals.length > 40) _signals.pop();
  renderSignals();
}

function renderSignals(){
  const track = document.getElementById('signals-track');
  if(!_signals.length) return;
  const typeLabel = { pump:'PUMP', dump:'DUMP', 'break-high':'BREAK↑', 'break-low':'BREAK↓', vol:'VOL↑' };
  const html = [..._signals, ..._signals].map(s =>
    `<span class="signal-item ${s.type}" onclick="focusCoin('${s.cgId}')">
      <span class="si-sym">${s.sym}</span>
      <span class="si-type">${typeLabel[s.type]||s.type}</span>
      <span class="si-val">${s.val}</span>
      <span class="si-val" style="color:var(--m2);margin-left:2px;">${s.time}</span>
    </span>`
  ).join('');
  track.innerHTML = html;
  // Animate scroll
  const totalW = track.scrollWidth / 2;
  let x = 0;
  if(track._anim) cancelAnimationFrame(track._anim);
  function step(){
    x += 0.4;
    if(x >= totalW) x = 0;
    track.style.transform = `translateX(${-x}px)`;
    track._anim = requestAnimationFrame(step);
  }
  step();
}

// ── Render coins ─────────────────────────────
function getFilteredCoins(){
  let list = [...allCoins];
  // Filter
  if(_currentFilter === 'gainers') list = list.filter(c => (c.price_change_percentage_24h||0) > 0).sort((a,b)=>b.price_change_percentage_24h - a.price_change_percentage_24h).slice(0,20);
  else if(_currentFilter === 'losers') list = list.filter(c => (c.price_change_percentage_24h||0) < 0).sort((a,b)=>a.price_change_percentage_24h - b.price_change_percentage_24h).slice(0,20);
  else if(_currentFilter === 'volume') list = [...list].sort((a,b) => (b.total_volume||0)-(a.total_volume||0)).slice(0,20);
  else if(_currentFilter === 'ath') list = [...list].sort((a,b) => (a.ath_change_percentage||0)-(b.ath_change_percentage||0)).slice(0,20);
  else if(_currentFilter === 'watch') list = list.filter(c => watchlist.includes(c.id));
  else if(_currentFilter === 'alerted') list = list.filter(c => hasAlert(c.id));
  // Search
  if(_searchQ){
    const q = _searchQ.toLowerCase();
    list = list.filter(c => c.symbol?.toLowerCase().includes(q) || c.name?.toLowerCase().includes(q));
  }
  // Sort (for 'all')
  if(_currentFilter === 'all'){
    if(_currentSort === 'mcap') list.sort((a,b)=>(a.market_cap_rank||999)-(b.market_cap_rank||999));
    else if(_currentSort === 'chg') list.sort((a,b)=>Math.abs(b.price_change_percentage_24h||0)-Math.abs(a.price_change_percentage_24h||0));
    else if(_currentSort === 'vol') list.sort((a,b)=>(b.total_volume||0)-(a.total_volume||0));
    else if(_currentSort === 'rsi') list.sort((a,b)=>{
      const ra = _rsiCache[a.id]; const rb = _rsiCache[b.id];
      if(ra == null && rb == null) return 0;
      if(ra == null) return 1; if(rb == null) return -1;
      // Show extremes first (OS < 30, OB > 70)
      const scoreA = Math.abs(ra - 50); const scoreB = Math.abs(rb - 50);
      return scoreB - scoreA;
    });
  }
  return list;
}

function renderCoins(){
  const coins = getFilteredCoins();
  const container = document.getElementById('coins-container');
  if(!container) return;
  if(_currentView === 'heatmap'){ renderHeatmap(coins, container); return; }
  if(_currentView === 'list'){ renderListView(coins, container); return; }
  renderGrid(coins, container);
}

function renderGrid(coins, container){
  const maxVol = Math.max(...coins.map(c=>c.total_volume||0));
  container.innerHTML = `<div class="coins-grid" id="coins-grid">
    ${coins.map(c => renderCard(c, maxVol)).join('')}
  </div>`;
  // Draw sparklines
  coins.forEach(c => { if(c.sparkline_in_7d?.price) drawSparkline(c); });
}

function renderCard(c, maxVol){
  const ws    = _wsCache[c.id];
  const price = ws?.price ?? c.current_price;
  const chg24 = ws?.chg24 ?? (c.price_change_percentage_24h||0);
  const chg7  = c.price_change_percentage_7d_in_currency ?? c.price_change_percentage_7d ?? 0;
  const chg1h = c.price_change_percentage_1h_in_currency ?? 0;
  const isUp  = chg24 >= 0;
  const volPct = maxVol > 0 ? Math.min(100, ((c.total_volume||0)/maxVol)*100) : 0;
  const vlt   = (() => {
    const sp = c.sparkline_in_7d?.price;
    if(!sp?.length) return 0;
    const mean = sp.reduce((a,b)=>a+b,0)/sp.length;
    const variance = sp.reduce((s,v)=>s+(v-mean)**2,0)/sp.length;
    return mean > 0 ? (Math.sqrt(variance)/mean*100) : 0;
  })();
  const rsi   = _rsiCache[c.id];
  const rsiHtml = rsi != null
    ? `<span class="cc-rsi ${rsi>=70?'ob':rsi<=30?'os':'mid'}">${Math.round(rsi)}</span>`
    : '';

function drawSparkline(c){
  const prices = c.sparkline_in_7d?.price;
  if(!prices?.length) return;
  const id = 'sp-' + c.id.replace(/[^a-z0-9]/gi,'_');
  const canvas = document.getElementById(id);
  if(!canvas) return;
  const W = canvas.offsetWidth || 160, H = 28;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = max - min || 1;
  const isUp = prices[prices.length-1] >= prices[0];
  const col = isUp ? '#2ecc71' : '#e74c3c';
  ctx.beginPath();
  prices.forEach((p, i) => {
    const x = (i / (prices.length-1)) * W;
    const y = H - ((p - min) / range) * (H - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  // Fill
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = isUp ? 'rgba(46,204,113,0.08)' : 'rgba(231,76,60,0.08)';
  ctx.fill();
  // Line
  ctx.beginPath();
  prices.forEach((p, i) => {
    const x = (i / (prices.length-1)) * W;
    const y = H - ((p - min) / range) * (H - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.stroke();
  // Compute RSI from sparkline
  const rsi = calcRSI(prices);
  if(rsi != null) _rsiCache[c.id] = rsi;
}

function heatColor(chg){
  const v = Math.max(-12, Math.min(12, chg));
  if(v >= 0){
    const t = v/12;
    return `rgba(${Math.round(46*(1-t)+232*t)}, ${Math.round(204*(1-t)+114*t)}, ${Math.round(113*(1-t)+42*t)}, ${0.3+t*0.5})`;
  } else {
    const t = (-v)/12;
    return `rgba(231, ${Math.round(76*(1-t)+30*t)}, ${Math.round(60*(1-t)+20*t)}, ${0.3+t*0.5})`;
  }
}
function renderHeatmap(coins, container){
  container.innerHTML = `<div class="heatmap-wrap"><div class="hm-grid">
    ${coins.map(c => {
      const ws = _wsCache[c.id];
      const chg = ws?.chg24 ?? (c.price_change_percentage_24h||0);

      const size = Math.max(64, Math.min(120, 64 + Math.log10(mcap/1e6||1)*16));
      return `<div class="hm-cell" id="hm-${c.id}" onclick="focusCoin('${c.id}')"
        style="background:${heatColor(chg)};min-height:${size}px">
        <div class="hm-sym">${(c.symbol||'').toUpperCase()}</div>
        <div class="hm-chg">${fmtChg(chg)}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

function focusCoin(cgId){
  const coin = allCoins.find(c => c.id === cgId);
  if(!coin) return;
  _detailCoin = coin;
  // Head
  document.getElementById('dp-icon').src = coin.image || '';
  document.getElementById('dp-sym').textContent = (coin.symbol||'').toUpperCase();
  document.getElementById('dp-full').textContent = coin.name || '';
  // Price
  const ws = _wsCache[cgId];
  const price = ws?.price ?? coin.current_price;
  document.getElementById('dp-price').textContent = fmtPrice(price);
  // Chg row
  const tfs = [
    {l:'1Ч', v: coin.price_change_percentage_1h_in_currency},
    {l:'24Ч', v: ws?.chg24 ?? coin.price_change_percentage_24h},
    {l:'7Д', v: coin.price_change_percentage_7d_in_currency ?? coin.price_change_percentage_7d},
    {l:'30Д', v: coin.price_change_percentage_30d_in_currency ?? coin.price_change_percentage_30d},
  ];
  document.getElementById('dp-chg-row').innerHTML = tfs.filter(t=>t.v!=null).map(t =>
    `<div class="dp-tf-chg ${t.v>=0?'up':'dn'}"><span class="tf-label">${t.l}</span>${fmtChg(t.v)}</div>`
  ).join('');
  // Watch btn
  updateDetailWatchBtn();
  // Metrics
  const vlt = (() => {
    const sp = coin.sparkline_in_7d?.price;
    if(!sp?.length) return 0;
    const mean = sp.reduce((a,b)=>a+b,0)/sp.length;
    const variance = sp.reduce((s,v)=>s+(v-mean)**2,0)/sp.length;
    return mean > 0 ? (Math.sqrt(variance)/mean*100) : 0;
  })();
  const rsi = _rsiCache[cgId];
  const metrics = [
    {l:'Объём 24Ч', v: fmtBig(coin.total_volume)},
    {l:'MCAP', v: fmtBig(coin.market_cap)},
    {l:'ATH', v: fmtPrice(coin.ath)},
    {l:'ATH откл.', v: coin.ath_change_percentage?.toFixed(1)+'%'},
    {l:'Волатильность 7Д', v: vlt.toFixed(1)+'%'},
    {l:'RSI (14)', v: rsi != null ? Math.round(rsi)+(rsi>=70?' ОБ':rsi<=30?' ОС':'') : '—'},
    {l:'В обращении', v: coin.circulating_supply ? fmtBig(coin.circulating_supply).replace('$','')+' '+(coin.symbol||'').toUpperCase() : '—'},
    {l:'Рейтинг', v: '#'+(coin.market_cap_rank||'?')},
  ];
  document.getElementById('dp-metrics').innerHTML = metrics.map(m =>
    `<div class="dp-metric"><div class="dp-m-label">${m.l}</div><div class="dp-m-val">${m.v||'—'}</div></div>`
  ).join('');
  // Open panel
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
  // Chart
  loadChart(coin);
  // Alert lines
  renderDetailAlertLines();
}

// ── Kline WebSocket — live candle feed ───────────
function startKlineWS(pair, tf){
  stopKlineWS();
  _klinePair = pair;
  _klineTF = tf;
  _klineLastCandle = null;
  const url = `wss://stream.binance.com:9443/ws/${pair.toLowerCase()}@kline_${tf}`;
  const ws = new WebSocket(url);
  _klineWS = ws;
  ws.onmessage = e => {
    if(!_lwcChart || !_lwcSeries) return;
    const msg = JSON.parse(e.data);
    const k = msg.k;
    if(!k) return;
    const candle = {
      time:  Math.floor(k.t / 1000),
      open:  parseFloat(k.o),
      high:  parseFloat(k.h),
      low:   parseFloat(k.l),
      close: parseFloat(k.c),
      volume: parseFloat(k.v),
    };
    // Update candlestick series (LW Charts handles open vs closed candle)
    _lwcSeries.update(candle);
    // Update volume series
    if(_lwcVolSer){
      _lwcVolSer.update({
        time:  candle.time,
        value: candle.volume,
        color: candle.close >= candle.open ? 'rgba(46,204,113,0.3)' : 'rgba(231,76,60,0.25)',
      });
    }
    // Update EMA lines incrementally
    if(_lwcEma20 && _lwcEma20._lastEma20 != null){
      const k20 = 2/21;
      _lwcEma20._lastEma20 = candle.close * k20 + _lwcEma20._lastEma20 * (1-k20);
      if(k.x) _lwcEma20.update({ time: candle.time, value: _lwcEma20._lastEma20 });
    }
    if(_lwcEma50 && _lwcEma50._lastEma50 != null){
      const k50 = 2/51;
      _lwcEma50._lastEma50 = candle.close * k50 + _lwcEma50._lastEma50 * (1-k50);
      if(k.x) _lwcEma50.update({ time: candle.time, value: _lwcEma50._lastEma50 });
    }
    // Update OHLCV info bar with latest candle
    if(!document.getElementById('dp-ohlcv')) return;
    const s = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
    s('oi-o', fmtPrice(candle.open));
    s('oi-h', fmtPrice(candle.high));
    s('oi-l', fmtPrice(candle.low));
    s('oi-c', fmtPrice(candle.close));
    s('oi-v', fmtBig(candle.volume * candle.close));
    const pct = candle.open > 0 ? ((candle.close - candle.open) / candle.open * 100) : 0;
    const el = document.getElementById('oi-chg');
    if(el){
      el.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
      el.style.color = pct >= 0 ? 'var(--g)' : 'var(--r)';
    }
    // Flash live dot on chart
    const ld = document.getElementById('dp-live-dot');
    if(ld){ ld.style.opacity = '1'; clearTimeout(ld._t); ld._t = setTimeout(()=>ld.style.opacity='.3',300); }
    _klineLastCandle = candle;
  };
  ws.onerror = () => {};
  ws.onclose = () => {
    // Auto-reconnect only if still viewing same pair/tf
    if(_klinePair === pair && _klineTF === tf && _lwcChart){
      setTimeout(() => startKlineWS(pair, tf), 3000);
    }
  };
}

function stopKlineWS(){
  if(_klineWS){
    _klineWS.onclose = null; // prevent reconnect
    try{ _klineWS.close(); }catch(e){}
    _klineWS = null;
  }
  _klinePair = null; _klineTF = null;
}

async function fetchAndRenderChart(pair, tf){
  const loading = document.getElementById('dp-chart-loading');
  if(loading) loading.style.display = 'flex';
  try{
    const limit = 150;
    const url = `https://api.binance.com/api/v3/klines?symbol=${pair.toUpperCase()}&interval=${tf}&limit=${limit}`;
    const raw = await safeFetch(url);
    if(!Array.isArray(raw)) throw new Error('Нет данных с Binance');
    const candles = raw.map(k => ({
      time: Math.floor(k[0]/1000),
      open:  parseFloat(k[1]),
      high:  parseFloat(k[2]),
      low:   parseFloat(k[3]),
      close: parseFloat(k[4]),
      volume: parseFloat(k[5]),
    }));
    if(!candles.length) throw new Error('Пустой ответ');
    await renderLWChart(candles);
    if(loading) loading.style.display = 'none';
    // Start live kline WebSocket
    startKlineWS(pair, tf);
  }catch(e){
    if(loading){ loading.style.display = 'flex'; loading.textContent = 'Ошибка: ' + e.message; }
  }
}

async function renderLWChart(candles){
  const LWC = await getLWC();
  if(!LWC){ showToast('Lightweight Charts не загружен','err'); return; }
  const container = document.getElementById('dp-lwc-container');
  const wrap = document.getElementById('dp-chart-wrap');
  if(!container || !wrap) return;

  // Destroy previous
  if(_lwcChart){ _lwcChart.remove(); _lwcChart = null; }
  _lwcAlertLines = {};

  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';

  const chart = (LWC.createChart || LWC.default?.createChart)(container, {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: {
      background: { color: '#06080c' },
      textColor:  isDark ? 'rgba(232,234,240,0.4)' : '#444',
      fontFamily: "'JetBrains Mono', monospace",
      fontSize: 10,
    },
    grid: {
      vertLines:  { color: 'rgba(255,255,255,0.03)' },
      horzLines:  { color: 'rgba(255,255,255,0.03)' },
    },
    crosshair: {
      mode: 1,
      vertLine: { color: 'rgba(232,114,42,0.4)', labelBackgroundColor: '#e8722a' },
      horzLine: { color: 'rgba(232,114,42,0.4)', labelBackgroundColor: '#e8722a' },
    },
    rightPriceScale: {
      borderColor: 'rgba(255,255,255,0.06)',
      scaleMargins: { top: 0.08, bottom: _inds.vol ? 0.22 : 0.06 },
    },
    timeScale: {
      borderColor: 'rgba(255,255,255,0.06)',
      timeVisible: true,
      secondsVisible: false,
    },
    handleScale: { mouseWheel: true, pinch: true },
    handleScroll: { mouseWheel: true, pressedMouseMove: true, horzTouchDrag: true },
  });

  _lwcChart = chart;

  // Candlestick series
  const candleSeries = chart.addCandlestickSeries({
    upColor:   '#2ecc71',
    downColor: '#e74c3c',
    borderUpColor:   '#2ecc71',
    borderDownColor: '#e74c3c',
    wickUpColor:     'rgba(46,204,113,0.6)',
    wickDownColor:   'rgba(231,76,60,0.6)',
  });
  candleSeries.setData(candles);
  _lwcSeries = candleSeries;

  // EMA calculation
  function calcEMA(data, period){
    const k = 2/(period+1); let ema = data[0].close;
    return data.map(d => { ema = d.close*k + ema*(1-k); return { time: d.time, value: ema }; });
  }
  const ema20data = calcEMA(candles, 20);
  const ema50data = calcEMA(candles, 50);

  _lwcEma20 = chart.addLineSeries({
    color: 'rgba(59,130,246,0.75)', lineWidth: 1.5,
    priceLineVisible: false, crosshairMarkerVisible: false,
    visible: _inds.ema20, lastValueVisible: false,
  });
  _lwcEma20.setData(ema20data);
  _lwcEma20._lastEma20 = ema20data[ema20data.length-1]?.value ?? 0;

  _lwcEma50 = chart.addLineSeries({
    color: 'rgba(232,114,42,0.7)', lineWidth: 1.5,
    priceLineVisible: false, crosshairMarkerVisible: false,
    visible: _inds.ema50, lastValueVisible: false,
  });
  _lwcEma50.setData(ema50data);
  _lwcEma50._lastEma50 = ema50data[ema50data.length-1]?.value ?? 0;

  // Volume as histogram on separate price scale
  const volSeries = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
    visible: _inds.vol,
    lastValueVisible: false, priceLineVisible: false,
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.82, bottom: 0 },
    borderVisible: false,
  });
  volSeries.setData(candles.map(c => ({
    time: c.time,
    value: c.volume,
    color: c.close >= c.open ? 'rgba(46,204,113,0.3)' : 'rgba(231,76,60,0.25)',
  })));
  _lwcVolSer = volSeries;

  // Alert price lines
  syncChartAlertLines();

  // Crosshair OHLCV update
  chart.subscribeCrosshairMove(param => {
    if(!param?.seriesData) return;
    const d = param.seriesData.get(candleSeries);
    if(!d) return;
    const setT = (id, v) => { const el=document.getElementById(id); if(el) el.textContent = v; };
    setT('oi-o', fmtPrice(d.open));
    setT('oi-h', fmtPrice(d.high));
    setT('oi-l', fmtPrice(d.low));
    setT('oi-c', fmtPrice(d.close));
    setT('oi-v', fmtBig(d.volume * d.close));
    const pct = d.open > 0 ? ((d.close-d.open)/d.open*100) : 0;
    const el = document.getElementById('oi-chg');
    if(el){ el.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%'; el.style.color = pct>=0?'var(--g)':'var(--r)'; }
  });

  // Set initial OHLCV from last candle
  const last = candles[candles.length-1];
  if(last){
    const s = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
    s('oi-o',fmtPrice(last.open)); s('oi-h',fmtPrice(last.high));
    s('oi-l',fmtPrice(last.low)); s('oi-c',fmtPrice(last.close));
    s('oi-v',fmtBig(last.volume*last.close));
    const pct = last.open>0?((last.close-last.open)/last.open*100):0;
    const el = document.getElementById('oi-chg');
    if(el){ el.textContent=(pct>=0?'+':'')+pct.toFixed(2)+'%'; el.style.color=pct>=0?'var(--g)':'var(--r)'; }
  }

  // Markers for journal trades (future integration)
  // candleSeries.setMarkers([]);

  // Resize observer
  if(_lwcResizeObs) _lwcResizeObs.disconnect();
  _lwcResizeObs = new ResizeObserver(() => {
    if(_lwcChart && wrap){
      _lwcChart.applyOptions({ width: wrap.clientWidth, height: wrap.clientHeight });
    }
  });
  _lwcResizeObs.observe(wrap);
}

// Sync alert price lines with current chart
function syncChartAlertLines(){
  if(!_lwcChart || !_lwcSeries || !_detailCoin) return;
  // Remove old lines
  Object.entries(_lwcAlertLines).forEach(([id, line]) => {
    try{ _lwcSeries.removePriceLine(line); }catch(e){}
  });
  _lwcAlertLines = {};
  // Add current alerts
  const coinAlerts = userAlerts.filter(a => a.coingecko_id === _detailCoin.id && a.alert_type === 'price');
  coinAlerts.forEach(a => {
    const isAbove = a.condition === 'above';
    const line = _lwcSeries.createPriceLine({
      price: parseFloat(a.target_price),
      color: isAbove ? 'rgba(232,114,42,0.8)' : 'rgba(231,76,60,0.7)',
      lineWidth: 1,
      lineStyle: 2, // dashed
      axisLabelVisible: true,
      title: (isAbove ? '▲ ' : '▼ ') + fmtPrice(a.target_price),
    });
    _lwcAlertLines[a.id] = line;
  });
}

// ── Auth & TG ────────────────────────────────
async function initAuth(){
  const { data: { user } } = await sb.auth.getUser();
  if(!user){ location.href = 'login.html'; return; }
  // Load TG profile
  const { data } = await sb.from('profiles').select('tg_chat_id,tg_linked,tg_notify_alerts').eq('id', user.id).single();
  _tgProfile = data || {};
  await loadAlerts();
}

async function doLogout(){
  await sb.auth.signOut();
  location.href = 'login.html';
}

// ── Toast ────────────────────────────────────
function showToast(msg, type='info'){
  const t = document.createElement('div');
  t.className = 'toast' + (type!=='info' ? ' ' + type : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ── Theme ────────────────────────────────────
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('orb_theme', next);
  // Update chart colors if open
  if(_lwcChart){
    const isDark = next !== 'light';
    _lwcChart.applyOptions({ layout: { background: { color: isDark ? '#06080c' : '#fff' }, textColor: isDark ? 'rgba(232,234,240,0.4)' : '#444' } });
  }
}

// ── Keyboard shortcuts ───────────────────────
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ closeDetail(); closeAlertModal(); }
  if((e.key === 'f' || e.key === 'а') && !e.ctrlKey && !e.metaKey){
    const inp = document.getElementById('search-inp');
    if(document.activeElement !== inp){ e.preventDefault(); inp.focus(); }
  }
});

// ── Init ─────────────────────────────────────
async function init(){
  // Restore theme
  const saved = localStorage.getItem('orb_theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
  await initAuth();
  await loadCoins();
  // Prefetch LWC module
  getLWC().catch(()=>{});
}

if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
