// ── HEATMAP ──────────────────────────────────────────────────────
function renderHeatmap(coins){
  // Сортируем по mcap — самые большие получат большие ячейки
  const sorted = [...coins]
    .filter(c => c.market_cap > 0)
    .sort((a,b) => (b.market_cap||0) - (a.market_cap||0))
    .slice(0, 100);

  return `
    <div class="heatmap-wrap" id="heatmap-wrap">
      <div class="heatmap-legend">
        <span>−10%</span>
        <div class="heatmap-legend-bar"></div>
        <span>+10%</span>
        <span style="margin-left:16px;color:var(--m2)">Размер = Market Cap · Цвет = % изменение за ${currentTimeframe === '7d' ? '7Д' : currentTimeframe === '30d' ? '30Д' : '24Ч'}</span>
      </div>
      <div class="heatmap-grid" id="heatmap-grid"></div>
      <div class="hm-tooltip" id="hm-tooltip"></div>
    </div>`;
}

function initHeatmap(coins){
  const grid = document.getElementById('heatmap-grid');
  if(!grid) return;

  const sorted = [...coins]
    .filter(c => c.market_cap > 0)
    .sort((a,b) => (b.market_cap||0) - (a.market_cap||0))
    .slice(0, 100);

  // Вычисляем размеры — площадь ячейки пропорциональна sqrt(mcap)
  const maxMcap = sorted[0]?.market_cap || 1;
  const wrapW = grid.parentElement?.clientWidth || 900;
  const wrapH = (grid.parentElement?.clientHeight || 600) - 50;

  // Алгоритм squarified treemap
  const cells = sorted.map(c => ({
    coin: c,
    weight: Math.sqrt(c.market_cap / maxMcap),
  }));
  const totalW = cells.reduce((s,x) => s + x.weight, 0);

  // Простая сетка с пропорциональными размерами
  // Колонок: от 5 до 12 в зависимости от кол-ва монет
  const cols = Math.min(12, Math.max(5, Math.ceil(Math.sqrt(sorted.length * 1.4))));
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  // Высоты строк — первые (крупные) монеты занимают больше
  // Делаем через пропорциональные font-size и min-height
  grid.innerHTML = cells.map((cell, i) => {
    const coin = cell.coin;
    const chg = getChg(coin);
    const col = getHeatColor(chg);
    const rank = i + 1;
    // Размер шрифта: топ-10 большой, дальше меньше
    const fontSize = rank <= 5 ? 14 : rank <= 15 ? 11 : rank <= 30 ? 9 : 8;
    const chgFontSize = rank <= 5 ? 12 : rank <= 15 ? 10 : 8;
    const priceFontSize = rank <= 5 ? 9 : rank <= 15 ? 8 : 0;
    // Высота ячейки пропорциональна весу
    const cellH = Math.max(40, Math.min(140, Math.round(cell.weight * 180)));
    const showPrice = rank <= 30;

    return `<div class="hm-cell" 
      style="background:${col.bg};min-height:${cellH}px;"
      onclick="focusCoin('${coin.id}')"
      onmouseenter="showHmTooltip(event,'${coin.id}')"
      onmouseleave="hideHmTooltip()"
      data-coin-hm="${coin.id}">
      <span class="hm-sym" style="font-size:${fontSize}px">${(coin.symbol||'').toUpperCase()}</span>
      <span class="hm-chg" style="font-size:${chgFontSize}px;color:${col.text}">${fmtChg(chg)}</span>
      ${showPrice && priceFontSize > 0 ? `<span class="hm-price" style="font-size:${priceFontSize}px">${fmtPrice(coin.current_price)}</span>` : ''}
    </div>`;
  }).join('');
}

function getHeatColor(chg){
  // Маппинг % → цвет (от красного до зелёного)
  const v = Math.max(-10, Math.min(10, chg)); // клипаем до ±10%
  if(v >= 5)  return { bg:'#1a5c2a', text:'#52e87a' };
  if(v >= 3)  return { bg:'#1a4d22', text:'#3fd66e' };
  if(v >= 1)  return { bg:'#133d1a', text:'#2ecc71' };
  if(v >= 0)  return { bg:'#0e2e13', text:'rgba(46,204,113,0.7)' };
  if(v >= -1) return { bg:'#2e0e0e', text:'rgba(231,76,60,0.7)' };
  if(v >= -3) return { bg:'#3d1313', text:'#e74c3c' };
  if(v >= -5) return { bg:'#4d1a1a', text:'#e74c3c' };
  return { bg:'#5c1a1a', text:'#ff6b6b' };
}

function showHmTooltip(e, coinId){
  const coin = allCoins.find(c => c.id === coinId);
  if(!coin) return;
  const tt = document.getElementById('hm-tooltip');
  if(!tt) return;
  const chg = getChg(coin);
  const chg7 = coin.price_change_percentage_7d_in_currency || 0;
  const vlt = getVolatility(coin).toFixed(1);
  tt.innerHTML = `
    <div class="hm-tt-sym">${(coin.symbol||'').toUpperCase()} <span style="font-size:10px;color:var(--m);font-family:var(--font-body)">${coin.name}</span></div>
    <div class="hm-tt-row"><span>Цена</span><span class="hm-tt-val">${fmtPrice(coin.current_price)}</span></div>
    <div class="hm-tt-row"><span>Изм. 24ч</span><span class="hm-tt-val" style="color:${chg>=0?'var(--g)':'var(--r)'}">${fmtChg(chg)}</span></div>
    <div class="hm-tt-row"><span>Изм. 7д</span><span class="hm-tt-val" style="color:${chg7>=0?'var(--g)':'var(--r)'}">${fmtChg(chg7)}</span></div>
    <div class="hm-tt-row"><span>MCAP</span><span class="hm-tt-val">${fmtBig(coin.market_cap)}</span></div>
    <div class="hm-tt-row"><span>Объём</span><span class="hm-tt-val">${fmtBig(coin.total_volume)}</span></div>
    <div class="hm-tt-row"><span>Волатильность</span><span class="hm-tt-val">${vlt}%</span></div>
    <div style="margin-top:6px;font-size:8px;color:var(--m2)">Клик → открыть детали</div>
  `;
  tt.classList.add('show');
  positionHmTooltip(e, tt);
}

function positionHmTooltip(e, tt){
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const ttW = 180, ttH = 160;
  tt.style.left = (x + ttW > window.innerWidth ? x - ttW - 20 : x) + 'px';
  tt.style.top  = (y + ttH > window.innerHeight ? y - ttH - 20 : y) + 'px';
}

function hideHmTooltip(){
  const tt = document.getElementById('hm-tooltip');
  if(tt) tt.classList.remove('show');
}

// Обновление heatmap без перерисовки — только цвета
function updateHeatmapInplace(){

// ── COMPARE ENGINE ───────────────────────────────────────────────
let compareCoins = []; // массив coin.id
let compareChart = null;
const COMPARE_COLORS = ['#e8722a','#3b82f6','#2ecc71','#f39c12','#a855f7'];

function openCompare(){
  // По умолчанию добавляем BTC + ETH
  if(!compareCoins.length){
    compareCoins = ['bitcoin','ethereum'];
  }
  renderCompareTags();
  renderCompareChart();
  renderCompareTable();
  document.getElementById('compare-modal').classList.add('open');
}
function closeCompare(){
  document.getElementById('compare-modal').classList.remove('open');
  if(compareChart){ compareChart.destroy(); compareChart = null; }
}

function addCompare(coinId){
  if(compareCoins.includes(coinId)) return;
  if(compareCoins.length >= 5){ showToast('Максимум 5 монет','err'); return; }
  compareCoins.push(coinId);
  hideCompareSearch();
  renderCompareTags();
  renderCompareChart();
  renderCompareTable();
}
function removeCompare(coinId){
  compareCoins = compareCoins.filter(id => id !== coinId);
  renderCompareTags();
  renderCompareChart();
  renderCompareTable();
}

function renderCompareTags(){
  const wrap = document.getElementById('compare-tags');
  if(!wrap) return;
  const tags = compareCoins.map((id, i) => {
    const coin = allCoins.find(c => c.id === id);
    if(!coin) return '';
    return `<div class="compare-coin-tag" style="border-color:${COMPARE_COLORS[i]}40;color:${COMPARE_COLORS[i]}">
      ${coin.image ? `<img src="${coin.image}" alt="">` : ''}
      ${(coin.symbol||'').toUpperCase()}
      <span class="rm" onclick="removeCompare('${id}')">✕</span>
    </div>`;
  }).join('');
  wrap.innerHTML = tags +
    (compareCoins.length < 5 ? `<button class="compare-add-btn" onclick="showCompareSearch()">+ ДОБАВИТЬ</button>` : '') +
    `<div class="compare-search-wrap" id="compare-search-wrap" style="display:none">
      <input class="compare-search-inp" id="compare-search-inp"
        placeholder="Поиск монеты..." oninput="filterCompareSearch(this.value)"
        onblur="setTimeout(()=>hideCompareSearch(),200)">
      <div class="compare-dropdown" id="compare-dropdown"></div>
    </div>`;
}

function renderCompareChart(){
  const canvas = document.getElementById('compare-chart');
  if(!canvas) return;
  if(compareChart){ compareChart.destroy(); compareChart = null; }

  const datasets = compareCoins.map((id, i) => {
    const coin = allCoins.find(c => c.id === id);
    if(!coin) return null;
    const sp = coin.sparkline_in_7d?.price;
    if(!sp || sp.length < 2) return null;
    // Нормализуем к 100 (% от стартовой цены)
    const base = sp[0];
    const data = sp.filter((_,i) => i % 4 === 0).map(v => +((v/base - 1)*100).toFixed(2));
    return {
      label: (coin.symbol||'').toUpperCase(),
      data,
      borderColor: COMPARE_COLORS[i],
      backgroundColor: COMPARE_COLORS[i] + '12',
      borderWidth: 2,
      pointRadius: 0,
      tension: 0.3,
      fill: false,
    };
  }).filter(Boolean);

  if(!datasets.length) return;
  const labels = datasets[0].data.map((_,i) => '');

  compareChart = new (window.Chart)(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: {
            font: { family: "'JetBrains Mono', monospace", size: 10 },
            color: 'rgba(232,234,240,0.6)',
            boxWidth: 12, padding: 16,
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,13,20,0.95)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
          bodyFont:  { family: "'JetBrains Mono', monospace", size: 10 },
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
          }
        }
      },
      scales: {
        x: { display: false },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            font: { family: "'JetBrains Mono', monospace", size: 9 },
            color: 'rgba(232,234,240,0.3)',
            callback: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%'
          }
        }
      }
    }
  });
}

function renderCompareTable(){
  const tbody = document.getElementById('compare-tbody');
  if(!tbody) return;
  const btc = allCoins.find(c => c.id === 'bitcoin');
  const btcChg = btc ? (btc.price_change_percentage_24h || 0) : 0;

  tbody.innerHTML = compareCoins.map((id, i) => {
    const coin = allCoins.find(c => c.id === id);
    if(!coin) return '';
    const chg24 = coin.price_change_percentage_24h || 0;
    const chg7  = coin.price_change_percentage_7d_in_currency || 0;
    const vlt   = getVolatility(coin).toFixed(1);
    // Сила vs BTC: если монета растёт больше BTC — сильная
    const strength = btcChg !== 0 ? chg24 - btcChg : chg24;
    const strengthLabel = strength > 2 ? '💪 Сильная' : strength < -2 ? '😮 Слабая' : '➡️ Нейтральная';
    const strengthClass = strength > 2 ? 'strong' : strength < -2 ? 'weak' : 'neutral';
    const color = COMPARE_COLORS[i];
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:3px;height:24px;border-radius:2px;background:${color};flex-shrink:0"></div>
          ${coin.image ? `<img src="${coin.image}" style="width:18px;height:18px;border-radius:50%;" alt="">` : ''}
          <div>
            <div style="font-weight:600">${(coin.symbol||'').toUpperCase()}</div>
            <div style="font-size:8px;color:var(--m2)">${coin.name}</div>
          </div>
        </div>
      </td>
      <td>${fmtPrice(coin.current_price)}</td>
      <td style="color:${chg24>=0?'var(--g)':'var(--r)'}">${fmtChg(chg24)}</td>
      <td style="color:${chg7>=0?'var(--g)':'var(--r)'}">${fmtChg(chg7)}</td>
      <td style="color:var(--m)">${fmtBig(coin.market_cap)}</td>
      <td style="color:var(--m)">${fmtBig(coin.total_volume)}</td>
      <td style="color:var(--y)">${vlt}%</td>
      <td><span class="strength-badge ${strengthClass}">${strengthLabel} (${strength>=0?'+':''}${strength.toFixed(1)}%)</span></td>
    </tr>`;
  }).join('');
}

// ════════════════════════════════════════════════════
// SIGNALS ENGINE — анализ на каждый WS-тик
// ════════════════════════════════════════════════════
let soundEnabled = false;
let _signalHistory = [];
let _prevVolumes = {};
let _prevPricesSignal = {};
let _audioCtx = null;
// Дедупликация: не спамить одним сигналом чаще раза в 60 сек
const _sigCooldown = {};

function toggleSound(){
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-btn');
  const lbl = document.getElementById('sound-label');
  if(btn) btn.classList.toggle('on', soundEnabled);
  if(lbl) lbl.textContent = soundEnabled ? 'ЗВУК ВКЛ' : 'ЗВУК ВЫКЛ';
  if(soundEnabled){
    if(!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playSignalSound('test');
  }
}

function playSignalSound(type){
  if(!soundEnabled || !_audioCtx) return;
  try{
    const osc  = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain); gain.connect(_audioCtx.destination);
    const t = _audioCtx.currentTime;
    if(type === 'vol'){
      osc.frequency.setValueAtTime(440, t); osc.frequency.setValueAtTime(660, t+0.1);
      gain.gain.setValueAtTime(0.12, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
      osc.start(t); osc.stop(t+0.4);
    } else if(type === 'pump'){
      osc.frequency.setValueAtTime(330, t); osc.frequency.linearRampToValueAtTime(660, t+0.3);
      gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      osc.start(t); osc.stop(t+0.5);
    } else if(type === 'dump'){
      osc.frequency.setValueAtTime(440, t); osc.frequency.linearRampToValueAtTime(220, t+0.3);
      gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      osc.start(t); osc.stop(t+0.5);
    } else if(type === 'break-high'){
      osc.frequency.setValueAtTime(880, t); gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.15); osc.start(t); osc.stop(t+0.15);
      const o2=_audioCtx.createOscillator(); const g2=_audioCtx.createGain();
      o2.connect(g2); g2.connect(_audioCtx.destination);
      o2.frequency.setValueAtTime(1100,t+0.2); g2.gain.setValueAtTime(0.12,t+0.2);
      g2.gain.exponentialRampToValueAtTime(0.001,t+0.4); o2.start(t+0.2); o2.stop(t+0.4);
    } else {
      osc.frequency.setValueAtTime(520, t); gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.3); osc.start(t); osc.stop(t+0.3);
    }
  } catch(e){}
}

// Вызывается на каждый WS-тик (~1 сек на монету)
function analyzeSignalsTick(coin, price, prevPrice, chg24, vol24, high24, low24){
  const sym = (coin.symbol||'').toUpperCase();
  const cgId = coin.id;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const newSignals = [];

  // Кулдаун: один сигнал одного типа для монеты не чаще раза в 60 сек
  const canFire = (key) => {
    const last = _sigCooldown[key] || 0;
    if(Date.now() - last < 60000) return false;
    _sigCooldown[key] = Date.now();
    return true;
  };

  // 1. Быстрый памп — цена выросла >0.5% за тик (~1 сек)
  if(prevPrice && prevPrice > 0 && price > 0){
    const tickPct = ((price - prevPrice) / prevPrice) * 100;
    if(tickPct >= 0.5 && canFire(cgId+'_pump')){
      newSignals.push({ id:cgId+'_pump', type:'pump', icon:'🚀', coin:sym,
        text:`+${tickPct.toFixed(2)}% за тик`, val:fmtPrice(price), time:timeStr, coinId:cgId });
    }
    if(tickPct <= -0.5 && canFire(cgId+'_dump')){
      newSignals.push({ id:cgId+'_dump', type:'dump', icon:'💥', coin:sym,
        text:`${tickPct.toFixed(2)}% за тик`, val:fmtPrice(price), time:timeStr, coinId:cgId });
    }
  }

  // 2. Пробой High 24h
  const prevP = _prevPricesSignal[cgId];
  if(high24 > 0 && prevP && prevP < high24 && price >= high24 && canFire(cgId+'_bh')){
    newSignals.push({ id:cgId+'_bh', type:'break-high', icon:'⬆️', coin:sym,
      text:'пробой High 24ч', val:fmtPrice(high24), time:timeStr, coinId:cgId });
  }

  // 3. Пробой Low 24h
  if(low24 > 0 && prevP && prevP > low24 && price <= low24 && canFire(cgId+'_bl')){
    newSignals.push({ id:cgId+'_bl', type:'break-low', icon:'⬇️', coin:sym,
      text:'пробой Low 24ч', val:fmtPrice(low24), time:timeStr, coinId:cgId });
  }

  // 4. Объёмный всплеск (сравниваем с предыдущим снапшотом vol)
  const prevVol = _prevVolumes[cgId];
  if(prevVol && prevVol > 0 && vol24 > prevVol * 1.3 && vol24 > 1_000_000 && canFire(cgId+'_vol')){
    newSignals.push({ id:cgId+'_vol', type:'vol', icon:'📊', coin:sym,
      text:`объём ×${(vol24/prevVol).toFixed(1)}`, val:fmtBig(vol24), time:timeStr, coinId:cgId });
  }

  // 5. Экстремальное 24ч движение при первом появлении
  if(!prevP && Math.abs(chg24) > 8 && canFire(cgId+'_ext')){
    newSignals.push({ id:cgId+'_ext', type:chg24>0?'pump':'dump',
      icon:chg24>0?'🔥':'🧊', coin:sym,
      text:`${chg24>0?'+':''}${chg24.toFixed(1)}% за 24ч`,
      val:fmtPrice(price), time:timeStr, coinId:cgId });
  }

  _prevPricesSignal[cgId] = price;
  _prevVolumes[cgId] = vol24;

  if(!newSignals.length) return;

  const existingIds = new Set(_signalHistory.map(s=>s.id));
  const fresh = newSignals.filter(s => !existingIds.has(s.id));
  if(!fresh.length) return;

  _signalHistory = [...fresh, ..._signalHistory].slice(0, 60);
  renderSignals(_signalHistory);

  // Звук для важнейшего сигнала
  const priority = ['break-high','break-low','pump','dump','vol'];
  for(const type of priority){
    const sig = fresh.find(s=>s.type===type);
    if(sig){ playSignalSound(sig.type); break; }
  }
}

// Оригинальный analyzeSignals — вызывается при первичной загрузке
function analyzeSignals(coins){
  if(!coins || coins.length < 2) return;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const newSignals = [];
  coins.forEach(coin => {
    const chg24 = coin.price_change_percentage_24h || 0;
    if(Math.abs(chg24) > 8){
      const sym = (coin.symbol||'').toUpperCase();
      newSignals.push({
        id: coin.id+'_init_'+Math.floor(Date.now()/300000),
        type: chg24>0?'pump':'dump', icon:chg24>0?'🔥':'🧊', coin:sym,
        text:`${chg24>0?'+':''}${chg24.toFixed(1)}% за 24ч`,
        val:fmtPrice(coin.current_price), time:timeStr, coinId:coin.id,
      });
    }
    _prevPricesSignal[coin.id] = coin.current_price;
    _prevVolumes[coin.id] = coin.total_volume;
  });
  if(newSignals.length) renderSignals(newSignals.slice(0,20));
}

function renderSignals(signals){
  const track = document.getElementById('signals-track');
  if(!track) return;
  if(!signals.length){
    track.innerHTML = '<span class="signal-item" style="color:var(--m2);font-style:italic;">Ждём движения рынка...</span>';
    return;
  }
  const html = signals.map((s,i) =>
    `<span class="signal-item ${s.type}${i===0?' new':''}" onclick="focusCoin('${s.coinId}')" title="${s.time}">
      <span class="sig-icon">${s.icon}</span>
      <span class="sig-coin">${s.coin}</span>
      <span class="sig-val">${s.text}</span>
      <span class="sig-val" style="color:var(--t)">${s.val}</span>
      <span class="sig-time">${s.time}</span>
    </span>`
  ).join('');
  track.innerHTML = html + html;
  const duration = Math.max(25, signals.length * 5);
  track.style.animationDuration = duration + 's';
}

        <button class="compare-add-btn" onclick="showCompareSearch()">+ ДОБАВИТЬ</button>
        <div class="compare-search-wrap" id="compare-search-wrap" style="display:none">
          <input class="compare-search-inp" id="compare-search-inp"
            placeholder="Поиск монеты..." oninput="filterCompareSearch(this.value)"
            onblur="setTimeout(()=>hideCompareSearch(),200)">
          <div class="compare-dropdown" id="compare-dropdown"></div>
        </div>
      </div>
      <div class="compare-chart-wrap">
        <canvas id="compare-chart"></canvas>
      </div>
      <table class="compare-table">
        <thead><tr>
          <th>МОНЕТА</th>
          <th>ЦЕНА</th>
          <th>24Ч %</th>
          <th>7Д %</th>
          <th>MCAP</th>
          <th>ОБЪЁМ</th>
          <th>ВОЛАТ.</th>
          <th>СИЛА vs BTC</th>
        </tr></thead>
        <tbody id="compare-tbody"></tbody>
      </table>
    </div>

<div class="impulse-popup" id="impulse-popup"></div>

<script>
<script>
// ══════════════════════════════════════════════════════
// SCALPBOARD-STYLE CANDLE CARDS — полный rebuild
// ══════════════════════════════════════════════════════

const _klineCache   = {};   // PAIR → { candles, ts }
const KLINE_TTL     = 60000;
const _impulseCooldown = {};
const _impulseMinPct   = 3;

// ── Render grid ───────────────────────────────────────
function renderCandleGrid(coins){
  const area   = document.getElementById('coins-area');
  const maxVol = Math.max(...coins.map(c => c.total_volume || 0));
  area.innerHTML = '<div class="candle-grid" id="candle-grid"></div>';
  const grid = document.getElementById('candle-grid');
  grid.innerHTML = coins.map(c => renderCandleCard(c, maxVol)).join('');

  // Wait for layout then load charts — use requestAnimationFrame to ensure DOM is painted
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      coins.forEach((c, i) => setTimeout(() => loadCandleChart(c), i * 80));
    });
  });
}

// ── Render single card ────────────────────────────────
function renderCandleCard(c, maxVol){
  const ws      = _wsCache[c.id];
  const chg24   = ws?.chg24 ?? (c.price_change_percentage_24h || 0);
  const chg1h   = c.price_change_percentage_1h_in_currency || 0;
  const chg7    = c.price_change_percentage_7d_in_currency || c.price_change_percentage_7d || 0;
  const vol     = c.total_volume || 0;
  const volPct  = maxVol > 0 ? Math.min(100, (vol / maxVol) * 100) : 0;
  const watched = watchlist.includes(c.id);
  const alerted = hasAlert(c.id);

  // NATR from 24h range
  let natrVal = null;
  const h24 = ws?.high24 || c.high_24h;
  const l24 = ws?.low24  || c.low_24h;
  if(h24 && l24 && l24 > 0) natrVal = ((h24 - l24) / l24 * 100);
  const natrStr = natrVal !== null ? natrVal.toFixed(1) + '%' : '—';
  const natrColor = natrVal > 8 ? '#f39c12' : natrVal > 4 ? '#e8722a' : 'rgba(232,234,240,0.35)';

  // Activity ratio vol/mcap
  const act = c.market_cap > 0 ? (vol / c.market_cap * 100).toFixed(1) + '%' : '—';

  const safeId  = c.id.replace(/[^a-z0-9]/gi, '_');
  const sym     = (c.symbol || '').toUpperCase();
  const isUp    = chg24 >= 0;

  return `<div class="candle-card ${watched ? 'watched' : ''}" id="cc2-${safeId}" onclick="focusCoin('${c.id}')">
    <div class="cc2-impulse"></div>

    <!-- Top bar: SYM · chg · natr · vol/mc · rank -->
    <div class="cc2-topbar">
      <span class="cc2-sym">${sym}</span>
      <span class="cc2-pair">/ USDT</span>
      <span class="cc2-chg ${isUp ? 'up' : 'down'}" data-chg="${c.id}" data-chg24="${c.id}">${fmtChg(chg24)}</span>
      <div class="cc2-inds">
        <span class="cc2-pill" title="NATR 24h — диапазон свечи">∿ <span data-natr="${c.id}" style="color:${natrColor}">${natrStr}</span></span>
        <span class="cc2-pill" title="Vol/Mcap — активность">⬛ <span>${act}</span></span>
        <span class="cc2-pill" style="color:rgba(232,234,240,0.2)">#${c.market_cap_rank || '?'}</span>
      </div>
      ${alerted ? '<span style="color:var(--a);font-size:9px;margin-left:4px">●</span>' : ''}
      <div class="cc2-actions" onclick="event.stopPropagation()">
        <button class="cc-btn watch-btn ${watched ? 'active' : ''}" onclick="toggleWatch(event,'${c.id}')">${watched ? '★' : '☆'}</button>
        <button class="cc-btn" onclick="event.stopPropagation();openAlertModal(null,'${c.id}')">🔔</button>
      </div>
    </div>

    <!-- Chart with watermark ticker -->
    <div class="cc2-chart-wrap" id="cc2wrap-${safeId}">
      <div class="cc2-watermark"><span>${sym}</span></div>
      <div class="cc2-loading" id="cc2load-${safeId}">ЗАГРУЗКА...</div>
      <canvas id="cc2cv-${safeId}"></canvas>
    </div>

    <!-- Bottom metrics -->
    <div class="cc2-metrics">
      <div class="cc2-metric">
        <span class="cc2-ml">ЦЕНА</span>
        <span class="cc2-mv" data-price="${c.id}">${fmtPrice(c.current_price)}</span>
      </div>
      <div class="cc2-metric">
        <span class="cc2-ml">ОБЪ 24Ч</span>
        <span class="cc2-mv">${fmtBig(vol)}</span>
      </div>
      <div class="cc2-metric">
        <span class="cc2-ml">1Ч</span>
        <span class="cc2-mv ${chg1h >= 0 ? 'up' : 'dn'}">${fmtChg(chg1h)}</span>
      </div>
      <div class="cc2-metric">
        <span class="cc2-ml">7Д</span>
        <span class="cc2-mv ${chg7 >= 0 ? 'up' : 'dn'}">${fmtChg(chg7)}</span>
      </div>
    </div>
    <div class="cc2-volbar"><div class="cc2-volfill" style="width:${volPct}%"></div></div>
  </div>`;
}

// ── Load Binance 5m kline ─────────────────────────────
async function loadCandleChart(coin){
  const wsCfg  = BINANCE_WS_PAIRS.find(p => p.cgId === coin.id);
  // Build pair: prefer WS mapping, fallback to symbol+USDT
  const pair   = (wsCfg?.pair || coin.symbol?.toLowerCase() + 'usdt').toUpperCase();
  const safeId = coin.id.replace(/[^a-z0-9]/gi, '_');
  const canvas  = document.getElementById('cc2cv-' + safeId);
  const loadEl  = document.getElementById('cc2load-' + safeId);
  if(!canvas) return;

  try{
    let candles;
    const cached = _klineCache[pair];
    if(cached && Date.now() - cached.ts < KLINE_TTL){
      candles = cached.candles;
    } else {
      const r = await fetch(
        `https://api.binance.com/api/v3/klines?symbol=${pair}&interval=5m&limit=80`,
        { signal: AbortSignal.timeout(6000) }
      );
      if(!r.ok){
        // Pair not on Binance (e.g. some CoinGecko-only tokens) — show sparkline fallback
        drawSparklineFallback(canvas, coin);
        if(loadEl) loadEl.style.display = 'none';
        return;
      }
      const raw = await r.json();
      if(!Array.isArray(raw) || raw.length < 5){
        drawSparklineFallback(canvas, coin);
        if(loadEl) loadEl.style.display = 'none';
        return;
      }
      candles = raw.map(k => ({ t:+k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5] }));
      _klineCache[pair] = { candles, ts: Date.now() };
    }

    if(loadEl) loadEl.style.display = 'none';
    drawCandleChart(canvas, candles);
  } catch(e){
    // Network error — try sparkline
    drawSparklineFallback(canvas, coin);
    if(loadEl) loadEl.style.display = 'none';
  }
}

// ── Sparkline fallback (uses CoinGecko 7d data) ───────
function drawSparklineFallback(canvas, coin){
  const sp = coin.sparkline_in_7d?.price;
  if(!sp || sp.length < 2){ return; }
  const wrap = canvas.parentElement;
  if(!wrap) return;
  sizeCanvas(canvas, wrap);
  const ctx = canvas.getContext('2d');
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  ctx.scale ? null : null; // already scaled in sizeCanvas
  const pts = sp;
  const min = Math.min(...pts), max = Math.max(...pts), range = max - min || 1;
  const isUp = pts[pts.length-1] >= pts[0];
  const col  = isUp ? '#2ecc71' : '#e74c3c';
  // clear
  ctx.fillStyle = '#06080c'; ctx.fillRect(0, 0, W, H);
  // line
  ctx.beginPath();
  pts.forEach((v, i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - ((v - min) / range) * (H - 8) - 4;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
  // fill
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = isUp ? 'rgba(46,204,113,0.12)' : 'rgba(231,76,60,0.1)';
  ctx.fill();
}

// ── Size canvas to wrapper ────────────────────────────
function sizeCanvas(canvas, wrap){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  // Use getBoundingClientRect for reliable width even before full layout
  const rect = wrap.getBoundingClientRect();
  const W = rect.width  > 10 ? rect.width  : wrap.offsetWidth  || 260;
  const H = rect.height > 10 ? rect.height : wrap.offsetHeight || 120;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.getContext('2d').scale(dpr, dpr);
  return { W, H };
}

// ── Draw professional candle chart ────────────────────
function drawCandleChart(canvas, candles){
  const wrap = canvas.parentElement;
  if(!wrap || !candles || candles.length < 2) return;

  const { W, H } = sizeCanvas(canvas, wrap);
  const ctx = canvas.getContext('2d');

  const slice = candles.slice(-60);
  const vis   = slice.length;

  const PAD_L = 46, PAD_R = 3, PAD_T = 6, PAD_B = 20;
  const VOL_H = 18; // volume panel height
  const CW    = W - PAD_L - PAD_R;
  const CH    = H - PAD_T - PAD_B - VOL_H;

  let minP = Math.min(...slice.map(c => c.l));
  let maxP = Math.max(...slice.map(c => c.h));
  const padP = (maxP - minP) * 0.06;
  minP -= padP; maxP += padP;
  const range = maxP - minP || 1;
  const toY   = p => PAD_T + CH - ((p - minP) / range) * CH;

  const maxV = Math.max(...slice.map(c => c.v)) || 1;
  const gap  = CW / vis;
  const cw   = Math.max(1.5, Math.min(gap * 0.72, 10));

  const C_UP   = '#2ecc71';
  const C_DN   = '#e74c3c';
  const C_GRID = 'rgba(255,255,255,0.032)';
  const C_AXIS = 'rgba(232,234,240,0.22)';

  // ── Background ──
  ctx.fillStyle = '#06080c';
  ctx.fillRect(0, 0, W, H);

  // ── Grid + price axis ──
  const gridCount = 4;
  ctx.font = '7px JetBrains Mono,monospace';
  ctx.textAlign = 'right';
  for(let i = 0; i <= gridCount; i++){
    const p = maxP - (range / gridCount) * i;
    const y = toY(p);
    if(y < PAD_T - 2 || y > PAD_T + CH + 2) continue;
    ctx.strokeStyle = C_GRID; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    ctx.fillStyle = C_AXIS;
    const lbl = p >= 10000 ? '$' + (p/1000).toFixed(1) + 'K'
              : p >= 1     ? '$' + p.toFixed(p >= 100 ? 1 : 2)
              : p >= 0.01  ? '$' + p.toFixed(4)
              :               '$' + p.toFixed(6);
    ctx.fillText(lbl, PAD_L - 3, y + 2.5);
  }

  // ── Volume separator ──
  const volTop = H - PAD_B;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD_L, volTop); ctx.lineTo(W - PAD_R, volTop); ctx.stroke();

  // ── EMA 20 ──
  const closes = slice.map(c => c.c);
  const k20 = 2 / 21; let ema20 = closes[0];
  ctx.beginPath(); ctx.strokeStyle = 'rgba(59,130,246,0.7)'; ctx.lineWidth = 1;
  closes.forEach((v, i) => {
    ema20 = v * k20 + ema20 * (1 - k20);
    const x = PAD_L + i * gap + gap / 2;
    const y = toY(ema20);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // ── Volume bars ──
  slice.forEach((c, i) => {
    const x  = PAD_L + i * gap + gap / 2;
    const vh = Math.max(1, (c.v / maxV) * VOL_H * 0.85);
    ctx.fillStyle = c.c >= c.o ? 'rgba(46,204,113,0.22)' : 'rgba(231,76,60,0.22)';
    ctx.fillRect(x - cw / 2, volTop - vh, Math.max(1, cw), vh);
  });

  // ── Candles ──
  slice.forEach((c, i) => {
    const x    = PAD_L + i * gap + gap / 2;
    const isUp = c.c >= c.o;
    const yH   = toY(c.h), yL = toY(c.l);
    const yO   = toY(c.o), yC = toY(c.c);

    // Wick
    ctx.strokeStyle = isUp ? 'rgba(46,204,113,0.6)' : 'rgba(231,76,60,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();

    // Body
    const bTop = Math.min(yO, yC);
    const bH   = Math.max(1.5, Math.abs(yC - yO));
    if(isUp){
      ctx.strokeStyle = C_UP; ctx.lineWidth = 1;
      ctx.strokeRect(x - cw / 2, bTop, cw, bH);
      ctx.fillStyle = 'rgba(46,204,113,0.15)';
      ctx.fillRect(x - cw / 2, bTop, cw, bH);
    } else {
      ctx.fillStyle = C_DN;
      ctx.fillRect(x - cw / 2, bTop, cw, bH);
    }
  });

  // ── Last price dashed line + badge ──
  const last  = slice[slice.length - 1];
  const lastY = toY(last.c);
  const isLastUp = last.c >= last.o;
  ctx.strokeStyle = isLastUp ? 'rgba(46,204,113,0.4)' : 'rgba(231,76,60,0.4)';
  ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
  ctx.beginPath(); ctx.moveTo(PAD_L, lastY); ctx.lineTo(W - PAD_R, lastY); ctx.stroke();
  ctx.setLineDash([]);

  // Badge right side
  const lbl = last.c >= 1000 ? '$' + last.c.toLocaleString('en',{maximumFractionDigits:0})
            : last.c >= 1    ? '$' + last.c.toFixed(2)
            : last.c >= 0.01 ? '$' + last.c.toFixed(4)
            :                   '$' + last.c.toFixed(6);
  ctx.font = 'bold 8px JetBrains Mono,monospace'; ctx.textAlign = 'right';
  const bw = ctx.measureText(lbl).width + 8;
  ctx.fillStyle = isLastUp ? C_UP : C_DN;
  ctx.fillRect(W - PAD_R - bw, lastY - 7, bw, 14);
  ctx.fillStyle = '#000';
  ctx.fillText(lbl, W - PAD_R - 2, lastY + 3);

  // ── Time axis ──
  const vStep = Math.max(1, Math.round(vis / 6));
  ctx.font = '7px JetBrains Mono,monospace'; ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(232,234,240,0.13)';
  for(let i = 0; i < vis; i += vStep){
    const x = PAD_L + i * gap + gap / 2;
    const d = new Date(slice[i].t);
    const lbl2 = d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    ctx.fillText(lbl2, x, H - PAD_B + 12);
  }

  // ── EMA legend ──
  ctx.font = '7px JetBrains Mono,monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(59,130,246,0.7)';
  ctx.fillText('EMA20', PAD_L + 3, PAD_T + 9);
}

// ── Impulse detection ─────────────────────────────────
function detectImpulse(cgId, chg24){
  if(Math.abs(chg24) < _impulseMinPct) return;
  const now = Date.now();
  if(_impulseCooldown[cgId] && now - _impulseCooldown[cgId] < 30000) return;
  _impulseCooldown[cgId] = now;

  const isUp = chg24 > 0;
  const coin = allCoins.find(c => c.id === cgId);
  const sym  = coin?.symbol?.toUpperCase() || cgId;

  const cardId = 'cc2-' + cgId.replace(/[^a-z0-9]/gi, '_');
  const card   = document.getElementById(cardId);
  if(card){
    const badge = card.querySelector('.cc2-impulse');
    card.classList.remove('impulse-up', 'impulse-dn');
    void card.offsetWidth;
    card.classList.add(isUp ? 'impulse-up' : 'impulse-dn');
    if(badge) badge.textContent = `⚡ ИМПУЛЬС ${isUp?'+':''}${chg24.toFixed(1)}%`;
    setTimeout(() => { card.classList.remove('impulse-up', 'impulse-dn'); if(badge) badge.textContent=''; }, 8000);
  }

  showImpulsePopup(sym, chg24, isUp);
  if(typeof soundEnabled !== 'undefined' && soundEnabled && typeof playBeep === 'function') playBeep(isUp ? 880 : 440);
}

function showImpulsePopup(sym, pct, isUp){
  const popup = document.getElementById('impulse-popup');
  if(!popup) return;
  const item = document.createElement('div');
  item.className = 'impulse-item ' + (isUp ? 'pump' : 'dump');
  item.innerHTML = `<span class="ii-icon">${isUp?'🚀':'📉'}</span><span class="ii-sym">${sym}</span><span class="ii-pct ${isUp?'up':'dn'}">${isUp?'+':''}${pct.toFixed(1)}%</span><span class="ii-tf">5М · Binance</span>`;
  popup.appendChild(item);
  setTimeout(() => { if(item.parentNode) item.parentNode.removeChild(item); }, 6000);
}

// ── Hook setView ──────────────────────────────────────
const _baseSetView2 = window.setView;
window.setView = function(v, btn){
  currentView = v;
  document.querySelectorAll('.tb-view-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilter();
};

// ── Hook renderCoins ──────────────────────────────────
const _baseRenderCoins2 = window.renderCoins;
window.renderCoins = function(coins){
  if(currentView === 'candle'){
    document.getElementById('count-shown').textContent = coins.length;
    renderCandleGrid(coins);
    return;
  }
  _baseRenderCoins2(coins);
};

// ── Hook patchPriceDOM ────────────────────────────────
const _basePatch2 = window.patchPriceDOM;
window.patchPriceDOM = function(cgId, price, chg24, prevPrice){
  _basePatch2(cgId, price, chg24, prevPrice);
  // Update candle card price display
  const safeId = cgId.replace(/[^a-z0-9]/gi, '_');
  const prEl   = document.querySelector(`#cc2-${safeId} [data-price="${cgId}"]`);
  const chgEl  = document.querySelector(`#cc2-${safeId} .cc2-chg`);
  if(prEl)  prEl.textContent  = fmtPrice(price);
  if(chgEl){ chgEl.textContent = fmtChg(chg24); chgEl.className = 'cc2-chg ' + (chg24>=0?'up':'down'); }
  // Impulse check
  detectImpulse(cgId, chg24);
};

// ── Refresh klines every 60s ──────────────────────────
setInterval(() => {
  if(currentView !== 'candle') return;
  Object.keys(_klineCache).forEach(k => { _klineCache[k].ts = 0; });
  document.querySelectorAll('.candle-card').forEach(card => {
    const safeId = card.id.replace('cc2-', '');
    const coin   = allCoins.find(c => c.id.replace(/[^a-z0-9]/gi,'_') === safeId);
    if(coin) loadCandleChart(coin);
  });
}, 60000);

</script>
