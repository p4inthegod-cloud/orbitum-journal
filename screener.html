<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM — Signal Screener</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #05070a;
  --bg2:   #080c12;
  --bg3:   #0d1219;
  --bg4:   #111820;
  --a:     #e8722a;
  --a2:    rgba(232,114,42,0.10);
  --a3:    rgba(232,114,42,0.28);
  --a4:    rgba(232,114,42,0.05);
  --bd:    rgba(255,255,255,0.06);
  --bd2:   rgba(255,255,255,0.11);
  --t:     #e8e4dc;
  --m:     rgba(232,228,220,0.50);
  --m2:    rgba(232,228,220,0.24);
  --m3:    rgba(232,228,220,0.10);
  --g:     #2ecc71;
  --g2:    rgba(46,204,113,0.12);
  --r:     #e74c3c;
  --r2:    rgba(231,76,60,0.12);
  --y:     #f39c12;
  --y2:    rgba(243,156,18,0.12);
  --mono:  'JetBrains Mono', monospace;
  --disp:  'Bebas Neue', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--t);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINES OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── TICKER STRIP ── */
.ticker-strip {
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  height: 32px;
  overflow: hidden;
  position: relative;
}
.ticker-strip::before, .ticker-strip::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0;
  width: 60px;
  z-index: 2;
}
.ticker-strip::before { left: 0; background: linear-gradient(90deg, var(--bg2), transparent); }
.ticker-strip::after  { right: 0; background: linear-gradient(-90deg, var(--bg2), transparent); }
.ticker-inner {
  display: flex;
  gap: 0;
  white-space: nowrap;
  animation: ticker 35s linear infinite;
  height: 100%;
  align-items: center;
}
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.tick { display: inline-flex; align-items: center; gap: 6px; padding: 0 20px; font-size: 10px; border-right: 1px solid var(--bd); height: 100%; }
.tick-sym { color: var(--t); font-weight: 500; letter-spacing: 0.5px; }
.tick-price { color: var(--m); }
.tick-up { color: var(--g); }
.tick-dn { color: var(--r); }
.tick-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--bd2); }

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--bd);
  background: var(--bg2);
}
.logo {
  font-family: var(--disp);
  font-size: 22px;
  letter-spacing: 4px;
  color: var(--a);
}
.logo-dot { width: 6px; height: 6px; background: var(--a); border-radius: 50%; animation: blink 2s ease-in-out infinite; display: inline-block; margin-left: 4px; vertical-align: middle; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.header-tag {
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--m2);
  text-transform: uppercase;
  border: 1px solid var(--bd);
  padding: 3px 8px;
  border-radius: 3px;
}
.header-spacer { flex: 1; }
.header-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.header-stat-val {
  font-family: var(--disp);
  font-size: 18px;
  letter-spacing: 1px;
  line-height: 1;
}
.header-stat-lbl {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--m2);
  text-transform: uppercase;
}
.header-divider { width: 1px; height: 32px; background: var(--bd); }

/* ── MAIN LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  min-height: calc(100vh - 95px);
}

/* ── LEFT SIDEBAR — SIGNAL FEED ── */
.sidebar-left {
  border-right: 1px solid var(--bd);
  background: var(--bg2);
  display: flex;
  flex-direction: column;
}
.sidebar-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--bd);
}
.sidebar-label {
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--m2);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-label .pulse-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--a);
  animation: pulse-a 1.5s ease-in-out infinite;
}
@keyframes pulse-a {
  0%,100%{box-shadow:0 0 0 0 rgba(232,114,42,0.7)}
  50%{box-shadow:0 0 0 6px rgba(232,114,42,0)}
}

/* Signal Cards */
.signal-card {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.signal-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
}
.signal-card.long::before { background: var(--g); }
.signal-card.short::before { background: var(--r); }
.signal-card.watch::before { background: var(--y); }
.signal-card:hover { border-color: var(--bd2); transform: translateX(2px); }

.sig-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.sig-sym {
  font-family: var(--disp);
  font-size: 16px;
  letter-spacing: 1px;
  flex: 1;
}
.sig-tag {
  font-size: 7px;
  letter-spacing: 1.5px;
  padding: 2px 6px;
  border-radius: 2px;
  font-weight: 600;
  text-transform: uppercase;
}
.tag-long { background: var(--g2); color: var(--g); }
.tag-short { background: var(--r2); color: var(--r); }
.tag-watch { background: var(--y2); color: var(--y); }

.sig-setup { font-size: 9px; color: var(--m); margin-bottom: 6px; line-height: 1.6; }
.sig-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 4px;
}
.sig-metric { font-size: 8px; color: var(--m2); }
.sig-metric-val { font-size: 10px; color: var(--t); display: block; }
.sig-time { font-size: 7px; color: var(--m3); position: absolute; top: 10px; right: 10px; }

/* AI Score Bar */
.ai-score-wrap { margin-top: 6px; }
.ai-score-bar { height: 2px; background: var(--bg4); border-radius: 1px; overflow: hidden; }
.ai-score-fill { height: 100%; border-radius: 1px; transition: width 0.5s ease; }
.score-lbl { display: flex; justify-content: space-between; margin-bottom: 3px; }
.score-lbl span { font-size: 7px; color: var(--m2); letter-spacing: 1px; }

/* ── CENTER — SCREENER TABLE ── */
.center { display: flex; flex-direction: column; }

/* Filters Bar */
.filters-bar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--m2);
  background: transparent;
  border: 1px solid var(--bd);
  padding: 5px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--bd2); color: var(--m); }
.filter-btn.active { border-color: var(--a3); color: var(--a); background: var(--a2); }
.filter-sep { width: 1px; height: 20px; background: var(--bd); }

.search-input {
  flex: 1;
  min-width: 120px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 4px;
  padding: 5px 12px;
  color: var(--t);
  font-family: var(--mono);
  font-size: 10px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--m2); }
.search-input:focus { border-color: var(--a3); }

/* View Modes */
.view-toggle { display: flex; gap: 2px; }
.view-btn {
  background: transparent;
  border: 1px solid var(--bd);
  color: var(--m2);
  font-family: var(--mono);
  font-size: 9px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
}
.view-btn:first-child { border-radius: 4px 0 0 4px; }
.view-btn:last-child { border-radius: 0 4px 4px 0; }
.view-btn.active { background: var(--a2); border-color: var(--a3); color: var(--a); }

/* Screener Table */
.table-wrap {
  flex: 1;
  overflow: auto;
}
.screener-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}
.screener-table thead th {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--m2);
  text-transform: uppercase;
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--bd);
  background: var(--bg2);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
  z-index: 2;
}
.screener-table thead th:hover { color: var(--m); }
.screener-table thead th.sorted { color: var(--a); }
.sort-arrow { margin-left: 4px; font-size: 8px; }

.screener-table tbody tr {
  border-bottom: 1px solid var(--bd);
  transition: background 0.1s;
  cursor: pointer;
}
.screener-table tbody tr:hover { background: var(--bg2); }
.screener-table tbody tr.highlighted {
  background: var(--a4);
  border-color: var(--a3);
}

.screener-table td {
  padding: 10px 14px;
  vertical-align: middle;
  white-space: nowrap;
}

/* Symbol Cell */
.sym-cell { display: flex; align-items: center; gap: 10px; }
.sym-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--bd2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--disp);
  font-size: 10px;
  color: var(--a);
  flex-shrink: 0;
}
.sym-name { font-family: var(--disp); font-size: 14px; letter-spacing: 0.5px; }
.sym-full { font-size: 8px; color: var(--m2); margin-top: 1px; letter-spacing: 0.5px; }

/* Signal Pill in table */
.signal-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 8px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
}
.pill-long  { background: var(--g2); color: var(--g); border: 1px solid rgba(46,204,113,0.2); }
.pill-short { background: var(--r2); color: var(--r); border: 1px solid rgba(231,76,60,0.2); }
.pill-watch { background: var(--y2); color: var(--y); border: 1px solid rgba(243,156,18,0.2); }
.pill-none  { background: var(--m3); color: var(--m2); border: 1px solid var(--bd); }
.pill-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

/* Mini sparkline */
.mini-spark { display: block; }

/* Score Bar in table */
.table-score {
  display: flex;
  align-items: center;
  gap: 6px;
}
.table-score-bar {
  width: 50px; height: 3px;
  background: var(--bg4);
  border-radius: 2px;
  overflow: hidden;
}
.table-score-fill { height: 100%; border-radius: 2px; }
.score-num { font-size: 10px; color: var(--t); }

/* Setup tags */
.setup-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.setup-tag {
  font-size: 7px;
  letter-spacing: 0.5px;
  color: var(--m2);
  border: 1px solid var(--bd);
  padding: 2px 5px;
  border-radius: 2px;
}

/* Price cell */
.price-val { font-family: var(--disp); font-size: 15px; }
.price-chg { font-size: 9px; margin-top: 1px; }
.up { color: var(--g); }
.dn { color: var(--r); }

/* Volume cell */
.vol-val { font-size: 10px; color: var(--t); }
.vol-vs { font-size: 8px; color: var(--m2); margin-top: 1px; }
.vol-up { color: var(--g); }
.vol-dn { color: var(--r); }

/* ── RIGHT SIDEBAR — DETAIL PANEL ── */
.sidebar-right {
  border-left: 1px solid var(--bd);
  background: var(--bg2);
  overflow-y: auto;
}
.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--m2);
}
.detail-empty-icon {
  font-family: var(--disp);
  font-size: 48px;
  color: var(--bd2);
  letter-spacing: 4px;
}
.detail-empty-txt { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }

.detail-header {
  padding: 16px;
  border-bottom: 1px solid var(--bd);
}
.detail-sym { font-family: var(--disp); font-size: 28px; letter-spacing: 2px; }
.detail-full { font-size: 9px; color: var(--m2); letter-spacing: 1px; margin-top: 2px; }
.detail-price-row { display: flex; align-items: baseline; gap: 10px; margin-top: 10px; }
.detail-price { font-family: var(--disp); font-size: 32px; letter-spacing: 1px; }
.detail-chg { font-size: 13px; }

/* Chart Area */
.chart-area { padding: 12px 16px; border-bottom: 1px solid var(--bd); }
.chart-label { font-size: 8px; letter-spacing: 2px; color: var(--m2); margin-bottom: 8px; text-transform: uppercase; }

/* AI Analysis Block */
.ai-block {
  padding: 14px 16px;
  border-bottom: 1px solid var(--bd);
}
.ai-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.ai-icon {
  width: 20px; height: 20px;
  border-radius: 4px;
  background: var(--a2);
  border: 1px solid var(--a3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.ai-title { font-size: 9px; letter-spacing: 2px; color: var(--a); text-transform: uppercase; }
.ai-verdict {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
}
.ai-verdict-line { font-size: 10px; color: var(--m); line-height: 1.7; }
.ai-verdict-line strong { color: var(--t); font-weight: 500; }

/* Key Levels */
.levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.level-item {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 5px;
  padding: 8px 10px;
}
.level-lbl { font-size: 7px; letter-spacing: 1.5px; color: var(--m2); text-transform: uppercase; margin-bottom: 3px; }
.level-val { font-family: var(--disp); font-size: 14px; letter-spacing: 0.5px; }

/* Indicators Row */
.indicators-row {
  padding: 12px 16px;
  border-bottom: 1px solid var(--bd);
}
.ind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.ind-item {
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 5px;
  padding: 8px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ind-name { font-size: 8px; color: var(--m2); letter-spacing: 1px; }
.ind-val { font-size: 10px; color: var(--t); }
.ind-bull { color: var(--g) !important; }
.ind-bear { color: var(--r) !important; }
.ind-neut { color: var(--y) !important; }

/* Telegram Button */
.tg-send-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: calc(100% - 32px);
  margin: 12px 16px;
  padding: 12px;
  background: var(--a2);
  border: 1px solid var(--a3);
  border-radius: 6px;
  color: var(--a);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.tg-send-btn:hover { background: var(--a3); color: var(--t); }
.tg-send-btn svg { width: 14px; height: 14px; }

/* ── MARKET OVERVIEW BAR ── */
.market-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--bd);
  background: var(--bg);
  overflow-x: auto;
}
.market-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 20px;
  border-right: 1px solid var(--bd);
  min-width: 120px;
}
.market-name { font-size: 7px; letter-spacing: 2px; color: var(--m2); text-transform: uppercase; }
.market-val { font-family: var(--disp); font-size: 18px; letter-spacing: 0.5px; }
.market-chg { font-size: 8px; }

/* ── FEAR/GREED METER ── */
.fg-meter { padding: 12px 16px; border-bottom: 1px solid var(--bd); }
.fg-track {
  height: 4px;
  background: linear-gradient(90deg, var(--r), var(--y), var(--g));
  border-radius: 2px;
  position: relative;
  margin: 8px 0;
}
.fg-needle {
  position: absolute;
  top: -4px;
  width: 12px; height: 12px;
  background: var(--t);
  border-radius: 50%;
  transform: translateX(-50%);
  transition: left 0.5s ease;
  border: 2px solid var(--bg2);
}
.fg-labels { display: flex; justify-content: space-between; font-size: 7px; color: var(--m2); margin-top: 4px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--a3); }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease forwards; }
@keyframes rowFlash { 0% { background: rgba(232,114,42,0.08); } 100% { background: transparent; } }
.row-flash { animation: rowFlash 1s ease; }

/* ── HEATMAP VIEW ── */
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 4px;
  padding: 16px;
}
.heat-cell {
  border-radius: 6px;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
  transition: opacity 0.15s;
  position: relative;
  overflow: hidden;
  min-height: 80px;
}
.heat-cell:hover { opacity: 0.85; }
.heat-cell.bg-strong-up  { background: rgba(46,204,113,0.25); border: 1px solid rgba(46,204,113,0.3); }
.heat-cell.bg-mild-up    { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.2); }
.heat-cell.bg-flat       { background: var(--bg3); border: 1px solid var(--bd); }
.heat-cell.bg-mild-dn    { background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.2); }
.heat-cell.bg-strong-dn  { background: rgba(231,76,60,0.25); border: 1px solid rgba(231,76,60,0.3); }
.heat-sym { font-family: var(--disp); font-size: 14px; letter-spacing: 0.5px; }
.heat-chg { font-size: 10px; font-weight: 500; }
.heat-sig { font-size: 7px; letter-spacing: 1px; color: var(--m2); text-transform: uppercase; }

/* Signal pulse badge */
.heat-badge {
  position: absolute;
  top: 6px; right: 6px;
  width: 6px; height: 6px;
  border-radius: 50%;
}
.badge-long  { background: var(--g); box-shadow: 0 0 6px var(--g); }
.badge-short { background: var(--r); box-shadow: 0 0 6px var(--r); }

/* ── NOTIFICATION TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--bg3);
  border: 1px solid var(--a3);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--t);
  z-index: 1000;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  max-width: 280px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-icon { color: var(--a); font-size: 14px; }
.toast-text { flex: 1; line-height: 1.4; }
.toast-sym { color: var(--a); font-family: var(--disp); letter-spacing: 1px; }

/* Hidden views */
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<!-- TICKER STRIP -->
<div class="ticker-strip">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">ORBITUM<span class="logo-dot"></span></div>
  <div class="header-tag">SIGNAL SCREENER</div>
  <div class="header-spacer"></div>
  <div class="header-stat">
    <div class="header-stat-val up" id="hdr-signals">24</div>

// ─── SPARKLINE ───────────────────────────────────────────────────
function drawSparkline(data, isUp, w=80, h=28) {
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1))*w;
    const y = h - ((v-min)/range)*(h-4) - 2;
    return `${x},${y}`;
  });
  const color = isUp ? '#2ecc71' : '#e74c3c';
  const fillColor = isUp ? 'rgba(46,204,113,0.08)' : 'rgba(231,76,60,0.08)';
  const lastX = (w/(data.length-1))*(data.length-1);
  const lastY = h - ((data[data.length-1]-min)/range)*(h-4) - 2;
  return `<svg width="${w}" height="${h}" class="mini-spark">
    <defs><linearGradient id="sg-${Math.random().toString(36).slice(2)}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}"/>
  </svg>`;
}

// ─── RENDER TABLE ─────────────────────────────────────────────────
function getFilteredSorted() {
  const search = document.getElementById('searchInput')?.value?.toUpperCase() || '';
  let data = ASSETS.filter(a => {
    if (search && !a.sym.includes(search) && !a.full.toUpperCase().includes(search)) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'long') return a.signal === 'long';
    if (currentFilter === 'short') return a.signal === 'short';
    if (currentFilter === 'watch') return a.signal === 'watch';
    if (currentFilter === 'breakout') return a.setup.some(s => s.toLowerCase().includes('breakout'));
    if (currentFilter === 'reversal') return a.setup.some(s => s.toLowerCase().includes('reversal') || s.toLowerCase().includes('double') || s.toLowerCase().includes('head'));
    if (currentFilter === 'trend') return a.setup.some(s => s.toLowerCase().includes('trend') || s.toLowerCase().includes('ema'));
    return true;
  });

  data.sort((a,b) => {
    let va = a[currentSort.key], vb = b[currentSort.key];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (currentSort.dir === 'asc') return va > vb ? 1 : -1;
    return va < vb ? 1 : -1;
  });
  return data;
}

function drawDetailChart(data, isUp, w=270, h=80) {
  const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = 10 + (i/(data.length-1))*(w-20);
    const y = 8 + (1 - (v-min)/range)*(h-16);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const color = isUp ? '#2ecc71' : '#e74c3c';
  const lastPt = pts[pts.length-1].split(',');
  return `<svg width="${w}" height="${h}" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="dcg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M${pts.join('L')}L${(w-10)},${h}L10,${h}Z" fill="url(#dcg)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3" fill="${color}" stroke="var(--bg2)" stroke-width="1.5"/>
  </svg>`;
}

function selectAsset(sym) {

  const a = ASSETS.find(x => x.sym === sym);

        <div>

          <div class="detail-full">${a.full}</div>
        </div>
        <span class="sig-tag ${a.signal==='long'?'tag-long':a.signal==='short'?'tag-short':'tag-watch'}" style="font-size:9px;padding:4px 10px;">${signalLabel}</span>
      </div>
      <div class="detail-price-row">
        <div class="detail-price">${typeof a.price==='number'&&a.price>1000?'$'+a.price.toLocaleString():'$'+a.price}</div>
        <div class="detail-chg ${isUp?'up':'dn'}">${isUp?'+':''}${a.chg}%</div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;">

        <span style="font-size:8px;color:var(--m2)">Vol <span style="color:var(--t)">${a.vol}B</span></span>
        <span style="font-size:8px;color:var(--m2)">RSI <span style="color:${a.rsi>=70?'var(--r)':a.rsi<=30?'var(--g)':'var(--y)'}">${a.rsi}</span></span>
      </div>
    </div>

    <div class="chart-area">
      <div class="chart-label">Price Action — 7D</div>
      ${drawDetailChart(a.spark, isUp)}

    <div class="ai-block">
      <div class="ai-header">
        <div class="ai-icon">⚡</div>
        <div class="ai-title">AI Analysis</div>
        <div style="flex:1"></div>
        <span style="font-size:8px;letter-spacing:1px;color:${scoreColor}">SCORE: ${a.score}/100</span>
      </div>
      <div class="ai-score-bar" style="margin-bottom:10px;height:3px;">
        <div class="ai-score-fill" style="width:${a.score}%;background:${scoreColor}"></div>
      </div>
      <div class="ai-verdict">
        <div class="ai-verdict-line">${a.ai}</div>
      </div>
      <div style="font-size:8px;color:var(--m2);margin-top:6px;letter-spacing:1px;">Setup: ${a.setup.join(' · ')}</div>
    </div>

    <div style="padding:12px 16px;border-bottom:1px solid var(--bd);">
      <div class="sidebar-label" style="margin-bottom:10px;">Key Levels</div>
      <div class="levels-grid">
        <div class="level-item">
          <div class="level-lbl">Entry Zone</div>
          <div class="level-val" style="color:var(--a)">${typeof a.entry==='number'&&a.entry>1?'$'+a.entry.toLocaleString():'$'+a.entry}</div>
        </div>
        <div class="level-item">
          <div class="level-lbl">Stop Loss</div>
          <div class="level-val" style="color:var(--r)">${typeof a.sl==='number'&&a.sl>1?'$'+a.sl.toLocaleString():'$'+a.sl}</div>
        </div>
        <div class="level-item">
          <div class="level-lbl">Target 1</div>
          <div class="level-val" style="color:var(--g)">${typeof a.tp1==='number'&&a.tp1>1?'$'+a.tp1.toLocaleString():'$'+a.tp1}</div>

        </div>
      </div>
    </div>

    <div class="indicators-row">
      <div class="sidebar-label" style="margin-bottom:10px;">Indicators</div>
      <div class="ind-grid">
        <div class="ind-item">
          <span class="ind-name">RSI (14)</span>
          <span class="ind-val ${a.rsi>=70?'ind-bear':a.rsi<=30?'ind-bull':'ind-neut'}">${a.rsi}</span>
        </div>
        <div class="ind-item">
          <span class="ind-name">EMA 21/50</span>

        </div>
        <div class="ind-item">

          <span class="ind-val ${a.chg>0?'ind-bull':'ind-bear'}">${a.chg>0?'Bullish':'Bearish'}</span>
        </div>
        <div class="ind-item">
          <span class="ind-name">Vol vs Avg</span>
          <span class="ind-val ${a.volMult>=1.5?'ind-bull':a.volMult<0.8?'ind-bear':'ind-neut'}">${a.volMult}x</span>
        </div>
        <div class="ind-item">
          <span class="ind-name">Trend (4H)</span>
          <span class="ind-val ${a.signal==='long'?'ind-bull':a.signal==='short'?'ind-bear':'ind-neut'}">${a.signal==='long'?'Up':a.signal==='short'?'Down':'Sideways'}</span>
        </div>
        <div class="ind-item">
          <span class="ind-name">AI Score</span>
          <span class="ind-val" style="color:${scoreColor}">${a.score}/100</span>
        </div>

    </div>

    <button class="tg-send-btn" onclick="sendToTelegram('${a.sym}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>

      SEND SIGNAL TO TELEGRAM

  `;

  // Re-render table to update highlight
  renderTable();
}

// ─── CONTROLS ─────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
  renderHeatmap();
}

function filterTable() { renderTable(); renderHeatmap(); }

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
}

function sortBy(key) {
  if (currentSort.key === key) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort = { key, dir: 'desc' };
  }
  document.querySelectorAll('.screener-table th').forEach(th => th.classList.remove('sorted'));
  renderTable();
}

function sendToTelegram(sym) {
  const a = ASSETS.find(x => x.sym === sym);
  if (!a) return;
  showToast(`Signal sent: <span class="toast-sym">${sym}</span> ${a.signal.toUpperCase()} — Score ${a.score}/100`);
}

function showToast(html) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').innerHTML = html;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ─── COUNTDOWN ───────────────────────────────────────────────────
function updateCountdown() {
  const el = document.querySelector('#hdr-signals')?.closest('.header-stat')?.parentElement?.querySelector('[style*="11px"]');
  // Simple live clock
  const now = new Date();
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const nextScan = document.querySelectorAll('.header-stat')[3]?.querySelector('.header-stat-val');
  if (nextScan) {
    let secs = parseInt(nextScan.dataset.secs || 227) - 1;
    if (secs < 0) secs = 300;
    nextScan.dataset.secs = secs;
    const m = Math.floor(secs/60), s = secs%60;
    nextScan.textContent = `0${m}:${String(s).padStart(2,'0')}:00`;
  }
}

// ─── INIT ─────────────────────────────────────────────────────────
renderTicker();
renderMarket();
renderSignalFeed();
renderSetupRadar();
renderTable();
renderHeatmap();

setInterval(updateCountdown, 1000);

setTimeout(() => showToast('New signal detected: <span class="toast-sym">NEAR</span> ▲ LONG — AI Score 94'), 4000);
setTimeout(() => showToast('New signal detected: <span class="toast-sym">SOL</span> ▲ LONG — AI Score 91'), 12000);
</script>
