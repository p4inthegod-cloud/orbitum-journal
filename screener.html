<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORBITUM — Скринер</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ RESET & ROOT ═══════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#06080c;--bg1:#0c0f15;--bg2:#101420;--bg3:#141824;
  --a:#e8722a;--a2:rgba(232,114,42,0.10);--a3:rgba(232,114,42,0.25);
  --g:#2ecc71;--r:#e74c3c;--y:#f39c12;--b:#3b82f6;
  --t:#e8eaf0;--m:rgba(232,234,240,0.45);--m2:rgba(232,234,240,0.18);
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --sb:220px;
  --font-mono:'JetBrains Mono',monospace;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Syne',sans-serif;
  --r8:8px;--r12:12px;--r16:16px;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--font-body);overflow:hidden;}

/* ══ NOISE OVERLAY ══════════════════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}

/* ══ AMBIENT GLOWS ══════════════════════════════════════════════════ */
.ambient{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(120px);}
.amb1{width:600px;height:400px;background:radial-gradient(ellipse,rgba(232,114,42,.06),transparent 70%);top:-100px;left:var(--sb);}
.amb2{width:400px;height:400px;background:radial-gradient(ellipse,rgba(46,204,113,.04),transparent 70%);bottom:0;right:0;}

/* ══ LAYOUT ══════════════════════════════════════════════════════════ */
.app{display:flex;height:100vh;position:relative;z-index:1;}

/* ══ SIDEBAR ════════════════════════════════════════════════════════ */
.sidebar{
  width:var(--sb);min-width:var(--sb);height:100vh;
  background:rgba(12,15,21,0.95);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(20px);
}
.sb-logo{
  display:flex;align-items:center;gap:10px;
  padding:20px 16px 16px;text-decoration:none;
  border-bottom:1px solid var(--bd);
}
.sb-dot{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,var(--a),#c85e18);
  box-shadow:0 0 16px rgba(232,114,42,.4);flex-shrink:0;
}
.sb-logo-text{font-family:var(--font-display);font-size:20px;letter-spacing:4px;background:linear-gradient(135deg,#fff 40%,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;}
.sb-section{font-family:var(--font-mono);font-size:8px;color:var(--m2);letter-spacing:2px;text-transform:uppercase;padding:8px 8px 4px;}
.sb-divider{height:1px;background:var(--bd);margin:8px 0;}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--m);
  text-decoration:none;transition:all .15s;cursor:pointer;
  border:none;background:none;width:100%;text-align:left;
}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--t);}
.sb-item.active{background:rgba(232,114,42,.09);color:var(--a);border-left:2px solid var(--a);}
.sb-item-icon{font-size:14px;width:18px;text-align:center;}
.sb-user{
  padding:12px;border-top:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--a),#c85e18);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:14px;flex-shrink:0;
}
.sb-user-email{font-family:var(--font-mono);font-size:9px;color:var(--m);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-user-plan{font-family:var(--font-mono);font-size:8px;color:var(--a);letter-spacing:1px;margin-top:1px;}
.sb-logout{margin-left:auto;background:none;border:none;color:var(--m2);cursor:pointer;font-size:14px;transition:color .15s;padding:4px;}
.sb-logout:hover{color:var(--r);}

/* ══ MAIN AREA ══════════════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ══ TOPBAR ═════════════════════════════════════════════════════════ */
.topbar{
  display:flex;align-items:center;gap:0;
  padding:0 16px;height:52px;
  background:rgba(6,8,12,0.9);
  border-bottom:1px solid var(--bd);
  backdrop-filter:blur(20px);
  flex-shrink:0;
  gap:8px;
}
.topbar-title{
  font-family:var(--font-display);font-size:22px;letter-spacing:4px;
  color:var(--t);margin-right:auto;
}
/* Live pulse */
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:9px;color:var(--g);
  background:rgba(46,204,113,0.07);border:1px solid rgba(46,204,113,0.2);
  padding:3px 8px;border-radius:20px;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse-dot 2s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(0.8);}}
/* Stats row */
.stat-pill{
  font-family:var(--font-mono);font-size:10px;
  padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,0.04);border:1px solid var(--bd);
  white-space:nowrap;
}
.stat-pill span{font-size:11px;font-weight:600;}
/* Search */
.search-wrap{position:relative;width:180px;}
.search-input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--bd);border-radius:8px;
  padding:5px 8px 5px 28px;color:var(--t);
  font-family:var(--font-mono);font-size:10px;outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--a);}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4;pointer-events:none;}

/* ══ FILTERS ROW ════════════════════════════════════════════════════ */
.filters-row{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;
  border-bottom:1px solid var(--bd);
  background:rgba(6,8,12,0.6);
  flex-wrap:nowrap;overflow-x:auto;flex-shrink:0;
}
.filters-row::-webkit-scrollbar{height:2px;}
.filters-row::-webkit-scrollbar-thumb{background:var(--bd2);}
.filter-group{display:flex;gap:3px;align-items:center;}
.filter-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.tb-filter{
  padding:4px 10px;border-radius:6px;border:1px solid transparent;
  background:none;color:var(--m);
  font-family:var(--font-mono);font-size:9px;letter-spacing:1px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tb-filter:hover{background:rgba(255,255,255,.04);color:var(--t);}
.tb-filter.active{background:rgba(232,114,42,.09);border-color:rgba(232,114,42,.3);color:var(--a);}
.tb-filter.watch.active{background:rgba(243,156,18,.09);border-color:rgba(243,156,18,.3);color:var(--y);}
/* Sort */
.sort-btn{
  padding:4px 8px;border-radius:6px;border:1px solid var(--bd);
  background:rgba(255,255,255,.03);color:var(--m);
  font-family:var(--font-mono);font-size:9px;cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:4px;
}
.sort-btn:hover{background:rgba(255,255,255,.07);color:var(--t);}
.sort-btn.active{border-color:rgba(232,114,42,.35);color:var(--a);}
/* View toggle */
.view-btns{display:flex;gap:2px;margin-left:auto;}
.view-btn{
  width:26px;height:26px;border-radius:5px;border:1px solid var(--bd);
  background:none;color:var(--m);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .15s;
}
.view-btn.active{background:rgba(232,114,42,.1);border-color:var(--a);color:var(--a);}
/* TF buttons */
.tf-btn{
  padding:3px 7px;border-radius:5px;border:1px solid transparent;
  background:none;color:var(--m2);font-family:var(--font-mono);font-size:8px;
  cursor:pointer;transition:all .15s;letter-spacing:1px;
}
.tf-btn.active{background:rgba(255,255,255,.06);color:var(--t);}

/* ══ CONTENT AREA ═══════════════════════════════════════════════════ */
.content-area{
  flex:1;display:flex;overflow:hidden;
}

/* ══ COINS GRID ═════════════════════════════════════════════════════ */
.coins-area{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:0;
}
.coins-area::-webkit-scrollbar{width:4px;}
.coins-area::-webkit-scrollbar-track{background:transparent;}
.coins-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}

/* Grid view */
.coins-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(185px,1fr));
  gap:8px;
}

/* ══ COIN CARD ══════════════════════════════════════════════════════ */
.coin-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:10px;cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;
  animation:card-in .3s ease both;
}
.coin-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
}
@keyframes card-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.coin-card:hover{border-color:var(--bd2);background:var(--bg3);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.coin-card.watched{border-color:rgba(243,156,18,.25);box-shadow:0 0 0 1px rgba(243,156,18,.08);}
.coin-card.alerted::after{
  content:'';position:absolute;top:0;right:0;
  width:0;height:0;border-style:solid;
  border-width:0 18px 18px 0;
  border-color:transparent rgba(232,114,42,.5) transparent transparent;
}

/* Card head */
.cc-head{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.cc-rank{font-family:var(--font-mono);font-size:8px;color:var(--m2);min-width:20px;}
.cc-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.cc-icon-ph{width:22px;height:22px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:7px;color:var(--m);flex-shrink:0;}
.cc-name{flex:1;min-width:0;}
.cc-sym{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t);line-height:1;}
.cc-full{font-family:var(--font-mono);font-size:8px;color:var(--m2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-actions{display:flex;gap:2px;margin-left:auto;}
.cc-btn{
  width:20px;height:20px;border-radius:4px;border:none;
  background:none;color:var(--m2);cursor:pointer;
  font-size:10px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.cc-btn:hover{background:rgba(255,255,255,.06);color:var(--t);}
.cc-btn.active{color:var(--y);}

/* Price row */
.cc-price-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px;}
.cc-price{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--t);}
.cc-chg{font-family:var(--font-mono);font-size:9px;font-weight:600;padding:1px 5px;border-radius:4px;}
.cc-chg.up{color:var(--g);background:rgba(46,204,113,.1);}
.cc-chg.dn{color:var(--r);background:rgba(231,76,60,.1);}

/* Sparkline */
.cc-spark{height:36px;margin-bottom:6px;position:relative;}
.cc-spark canvas{width:100%!important;height:36px!important;}

/* Volume bar */
.cc-vol-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;margin-bottom:6px;overflow:hidden;}
.cc-vol-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--a),rgba(232,114,42,.4));transition:width .5s ease;}

/* Metrics */
.cc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.cc-metric{background:rgba(255,255,255,.02);border-radius:5px;padding:3px 5px;}
.cc-m-label{font-family:var(--font-mono);font-size:7px;color:var(--m2);letter-spacing:.5px;}
.cc-m-val{font-family:var(--font-mono);font-size:9px;color:var(--t);margin-top:1px;font-weight:500;}

/* Add trade button — появляется при ховере */
.cc-trade-btn{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(232,114,42,.15));
  border:none;color:var(--a);
  font-family:var(--font-mono);font-size:8px;letter-spacing:1px;
  padding:8px 4px 5px;cursor:pointer;
  opacity:0;transition:opacity .2s;
  border-radius:0 0 10px 10px;
}
.coin-card:hover .cc-trade-btn{opacity:1;}

/* ══ LIST VIEW ══════════════════════════════════════════════════════ */
.list-table{width:100%;border-collapse:collapse;}
.list-table th{
  font-family:var(--font-mono);font-size:8px;color:var(--m2);
  letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 10px;text-align:right;border-bottom:1px solid var(--bd);
  cursor:pointer;white-space:nowrap;user-select:none;
}
.list-table th:first-child{text-align:left;}
.list-table th:hover{color:var(--t);}
.list-table th.sort-active{color:var(--a);}
.list-row{
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .12s;cursor:pointer;
}
.list-row:hover{background:rgba(255,255,255,.025);}
.list-row td{
  padding:7px 10px;font-family:var(--font-mono);
  font-size:11px;color:var(--t);text-align:right;
  white-space:nowrap;
}
.list-row td:first-child{text-align:left;}
.lr-coin{display:flex;align-items:center;gap:8px;}
.lr-icon{width:20px;height:20px;border-radius:50%;}
.lr-sym{font-size:11px;font-weight:600;}
.lr-name{font-size:9px;color:var(--m2);}
.lr-spark-wrap{width:80px;height:28px;}
.lr-spark-wrap canvas{width:80px!important;height:28px!important;}

/* ══ LOADING / EMPTY ════════════════════════════════════════════════ */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;
}
.loading-logo{
  font-family:var(--font-display);font-size:32px;letter-spacing:6px;
  background:linear-gradient(135deg,rgba(255,255,255,.9) 30%,var(--a));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.loading-bar{
  width:180px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;
}
.loading-bar-fill{
  height:100%;width:0;background:linear-gradient(90deg,var(--a),#f39c12);
  border-radius:1px;animation:load-fill 1.4s ease-in-out forwards;
}
@keyframes load-fill{to{width:100%;}}
.loading-sub{font-family:var(--font-mono);font-size:9px;color:var(--m2);letter-spacing:2px;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:.4;}50%{opacity:1;}}
.empty-state{
  text-align:center;padding:60px 20px;
  font-family:var(--font-mono);font-size:11px;color:var(--m2);
}

/* ══ DETAIL PANEL ═══════════════════════════════════════════════════ */
.detail-panel{
  width:320px;min-width:320px;
  background:var(--bg1);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .28s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;
}
.detail-panel.open{transform:translateX(0);}
.dp-head{
  padding:14px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.02);flex-shrink:0;
}
.dp-icon{width:36px;height:36px;border-radius:50%;}
.dp-sym{font-family:var(--font-display);font-size:24px;letter-spacing:2px;}
.dp-full{font-family:var(--font-mono);font-size:9px;color:var(--m);margin-top:-2px;}
.dp-close{
  margin-left:auto;width:26px;height:26px;border-radius:6px;
  border:1px solid var(--bd);background:none;color:var(--m);
  cursor:pointer;font-size:13px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.dp-close:hover{background:rgba(255,255,255,.06);color:var(--t);}
.dp-body{flex:1;overflow-y:auto;padding:14px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--bd);}
.dp-price{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--t);}
.dp-chg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:10px 0;}
.dp-tf{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:5px 4px;text-align:center;}
.dp-tf-label{font-family:var(--font-mono);font-size:7px;color:var(--m2);letter-spacing:1px;}
.dp-tf-val{font-family:var(--font-mono);font-size:10px;font-weight:600;margin-top:2px;}
.dp-section{font-family:var(--font-mono);font-size:8px;color:var(--m2);letter-spacing:2px;text-transform:uppercase;margin:12px 0 6px;}
.dp-metrics{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.dp-metric{background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:8px;}
.dp-m-label{font-family:var(--font-mono);font-size:7px;color:var(--m2);letter-spacing:.5px;}
.dp-m-val{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--t);margin-top:3px;}
.dp-chart-wrap{height:100px;margin:8px 0;}
.dp-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.dp-btn{
  flex:1;min-width:80px;padding:8px 10px;border-radius:7px;
  border:1px solid var(--bd);background:rgba(255,255,255,.04);
  color:var(--t);font-family:var(--font-mono);font-size:9px;
  cursor:pointer;transition:all .15s;letter-spacing:.5px;text-align:center;
}
.dp-btn:hover{background:rgba(255,255,255,.08);}
.dp-btn.primary{background:linear-gradient(135deg,var(--a),#c85e18);border-color:transparent;color:#fff;box-shadow:0 2px 12px rgba(232,114,42,.3);}
.dp-btn.primary:hover{box-shadow:0 4px 20px rgba(232,114,42,.5);}
.dp-btn.watch-active{border-color:rgba(243,156,18,.4);color:var(--y);}

/* ══ MODAL ══════════════════════════════════════════════════════════ */
.modal-back{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.modal-back.open{display:flex;}
.modal-box{
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:16px;padding:20px;width:360px;max-width:92vw;
  position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
  animation:modal-in .25s cubic-bezier(0.16,1,0.3,1);
}
.modal-box::before{
  content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);
}
@keyframes modal-in{from{opacity:0;transform:scale(.95) translateY(8px);}to{opacity:1;transform:none;}}
.modal-title{font-family:var(--font-display);font-size:20px;letter-spacing:3px;margin-bottom:4px;}
.modal-sub{font-family:var(--font-mono);font-size:9px;color:var(--m);letter-spacing:1px;margin-bottom:16px;}
.modal-close{
  position:absolute;top:14px;right:14px;width:24px;height:24px;
  border-radius:5px;border:1px solid var(--bd);background:none;
  color:var(--m);cursor:pointer;font-size:13px;transition:all .15s;

<script>
const SUPABASE_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ────────────────────────────────────────────────────────
let allCoins = [], filteredCoins = [];
let currentFilter = 'all', currentView = 'grid', currentSort = 'market_cap', currentTimeframe = '24h';
let watchlist = JSON.parse(localStorage.getItem('orb_watch') || '[]');
let userAlerts = [];
let currentDetailCoin = null;
let dpChart = null;
let alertModalData = null, alertType = 'price', alertCondition = 'above', volumeCondition = 'above', changeCondition = 'above';
let tradeModalData = null, tradeDir = 'long';
let _sortDir = -1; // -1 = desc
let _searchQuery = '', _searchTimer = null;
let _refreshInterval = null, _priceMap = {};
let _lastUpdate = null;

// ── Formatters ───────────────────────────────────────────────────
function fmtPrice(p){
  if(p == null) return '$—';
  if(p >= 1000) return '$' + p.toLocaleString('en',{maximumFractionDigits:2});
  if(p >= 1)    return '$' + p.toFixed(2);
  if(p >= 0.01) return '$' + p.toFixed(4);
  return '$' + p.toFixed(8);
}
function fmtBig(n){
  if(n == null) return '—';
  if(n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if(n >= 1e9)  return '$' + (n/1e9).toFixed(1) + 'B';
  if(n >= 1e6)  return '$' + (n/1e6).toFixed(0) + 'M';
  return '$' + n.toLocaleString('en',{maximumFractionDigits:0});
}
function fmtChg(v){
  if(v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function getChg(c){
  if(currentTimeframe === '7d') return c.price_change_percentage_7d_in_currency ?? c.price_change_percentage_7d ?? 0;
  if(currentTimeframe === '30d') return c.price_change_percentage_30d_in_currency ?? 0;
  return c.price_change_percentage_24h ?? 0;
}
function getVolatility(c){
  const sp = c.sparkline_in_7d?.price;
  if(!sp || sp.length < 2) return 0;
  const mean = sp.reduce((a,b)=>a+b,0)/sp.length;
  const variance = sp.reduce((a,b)=>a+(b-mean)**2,0)/sp.length;
  return (Math.sqrt(variance)/mean)*100;
}

// ── Alerts helpers ────────────────────────────────────────────────
function hasAlert(coinId){ return userAlerts.some(a => a.coingecko_id === coinId && !a.triggered); }
function isWatched(id){ return watchlist.includes(id); }

// ── Load data ─────────────────────────────────────────────────────
async function loadCoins(){
  try {
    const r = await fetch('/api/ticker?type=screener');
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if(!Array.isArray(d) || !d.length) throw new Error('empty');
    // Сохраняем старые цены для flash-эффекта
    _priceMap = {};
    allCoins.forEach(c => { _priceMap[c.id] = c.current_price; });
    allCoins = d;
    document.getElementById('loading').style.display = 'none';
    updateTopbarStats();
    applyFilterAndRender();
    _lastUpdate = Date.now();
    updateLiveBadge();
  } catch(e){
    console.error('[Screener] Load error:', e);
    document.getElementById('loading').innerHTML =
      `<div style="font-family:var(--font-mono);color:rgba(232,114,42,0.7);font-size:11px;text-align:center;letter-spacing:1px;">
        ⚠️ ОШИБКА ЗАГРУЗКИ<br><br>
        <button onclick="init()" style="background:var(--a);border:none;border-radius:8px;color:#fff;padding:8px 16px;font-family:var(--font-mono);font-size:10px;cursor:pointer;letter-spacing:1px;">
          ↻ ПОВТОРИТЬ
        </button>
      </div>`;
  }
}

async function loadAlerts(){
  const { data:{user} } = await sb.auth.getUser();
  if(!user) return;
  const { data } = await sb.from('price_alerts').select('*').eq('user_id',user.id).eq('triggered',false);
  userAlerts = data || [];
}

// ── Real-time update ──────────────────────────────────────────────
function startRealtime(){
  // Обновляем каждые 30 секунд
  _refreshInterval = setInterval(async () => {
    try {
      const r = await fetch('/api/ticker?type=screener');
      if(!r.ok) return;
      const d = await r.json();
      if(!Array.isArray(d) || !d.length) return;

      // Находим изменившиеся цены
      const changed = {};
      d.forEach(coin => {
        const old = _priceMap[coin.id];
        if(old != null && old !== coin.current_price){
          changed[coin.id] = coin.current_price > old ? 'up' : 'dn';
        }
        _priceMap[coin.id] = coin.current_price;
      });

      allCoins = d;
      _lastUpdate = Date.now();
      updateTopbarStats();

      // Обновляем только изменившиеся цены без полной перерисовки
      if(Object.keys(changed).length > 0){
        updatePricesInplace(changed);
      }
      updateLiveBadge();

      // Обновляем detail panel если открыт
      if(currentDetailCoin){
        const fresh = allCoins.find(c => c.id === currentDetailCoin.id);
        if(fresh) updateDetailPrice(fresh);
      }
    } catch(e){}
  }, 30000);
}

function updatePricesInplace(changed){
  // Обновляем цены прямо в DOM без перерисовки карточек
  Object.keys(changed).forEach(coinId => {
    const coin = allCoins.find(c => c.id === coinId);
    if(!coin) return;
    const dir = changed[coinId];

    // Grid view — обновляем цену и % в карточке
    const priceEl = document.querySelector(`[data-coin-price="${coinId}"]`);
    const chgEl   = document.querySelector(`[data-coin-chg="${coinId}"]`);
    if(priceEl){
      priceEl.textContent = fmtPrice(coin.current_price);
      priceEl.closest('.coin-card')?.classList.add('flash-' + dir);
      setTimeout(() => priceEl.closest('.coin-card')?.classList.remove('flash-up','flash-dn'), 800);
    }
    if(chgEl){
      const chg = getChg(coin);
      chgEl.textContent = fmtChg(chg);
      chgEl.className = 'cc-chg ' + (chg >= 0 ? 'up' : 'dn');
    }

    // List view
    const listPriceEl = document.querySelector(`[data-lp="${coinId}"]`);
    const listChgEl   = document.querySelector(`[data-lc="${coinId}"]`);
    if(listPriceEl) listPriceEl.textContent = fmtPrice(coin.current_price);
    if(listChgEl){
      const chg = getChg(coin);
      listChgEl.textContent = fmtChg(chg);
      listChgEl.style.color = chg >= 0 ? 'var(--g)' : 'var(--r)';
    }
  });
}

function updateLiveBadge(){
  const el = document.getElementById('live-text');
  if(!el) return;
  if(!_lastUpdate){ el.textContent = 'LIVE'; return; }
  const sec = Math.round((Date.now() - _lastUpdate) / 1000);
  el.textContent = sec < 5 ? 'LIVE ✓' : `${sec}с назад`;
  setTimeout(updateLiveBadge, 5000);
}

// ── Topbar stats ──────────────────────────────────────────────────
function updateTopbarStats(){
  const btc = allCoins.find(c => c.id === 'bitcoin');
  const eth = allCoins.find(c => c.id === 'ethereum');
  if(btc){
    document.getElementById('stat-btc').textContent = fmtPrice(btc.current_price);
    const bc = btc.price_change_percentage_24h;

  defi:   ['uniswap','aave','compound','makerdao','curve-dao-token','synthetix-network-token','sushi','yearn-finance','balancer','1inch'],
  layer1: ['bitcoin','ethereum','solana','avalanche-2','cardano','polkadot','cosmos','near','algorand','fantom'],
  layer2: ['matic-network','optimism','arbitrum','immutable-x','loopring','metis-token','boba-network'],
  meme:   ['dogecoin','shiba-inu','pepe','floki','bonk','baby-doge-coin','kishu-inu','dogelon-mars'],
};

  currentFilter = f;
  document.querySelectorAll('.tb-filter').forEach(b => b.classList.remove('active'));

}
function setTimeframe(tf, btn){

}
function applySort(s, btn){

  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilterAndRender();
}
function setView(v, btn){

  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilterAndRender();
}
function handleSearch(q){
  clearTimeout(_searchTimer);
  _searchQuery = q.trim().toLowerCase();
  _searchTimer = setTimeout(() => applyFilterAndRender(), 250);
}

function getFilteredCoins(){
  let coins = [...allCoins];
  // Категория
  if(currentFilter === 'watchlist') coins = coins.filter(c => watchlist.includes(c.id));
  else if(currentFilter === 'top')  coins = coins.slice(0, 50);
  else if(CATS[currentFilter])      coins = coins.filter(c => CATS[currentFilter].includes(c.id));
  // Поиск
  if(_searchQuery) coins = coins.filter(c =>
    c.symbol?.toLowerCase().includes(_searchQuery) ||
    c.name?.toLowerCase().includes(_searchQuery)
  );
  // Сортировка — FIX: maxVol вычисляется один раз до цикла
  const maxVol = Math.max(...coins.map(x => x.total_volume || 0));
  coins.forEach(c => c._maxVol = maxVol);
  if(currentSort === 'market_cap')   coins.sort((a,b) => (b.market_cap||0) - (a.market_cap||0));
  if(currentSort === 'change')       coins.sort((a,b) => getChg(b) - getChg(a));
  if(currentSort === 'change_desc')  coins.sort((a,b) => getChg(a) - getChg(b));
  if(currentSort === 'volume')       coins.sort((a,b) => (b.total_volume||0) - (a.total_volume||0));
  return coins;
}

function applyFilterAndRender(){
  filteredCoins = getFilteredCoins();
  renderCoins(filteredCoins);
}

    renderListView(coins, area);

// ── Sparkline ─────────────────────────────────────────────────────
function drawSparkline(coin, customId, w, h){
  const sp = coin.sparkline_in_7d?.price;
  const id = customId || ('spark-' + coin.id.replace(/[^a-z0-9]/gi,'_'));
  const canvas = document.getElementById(id);
  if(!canvas || !sp || sp.length < 2) return;

  // FIX: используем явные размеры вместо offsetWidth (который может быть 0)
  const W = w || canvas.offsetWidth || 160;
  const H = h || 36;
  canvas.width  = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

  const min = Math.min(...sp), max = Math.max(...sp);
  const range = max - min || 1;
  const pad = 3;
  const pts = sp.map((v,i) => ({
    x: (i/(sp.length-1)) * W,
    y: H - pad - ((v-min)/range) * (H-2*pad)
  }));
  const isUp = sp[sp.length-1] >= sp[0];
  const col  = isUp ? '#2ecc71' : '#e74c3c';

  // Gradient fill
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, isUp ? 'rgba(46,204,113,0.2)' : 'rgba(231,76,60,0.18)');
  grad.addColorStop(1, 'transparent');

  // Fill path
  ctx.beginPath();
  ctx.moveTo(pts[0].x, H);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[pts.length-1].x, H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=1; i<pts.length; i++){
    const xc = (pts[i-1].x + pts[i].x) / 2;
    const yc = (pts[i-1].y + pts[i].y) / 2;
    ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, xc, yc);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Last price dot
  const last = pts[pts.length-1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 2.5, 0, Math.PI*2);
  ctx.fillStyle = col;
  ctx.fill();
}

// ── Watchlist ─────────────────────────────────────────────────────
function toggleWatch(e, id){
  if(e) e.stopPropagation();
  if(isWatched(id)) watchlist = watchlist.filter(x=>x!==id);
  else watchlist.push(id);
  localStorage.setItem('orb_watch', JSON.stringify(watchlist));
  applyFilterAndRender();
}

// ── Detail panel ──────────────────────────────────────────────────
function focusCoin(id){
  const coin = allCoins.find(c => c.id === id);
  if(!coin) return;
  currentDetailCoin = coin;
  openDetail(coin);
}

function openDetail(coin){
  document.getElementById('dp-icon').src = coin.image || '';
  document.getElementById('dp-sym').textContent = (coin.symbol||'').toUpperCase();
  document.getElementById('dp-full').textContent = coin.name || '';
  updateDetailPrice(coin);

  // Timeframe grid
  const tfs = [
    { label:'1Ч', val: coin.price_change_percentage_1h_in_currency },
    { label:'24Ч', val: coin.price_change_percentage_24h },
    { label:'7Д', val: coin.price_change_percentage_7d_in_currency },
    { label:'30Д', val: coin.price_change_percentage_30d_in_currency },
  ];
  document.getElementById('dp-chg-grid').innerHTML = tfs.map(tf => {
    const v = tf.val; const isUp = (v||0) >= 0;
    return `<div class="dp-tf">
      <div class="dp-tf-label">${tf.label}</div>
      <div class="dp-tf-val" style="color:${isUp?'var(--g)':'var(--r)'}">${v != null ? fmtChg(v) : '—'}</div>
    </div>`;
  }).join('');

  // Metrics
  document.getElementById('dp-metrics').innerHTML = [
    { label:'Mcap', val: fmtBig(coin.market_cap) },
    { label:'Объём 24ч', val: fmtBig(coin.total_volume) },
    { label:'High 24ч', val: fmtPrice(coin.high_24h) },
    { label:'Low 24ч', val: fmtPrice(coin.low_24h) },
    { label:'Предложение', val: coin.circulating_supply ? (coin.circulating_supply/1e6).toFixed(1)+'M' : '—' },
    { label:'Волатильность', val: getVolatility(coin).toFixed(1)+'%' },
  ].map(m => `<div class="dp-metric"><div class="dp-m-label">${m.label}</div><div class="dp-m-val">${m.val}</div></div>`).join('');

  // Chart
  renderDetailChart(coin);

  // Watch btn
  const wb = document.getElementById('dp-watch-btn');
  wb.textContent = isWatched(coin.id) ? '⭐ ИЗБРАННОЕ' : '☆ ИЗБРАННОЕ';
  wb.className = 'dp-btn' + (isWatched(coin.id) ? ' watch-active' : '');

  document.getElementById('detail-panel').classList.add('open');
}

function updateDetailPrice(coin){
  const el = document.getElementById('dp-price');
  if(el) el.textContent = fmtPrice(coin.current_price);
}

function renderDetailChart(coin){
  const sp = coin.sparkline_in_7d?.price;
  if(!sp || sp.length < 2) return;
  const canvas = document.getElementById('dp-chart');
  if(!canvas) return;
  if(dpChart){ dpChart.destroy(); dpChart = null; }

  const isUp = sp[sp.length-1] >= sp[0];
  const col = isUp ? '#2ecc71' : '#e74c3c';
  // Берём каждую 6-ю точку для скорости (~28 точек из 168)
  const data = sp.filter((_,i) => i % 6 === 0);

  dpChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: data.map((_,i) => ''),
      datasets: [{ data, borderColor: col, borderWidth: 1.5,
        backgroundColor: isUp ? 'rgba(46,204,113,0.08)' : 'rgba(231,76,60,0.07)',
        fill: true, tension: 0.4, pointRadius: 0,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: {display:false}, tooltip: {enabled:false} },
      scales: { x:{display:false}, y:{display:false} },
    }
  });
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  currentDetailCoin = null;
  if(dpChart){ dpChart.destroy(); dpChart = null; }
}

function toggleWatchDetail(){
  if(!currentDetailCoin) return;
  toggleWatch(null, currentDetailCoin.id);
  const wb = document.getElementById('dp-watch-btn');
  const watched = isWatched(currentDetailCoin.id);
  wb.textContent = watched ? '⭐ ИЗБРАННОЕ' : '☆ ИЗБРАННОЕ';
  wb.className = 'dp-btn' + (watched ? ' watch-active' : '');
}

// ── Alert Modal ───────────────────────────────────────────────────
function openAlertModal(eOrNull, id){
  if(eOrNull && eOrNull.stopPropagation) eOrNull.stopPropagation();
  // FIX: унифицированная сигнатура — всегда (event|null, id)
  const coinId = id || (eOrNull?.target ? null : eOrNull?.id);
  const coin = allCoins.find(c => c.id === coinId) || currentDetailCoin;
  if(!coin) return;
  alertModalData = coin;
  alertType = 'price'; alertCondition = 'above'; volumeCondition = 'above'; changeCondition = 'above';
  document.getElementById('am-sub').textContent = (coin.symbol||'').toUpperCase() + ' · ' + fmtPrice(coin.current_price);
  document.getElementById('am-price-input').value = coin.current_price?.toFixed(2) || '';
  document.getElementById('am-vol-input').value = '';
  document.getElementById('am-chg-input').value = '';
  document.getElementById('am-note').value = '';
  // Reset tabs
  document.querySelectorAll('.m-tab').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.m-form-section').forEach((s,i) => s.classList.toggle('active', i===0));
  document.querySelectorAll('.m-seg-btn').forEach(b => b.classList.toggle('active', b.textContent.includes('ВЫШЕ')||b.textContent.includes('РОСТ')));
  document.getElementById('alert-modal').classList.add('open');
}
function closeAlertModal(){ document.getElementById('alert-modal').classList.remove('open'); }
function setAlertType(t, btn){
  alertType = t;
  document.querySelectorAll('.m-tab').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const map = {price:'af-price', volume:'af-volume', change:'af-change'};
  document.querySelectorAll('.m-form-section').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(map[t]);
  if(el) el.classList.add('active');
}
function setAlertCond(c,btn){ alertCondition=c; btn.parentNode.querySelectorAll('.m-seg-btn').forEach(b=>b.classList.toggle('active',b===btn)); }
function setVolCond(c,btn){ volumeCondition=c; btn.parentNode.querySelectorAll('.m-seg-btn').forEach(b=>b.classList.toggle('active',b===btn)); }
function setChgCond(c,btn){ changeCondition=c; btn.parentNode.querySelectorAll('.m-seg-btn').forEach(b=>b.classList.toggle('active',b===btn)); }

async function saveAlert(){
  const { data:{user} } = await sb.auth.getUser();
  if(!user){ showToast('Войди в аккаунт','err'); return; }
  if(!alertModalData){ return; }

  let alertData = {
    user_id: user.id,
    symbol: alertModalData.symbol?.toUpperCase(),
    coingecko_id: alertModalData.id,
    triggered: false,
    alert_type: alertType,
    note: document.getElementById('am-note').value.trim() || null,
  };

  if(alertType === 'price'){
    const price = parseFloat(document.getElementById('am-price-input').value);
    if(!price || isNaN(price)){ showToast('Введи цену','err'); return; }
    alertData.target_price = price;
    alertData.condition = alertCondition;
  } else if(alertType === 'volume'){
    const vol = parseFloat(document.getElementById('am-vol-input').value);
    if(!vol || isNaN(vol)){ showToast('Введи объём','err'); return; }
    alertData.target_price = vol;
    alertData.condition = 'volume_' + volumeCondition;
  } else if(alertType === 'change'){
    const chg = parseFloat(document.getElementById('am-chg-input').value);
    if(!chg || isNaN(chg)){ showToast('Введи процент','err'); return; }
    alertData.target_price = chg;
    alertData.condition = 'change_' + changeCondition;
  }

  const { error } = await sb.from('price_alerts').insert(alertData);
  if(!error){
    closeAlertModal();
    await loadAlerts();
    applyFilterAndRender();
    showToast('✅ Алерт создан — уведомление придёт в Telegram','ok');
  } else {
    showToast('Ошибка: ' + error.message,'err');
  }
}

// ── Toast ─────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, type=''){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_toastTimer);

// ── Auth ──────────────────────────────────────────────────────────
async function initAuth(){
  const { data:{user} } = await sb.auth.getUser();
  if(!user){ window.location.href = 'login.html'; return false; }
  const { data:p } = await sb.from('profiles').select('full_name,username,plan').eq('id',user.id).single();
  document.getElementById('sb-avatar').textContent = (p?.full_name||p?.username||user.email||'U')[0].toUpperCase();
  document.getElementById('sb-email').textContent = p?.full_name || p?.username || user.email;
  const plan = p?.plan;
  document.getElementById('sb-plan').textContent = plan==='lifetime'?'∞ НАВСЕГДА':plan==='monthly'?'МЕСЯЧНЫЙ':'PREVIEW';
  return true;
}
async function doLogout(){ await sb.auth.signOut(); window.location.href = 'login.html'; }

// ── Init ──────────────────────────────────────────────────────────
async function init(){
  const ok = await initAuth();
  if(!ok) return;
  await Promise.all([loadCoins(), loadAlerts()]);
  startRealtime();
}
init();
