<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#06080c">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&display=swap"></noscript>
<title>ORBITUM · Signal Screener</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script>window.addEventListener('DOMContentLoaded',function(){if(typeof supabase==='undefined'){var s=document.createElement('script');s.src='https://unpkg.com/@supabase/supabase-js@2';document.head.appendChild(s);}});</script>

<style>
/* ══════════════════════════════════════════
   ORBITUM SIGNAL SCREENER v2.0
   Design: cockpit · orange accent · mono
══════════════════════════════════════════ */
:root {
  --bg:    #06080c;
  --bg2:   #0c0f15;
  --bg3:   #111520;
  --bg4:   #161b28;
  --bd:    rgba(255,255,255,0.06);
  --bd2:   rgba(255,255,255,0.11);
  --t:     #e8e4dc;
  --m:     rgba(232,228,220,0.50);
  --m2:    rgba(232,228,220,0.24);
  --m3:    rgba(232,228,220,0.10);
  --a:     #e8722a;
  --a2:    rgba(232,114,42,0.10);
  --a3:    rgba(232,114,42,0.28);
  --g:     #2ecc71;
  --g2:    rgba(46,204,113,0.10);
  --r:     #e74c3c;
  --r2:    rgba(231,76,60,0.10);
  --y:     #f0c040;
  --y2:    rgba(240,192,64,0.10);
  --mono:  'JetBrains Mono', monospace;
  --disp:  'Bebas Neue', sans-serif;
  --radius: 8px;
}
[data-theme="light"] {
  --bg:#f0f1f4; --bg2:#ffffff; --bg3:#e8eaef; --bg4:#dde0e8;
  --bd:rgba(0,0,0,0.07); --bd2:rgba(0,0,0,0.13);
  --t:#141820; --m:rgba(20,24,32,0.6); --m2:rgba(20,24,32,0.3); --m3:rgba(20,24,32,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--t); font-family: var(--mono); height: 100%; overflow: hidden; font-size: 12px; }
button { cursor: pointer; font-family: var(--mono); }
a { text-decoration: none; }

/* ── SCANLINES (premium feel) ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 4px);
  pointer-events: none; z-index: 9998;
}

/* ══ LAYOUT ══ */
.layout { display: flex; height: 100vh; }

/* ══ SIDEBAR ══ */
.sidebar {
  width: 48px; flex-shrink: 0;
  background: var(--bg2); border-right: 1px solid var(--bd);
  display: flex; flex-direction: column; align-items: center;
  padding: 0; z-index: 600; position: relative;
  transition: width .22s cubic-bezier(.4,0,.2,1); overflow: hidden;
}
.sidebar.expanded { width: 188px; }
.sb-header {
  width: 100%; height: 48px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px; border-bottom: 1px solid var(--bd); gap: 8px;
}
.sb-logo { font-family: var(--disp); font-size: 15px; letter-spacing: 4px; color: var(--a); opacity: 0; width: 0; overflow: hidden; white-space: nowrap; transition: opacity .18s .1s, width .22s; }
.sidebar.expanded .sb-logo { opacity: 1; width: auto; }
.sb-toggle {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--bd);
  background: transparent; color: var(--m); display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0; margin-left: auto;
}
.sb-toggle:hover { background: var(--a2); color: var(--a); border-color: var(--a3); }
.sb-toggle svg { transition: transform .22s; }
.sidebar.expanded .sb-toggle svg { transform: rotate(180deg); }
.sb-nav { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px; overflow: hidden; }
.sb-item {
  width: 32px; height: 32px; border-radius: 7px; border: none;
  background: transparent; color: var(--m);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .12s; position: relative; flex-shrink: 0;
}
.sidebar.expanded .sb-item {
  width: calc(100% - 14px); justify-content: flex-start; padding: 0 9px; gap: 9px;
}
.sb-item:hover { background: var(--a2); color: var(--a); }
.sb-item.active { background: var(--a2); color: var(--a); }
.sb-item-label { font-size: 10px; letter-spacing: 1px; white-space: nowrap; opacity: 0; width: 0; overflow: hidden; transition: opacity .12s, width .22s; }
.sidebar.expanded .sb-item-label { opacity: 1; width: auto; }
.sb-sep { width: 75%; height: 1px; background: var(--bd); margin: 4px 6px; }
.sb-bottom { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px; }

/* ══ MAIN ══ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ══ TOPBAR ══ */
.topbar {
  height: 42px; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
}
.tb-page { font-size: 9px; letter-spacing: 3px; color: var(--m2); text-transform: uppercase; flex-shrink: 0; }
.tb-sep { width: 1px; height: 18px; background: var(--bd2); flex-shrink: 0; }

/* SA Score widget */
.sa-widget {
  display: none; align-items: center; gap: 6px;
  padding: 3px 10px; border: 1px solid var(--bd); border-radius: 5px;
  font-size: 9px; letter-spacing: 1.5px;
}
.sa-dot { width: 5px; height: 5px; border-radius: 50%; }

/* Live indicator */
.live-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 9px; color: var(--m2); letter-spacing: 1px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--m2); transition: background .3s; }
.live-badge.live .live-dot { background: var(--g); box-shadow: 0 0 5px var(--g); }

/* Sound btn */
.sound-btn {
  width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--bd);
  background: transparent; color: var(--m2); display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .12s;
}
.sound-btn:hover { color: var(--t); }
.sound-btn.on { color: var(--a); border-color: var(--a3); }

/* Theme + misc */
.tb-action {
  height: 26px; padding: 0 8px; border-radius: 5px; border: 1px solid var(--bd);
  background: transparent; color: var(--m); font-size: 10px; letter-spacing: .5px; transition: all .12s;
}
.tb-action:hover { color: var(--t); }
.tb-spacer { flex: 1; }
.tb-user-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--bd2);
  background: var(--a2); display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--a); transition: all .15s; flex-shrink: 0;
}
.tb-user-btn:hover { border-color: var(--a3); }

/* ══ TICKER STRIP ══ */
.ticker-strip {
  height: 28px; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--bd);
  overflow: hidden; display: flex; align-items: center; position: relative;
}
.ticker-strip::before, .ticker-strip::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 2; pointer-events: none;
}
.ticker-strip::before { left: 0; background: linear-gradient(90deg, var(--bg2), transparent); }
.ticker-strip::after  { right: 0; background: linear-gradient(-90deg, var(--bg2), transparent); }
.ticker-track { display: flex; white-space: nowrap; will-change: transform; }
.tk-item {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 14px; height: 28px; border-right: 1px solid var(--bd);
  font-size: 10px; letter-spacing: .3px; cursor: pointer; transition: background .1s; flex-shrink: 0;
}
.tk-item:hover { background: var(--bg3); }
.tk-sym { color: var(--t); font-weight: 600; }
.tk-price { color: var(--m); }
.tk-up { color: var(--g); }
.tk-dn { color: var(--r); }

/* ══ BODY: 2-panel layout + overlay detail ══ */
.screener-body { flex: 1; display: grid; grid-template-columns: 268px 1fr; overflow: hidden; position: relative; }

/* ══ LEFT: Signal Feed ══ */
.panel-left {
  border-right: 1px solid var(--bd); background: var(--bg2);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-section {
  padding: 12px 14px; border-bottom: 1px solid var(--bd); flex-shrink: 0;
}
.panel-section.scroll { flex: 1; overflow-y: auto; }
.panel-section.scroll::-webkit-scrollbar { width: 3px; }
.panel-section.scroll::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

.ps-label {
  font-size: 8px; letter-spacing: 2.5px; color: var(--m2); text-transform: uppercase;
  display: flex; align-items: center; gap: 7px; margin-bottom: 10px;
}
.ps-pulse {
  width: 5px; height: 5px; border-radius: 50%; background: var(--a);
  animation: pulsA 1.8s ease-in-out infinite; flex-shrink: 0;
}
@keyframes pulsA { 0%,100%{box-shadow:0 0 0 0 rgba(232,114,42,.7)} 50%{box-shadow:0 0 0 5px rgba(232,114,42,0)} }

/* Signal card */
.sig-card {
  background: var(--bg3); border: 1px solid var(--bd); border-radius: 7px;
  padding: 10px 11px; margin-bottom: 5px; cursor: pointer;
  transition: all .13s; position: relative; overflow: hidden;
}
.sig-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; border-radius: 7px 0 0 7px;
}
.sig-card.long::before  { background: var(--g); }
.sig-card.short::before { background: var(--r); }
.sig-card.watch::before { background: var(--y); }
.sig-card:hover { border-color: var(--bd2); transform: translateX(2px); }
.sig-card:active { transform: translateX(3px); }
.sig-head { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.sig-sym { font-family: var(--disp); font-size: 15px; letter-spacing: 1px; flex: 1; }
.sig-pill {
  font-size: 7px; letter-spacing: 1.5px; padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase;
}
.pill-long  { background: var(--g2); color: var(--g); border: 1px solid rgba(46,204,113,.2); }
.pill-short { background: var(--r2); color: var(--r); border: 1px solid rgba(231,76,60,.2); }
.pill-watch { background: var(--y2); color: var(--y); border: 1px solid rgba(240,192,64,.2); }
.sig-time { position: absolute; top: 9px; right: 10px; font-size: 7px; color: var(--m3); }
.sig-desc { font-size: 9px; color: var(--m); margin-bottom: 7px; line-height: 1.6; }
.sig-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
.sig-m { display: flex; flex-direction: column; gap: 1px; }
.sig-m-lbl { font-size: 6px; color: var(--m2); letter-spacing: 1px; text-transform: uppercase; }
.sig-m-val { font-size: 9px; color: var(--t); }
.sig-bar { height: 2px; background: var(--bg4); border-radius: 1px; overflow: hidden; margin-top: 6px; }
.sig-bar-fill { height: 100%; border-radius: 1px; }

/* Market metrics block */
.mkt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.mkt-item { background: var(--bg3); border: 1px solid var(--bd); border-radius: 6px; padding: 8px 10px; }
.mkt-lbl { font-size: 7px; letter-spacing: 1.5px; color: var(--m2); text-transform: uppercase; margin-bottom: 4px; }
.mkt-val { font-family: var(--disp); font-size: 16px; letter-spacing: .5px; }
.mkt-sub { font-size: 8px; margin-top: 1px; }
.up { color: var(--g); }
.dn { color: var(--r); }

/* Fear & Greed */
.fng-row { display: flex; align-items: center; gap: 10px; }
.fng-track { flex: 1; height: 4px; background: linear-gradient(90deg, var(--r) 0%, var(--y) 50%, var(--g) 100%); border-radius: 2px; position: relative; }
.fng-needle { position: absolute; top: -4px; width: 12px; height: 12px; border-radius: 50%; background: var(--t); border: 2px solid var(--bg2); transition: left .5s ease; transform: translateX(-50%); }
.fng-num { font-family: var(--disp); font-size: 20px; letter-spacing: .5px; }
.fng-lbl { font-size: 7px; letter-spacing: 1.5px; color: var(--m2); margin-top: 2px; text-transform: uppercase; }

/* Setup accuracy bars */
.setup-bar-row { margin-bottom: 8px; }
.setup-bar-head { display: flex; justify-content: space-between; margin-bottom: 3px; }
.setup-bar-name { font-size: 9px; color: var(--m); letter-spacing: .5px; }
.setup-bar-acc { font-size: 9px; color: var(--a); }
.setup-bar-track { height: 2px; background: var(--bg4); border-radius: 1px; overflow: hidden; }
.setup-bar-fill { height: 100%; background: var(--a); border-radius: 1px; transition: width .6s ease; }

/* ══ CENTER: Screener ══ */
.panel-center { display: flex; flex-direction: column; overflow: hidden; }

/* Filter / Controls bar */
.ctrl-bar {
  height: 42px; flex-shrink: 0; background: var(--bg); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 6px; padding: 0 14px; overflow-x: auto;
}
.ctrl-bar::-webkit-scrollbar { display: none; }
.flt-btn {
  height: 24px; padding: 0 10px; border-radius: 5px; border: 1px solid transparent;
  background: transparent; color: var(--m2); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  transition: all .12s; white-space: nowrap; flex-shrink: 0;
}
.flt-btn:hover { color: var(--m); border-color: var(--bd); }
.flt-btn.active { color: var(--a); background: var(--a2); border-color: var(--a3); }
.flt-sep { width: 1px; height: 18px; background: var(--bd); flex-shrink: 0; }
.ctrl-spacer { flex: 1; min-width: 20px; }
.search-inp {
  height: 26px; width: 130px; background: var(--bg3); border: 1px solid var(--bd); border-radius: 5px;
  color: var(--t); font-size: 10px; padding: 0 9px; outline: none; font-family: var(--mono);
  transition: border-color .15s; flex-shrink: 0;
}
.search-inp:focus { border-color: var(--a3); }
.search-inp::placeholder { color: var(--m2); }
.view-btns { display: flex; gap: 2px; flex-shrink: 0; }
.vb {
  width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--bd);
  background: transparent; color: var(--m2); font-size: 12px;
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.vb.active { color: var(--a); background: var(--a2); border-color: var(--a3); }

/* ── TABLE VIEW ── */
.table-wrap { flex: 1; overflow: auto; }
.table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }
.sc-table { width: 100%; border-collapse: collapse; }
.sc-table thead th {
  font-size: 8px; letter-spacing: 1.5px; color: var(--m2); text-transform: uppercase; text-align: left;
  padding: 8px 12px; border-bottom: 1px solid var(--bd); background: var(--bg2);
  white-space: nowrap; cursor: pointer; user-select: none;
  position: sticky; top: 0; z-index: 2; transition: color .12s;
}
.sc-table thead th:hover { color: var(--m); }
.sc-table thead th.sort-active { color: var(--a); }
.sort-ic { margin-left: 3px; font-size: 7px; }
.sc-table tbody tr { border-bottom: 1px solid var(--bd); transition: background .1s; cursor: pointer; }
.sc-table tbody tr:hover { background: var(--bg2); }
.sc-table tbody tr.row-selected { background: rgba(232,114,42,0.05); border-color: rgba(232,114,42,.15); }
.sc-table tbody tr.row-new { animation: rowFlash .8s ease; }
@keyframes rowFlash { 0%{background:rgba(232,114,42,.1)} 100%{background:transparent} }
.sc-table td { padding: 8px 12px; vertical-align: middle; white-space: nowrap; }

/* Symbol cell */
.sym-cell { display: flex; align-items: center; gap: 8px; }
.sym-ico {
  width: 26px; height: 26px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--bd2);
  display: flex; align-items: center; justify-content: center; font-family: var(--disp); font-size: 9px; color: var(--a); flex-shrink: 0;
  overflow: hidden;
}
.sym-ico img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.sym-name { font-family: var(--disp); font-size: 14px; letter-spacing: .5px; }
.sym-full { font-size: 8px; color: var(--m2); margin-top: 1px; }

/* Signal pill in table */
.tbl-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 7px; letter-spacing: 1.2px; padding: 2px 7px; border-radius: 3px; font-weight: 600; text-transform: uppercase;
}
.tbl-pill .pd { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

/* Price cell */
.price-val { font-family: var(--disp); font-size: 14px; line-height: 1; }
.price-chg { font-size: 8px; margin-top: 2px; }

/* Sparkline */
.spark-cell { width: 72px; }

/* AI Score bar */
.score-cell { display: flex; align-items: center; gap: 6px; }
.score-bar { width: 44px; height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.score-bar-fill { height: 100%; border-radius: 2px; }
.score-num { font-size: 10px; }

/* Setup tags */
.tag-wrap { display: flex; gap: 3px; flex-wrap: wrap; }
.setup-tag { font-size: 7px; color: var(--m2); border: 1px solid var(--bd); padding: 1px 5px; border-radius: 2px; letter-spacing: .3px; }

/* Volume */
.vol-val { font-size: 10px; }
.vol-x { font-size: 8px; margin-top: 1px; }

/* RSI */
.rsi-val { font-size: 11px; font-weight: 500; }

/* ── HEATMAP VIEW ── */
.heatmap-wrap { flex: 1; overflow: auto; padding: 12px; }
.heatmap-wrap::-webkit-scrollbar { width: 4px; }
.heatmap-wrap::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }
.heatmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 4px; }
.heat-cell {
  border-radius: 7px; padding: 11px 10px 9px; cursor: pointer;
  transition: opacity .13s, transform .13s; position: relative; overflow: hidden; min-height: 76px;
  display: flex; flex-direction: column; gap: 3px;
}
.heat-cell:hover { opacity: .82; transform: scale(1.02); }
.heat-cell:active { transform: scale(.97); }
.heat-sym { font-family: var(--disp); font-size: 13px; letter-spacing: .5px; }
.heat-chg { font-size: 11px; font-weight: 600; }
.heat-sig { font-size: 7px; letter-spacing: 1px; color: inherit; opacity: .7; text-transform: uppercase; }
.heat-badge { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; }
.hb-long  { background: var(--g); box-shadow: 0 0 5px var(--g); }
.hb-short { background: var(--r); box-shadow: 0 0 5px var(--r); }
.h-sup   { background: rgba(46,204,113,.22); border: 1px solid rgba(46,204,113,.3); color: #d4f5e2; }
.h-up    { background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.18); color: #b8edcf; }
.h-flat  { background: var(--bg3); border: 1px solid var(--bd); color: var(--m); }
.h-dn    { background: rgba(231,76,60,.12); border: 1px solid rgba(231,76,60,.18); color: #f5b8b3; }
.h-sdn   { background: rgba(231,76,60,.22); border: 1px solid rgba(231,76,60,.3); color: #f9d0cc; }

/* ── Empty / Loading states ── */
.state-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.state-spinner { width: 26px; height: 26px; border: 2px solid var(--bd2); border-top-color: var(--a); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-text { font-size: 10px; color: var(--m2); letter-spacing: 2px; }

/* ══ RIGHT: Detail Panel — sliding overlay ══ */
.panel-right {
  position: fixed; top: 0; right: -340px; width: 320px; height: 100vh;
  background: var(--bg2); border-left: 1px solid rgba(232,114,42,.15);
  z-index: 500; transition: right .28s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow-y: auto;
  box-shadow: -12px 0 40px rgba(0,0,0,.5);
}
.panel-right.open { right: 0; }
.panel-right::-webkit-scrollbar { width: 3px; }
.panel-right::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

/* Overlay backdrop */
.detail-overlay {
  display: none; position: fixed; inset: 0; z-index: 499;
  background: rgba(0,0,6,.45); backdrop-filter: blur(2px);
}
.detail-overlay.open { display: block; }

/* Empty state */
.detail-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px;
}
.de-icon { font-family: var(--disp); font-size: 44px; color: var(--bd2); letter-spacing: 4px; }
.de-txt { font-size: 8px; letter-spacing: 2.5px; color: var(--m2); text-align: center; line-height: 1.8; }

/* Detail header */
.det-header { padding: 14px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.det-sym-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.det-sym { font-family: var(--disp); font-size: 26px; letter-spacing: 2px; }
.det-full { font-size: 8px; color: var(--m2); letter-spacing: 1px; margin-top: 2px; }
.det-price-row { display: flex; align-items: baseline; gap: 8px; margin-top: 9px; }
.det-price { font-family: var(--disp); font-size: 28px; letter-spacing: 1px; }
.det-chg { font-size: 12px; }
.det-meta { display: flex; gap: 10px; margin-top: 7px; flex-wrap: wrap; }
.det-meta-item { font-size: 8px; color: var(--m2); }
.det-meta-item span { color: var(--t); }

/* Sparkline chart */
.det-chart { padding: 10px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.det-chart-lbl { font-size: 7px; letter-spacing: 2px; color: var(--m2); margin-bottom: 7px; text-transform: uppercase; }

/* AI analysis block */
.det-ai { padding: 12px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.det-ai-header { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
.det-ai-icon {
  width: 18px; height: 18px; border-radius: 4px;
  background: var(--a2); border: 1px solid var(--a3);
  display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0;
}
.det-ai-title { font-size: 8px; letter-spacing: 2px; color: var(--a); text-transform: uppercase; }
.det-ai-score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.det-ai-score-lbl { font-size: 7px; letter-spacing: 1.5px; color: var(--m2); }
.det-ai-score-num { font-size: 10px; }
.det-ai-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; margin-bottom: 9px; }
.det-ai-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.det-ai-text {
  background: var(--bg3); border: 1px solid var(--bd); border-radius: 6px;
  padding: 9px 11px; font-size: 10px; color: var(--m); line-height: 1.7;
}
.det-ai-text strong { color: var(--t); font-weight: 500; }
.det-ai-setup { font-size: 7px; color: var(--m2); letter-spacing: 1px; margin-top: 7px; }

/* AI loading state */
.ai-loading { display: flex; align-items: center; gap: 8px; padding: 9px 11px; background: var(--bg3); border: 1px solid var(--bd); border-radius: 6px; }
.ai-loading-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--a); animation: aiDot 1.2s ease-in-out infinite; }
.ai-loading-dot:nth-child(2) { animation-delay: .2s; }
.ai-loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes aiDot { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

/* Free tier lock */
.ai-locked {
  background: var(--bg3); border: 1px solid rgba(232,114,42,.15); border-radius: 6px;
  padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
}
.ai-locked-title { font-size: 8px; letter-spacing: 2.5px; color: rgba(232,114,42,.7); }
.ai-locked-sub { font-size: 9px; color: var(--m2); line-height: 1.6; }
.ai-locked-blur { filter: blur(3px); pointer-events: none; opacity: .4; width: 100%; font-size: 9px; color: var(--m); line-height: 1.7; }
.ai-locked-btn {
  margin-top: 4px; padding: 5px 14px; background: var(--a2); border: 1px solid var(--a3);
  border-radius: 4px; font-size: 8px; letter-spacing: 1.5px; color: var(--a); cursor: pointer;
  transition: all .15s;
}
.ai-locked-btn:hover { background: var(--a3); color: var(--t); }

/* Key levels grid */
.det-levels { padding: 12px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.level-item { background: var(--bg3); border: 1px solid var(--bd); border-radius: 6px; padding: 8px 10px; }

.level-val { font-family: var(--disp); font-size: 15px; letter-spacing: .5px; }

/* Indicators */
.det-inds { padding: 12px 16px; border-bottom: 1px solid var(--bd); flex-shrink: 0; }
.inds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

.ind-bear { color: var(--r) !important; }

   ORBITUM SIGNAL SCREENER — Core Engine v2.0
   API: /api/ticker (CoinGecko proxy), /api/ai (Claude),
        /api/notify (TG), Supabase auth + profiles
   Binance WS: live price ticks
══════════════════════════════════════════════════════════ */

const SB_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';

// ── STATE ────────────────────────────────────────────────
let sb, _session, _userPlan = 'free', _isPaid = false, _tgProfile = {};
let allCoins = [], _signals = [], _selectedSym = null;
let _filter = 'all', _sort = { key: 'ai_score', dir: 'desc' }, _search = '';
let _view = 'table';
let _aiCache = {}, _wsMap = {}, _wsConn = null;
let _soundEnabled = localStorage.getItem('orb_sound') !== '0';
let _actx = null;

// ── COIN AI SCORES (computed locally from market data) ──
function computeAIScore(c) {
  let score = 50;
  const chg24 = c.price_change_percentage_24h || 0;
  const chg7d  = c.price_change_percentage_7d_in_currency || 0;
  const volRatio = c.market_cap > 0 ? (c.total_volume / c.market_cap * 100) : 0;
  const rsi = computeRSI(c.sparkline_in_7d?.price || []);
  const athDrop = Math.abs(c.ath_change_percentage || 0);

  // Momentum
  if (chg24 > 5)  score += 15; else if (chg24 > 2) score += 8; else if (chg24 < -5) score -= 12; else if (chg24 < -2) score -= 6;
  if (chg7d > 10) score += 10; else if (chg7d < -10) score -= 8;
  // Volume
  if (volRatio > 15) score += 12; else if (volRatio > 8) score += 6; else if (volRatio < 2) score -= 5;
  // RSI
  if (rsi >= 65 && rsi < 75) score += 8;
  if (rsi <= 35 && rsi > 25) score += 8;
  if (rsi >= 75) score -= 10;
  if (rsi <= 25) score -= 5;
  // ATH proximity
  if (athDrop < 10) score += 6;
  if (athDrop > 60) score -= 8;

  return Math.max(10, Math.min(98, Math.round(score)));
}

function computeSignal(c, score) {
  const chg24 = c.price_change_percentage_24h || 0;
  const chg7d  = c.price_change_percentage_7d_in_currency || 0;
  const volRatio = c.market_cap > 0 ? (c.total_volume / c.market_cap * 100) : 0;
  const rsi = computeRSI(c.sparkline_in_7d?.price || []);

  if (score >= 72 && chg24 > 0 && (volRatio > 8 || chg7d > 5)) return 'long';
  if (score <= 42 && chg24 < 0 && (volRatio > 6 || chg7d < -5)) return 'short';
  return 'watch';
}

function computeSetup(c) {
  const chg24 = c.price_change_percentage_24h || 0;
  const chg7d  = c.price_change_percentage_7d_in_currency || 0;
  const volRatio = c.market_cap > 0 ? (c.total_volume / c.market_cap * 100) : 0;
  const sp = c.sparkline_in_7d?.price || [];
  const rsi = computeRSI(sp);
  const tags = [];

  if (volRatio > 12) tags.push('Vol Surge');
  if (chg24 > 4 && sp.length > 10) {
    const recent = sp.slice(-10);
    const prev   = sp.slice(-20, -10);
    const rAvg = recent.reduce((a,b)=>a+b,0)/recent.length;
    const pAvg = prev.reduce((a,b)=>a+b,0)/prev.length || 1;
    if (rAvg > pAvg * 1.03) tags.push('Breakout');
  }
  if (chg24 < -3 && chg7d > 2) tags.push('Reversal');
  if (rsi > 55 && chg7d > 5) tags.push('Trend');
  if (Math.abs(c.ath_change_percentage || 0) < 8) tags.push('ATH Zone');
  if (rsi > 68) tags.push('OB RSI');
  if (rsi < 34) tags.push('OS RSI');

  return tags.slice(0, 3);
}

function computeRSI(prices, period = 14) {
  if (!prices || prices.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = prices.length - period; i < prices.length; i++) {
    const d = prices[i] - prices[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  if (losses === 0) return 99;
  const rs = (gains / period) / (losses / period);
  return Math.round(100 - 100 / (1 + rs));
}

function computeKeyLevels(c) {
  const price = c.current_price;
  const sp = c.sparkline_in_7d?.price || [];
  const high7d = sp.length ? Math.max(...sp) : price * 1.05;
  const low7d  = sp.length ? Math.min(...sp) : price * 0.95;
  const signal = c._signal;
  const entry = signal === 'long' ? price * 0.998 : signal === 'short' ? price * 1.001 : price;
  const sl    = signal === 'long' ? low7d * 0.98  : signal === 'short' ? high7d * 1.02 : low7d;
  const tp1   = signal === 'long' ? price + (price - sl) * 2   : price - (sl - price) * 2;
  const tp2   = signal === 'long' ? price + (price - sl) * 3.5 : price - (sl - price) * 3.5;
  return { entry, sl, tp1, tp2 };
}

// ── SOUND ────────────────────────────────────────────────
function _getActx() { if (!_actx && (window.AudioContext || window.webkitAudioContext)) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return _actx; }
function _tone(freq, type, vol, decay) {
  if (!_soundEnabled) return;
  const ctx = _getActx(); if (!ctx) return;
  try {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + decay);
    o.start(); o.stop(ctx.currentTime + decay);
  } catch(e) {}
}
function playClick()  { _tone(880, 'sine', 0.04, 0.12); }
function playSignal() { _tone(528, 'triangle', 0.07, 0.5); setTimeout(()=>_tone(660,'triangle',0.05,0.4), 180); }
function toggleSound() {
  _soundEnabled = !_soundEnabled;
  localStorage.setItem('orb_sound', _soundEnabled ? '1' : '0');
  document.getElementById('sound-btn').classList.toggle('on', _soundEnabled);
  if (_soundEnabled) { _getActx(); playClick(); }
}

// ── FORMAT ───────────────────────────────────────────────
function fmtP(v) {
  if (v == null) return '—';
  if (v >= 1000) return '$' + v.toLocaleString('en', {maximumFractionDigits: 0});
  if (v >= 1)    return '$' + v.toFixed(2);
  if (v >= 0.01) return '$' + v.toFixed(4);
  return '$' + v.toFixed(6);
}
function fmtB(v) {
  if (!v) return '—';
  if (v >= 1e12) return '$' + (v/1e12).toFixed(2) + 'T';
  if (v >= 1e9)  return '$' + (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6)  return '$' + (v/1e6).toFixed(0) + 'M';
  return '$' + v.toLocaleString();
}
function fmtChg(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function fmtPShort(v) {
  if (v == null) return '—';
  if (v >= 1000) return '$' + (v/1000).toFixed(1) + 'k';
  return fmtP(v);
}

// ── SUPABASE + AUTH ──────────────────────────────────────
async function initAuth() {
  const { createClient } = supabase;
  sb = createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

  // Wait for Supabase to restore session from storage (handles PKCE + cookie flow)
  const session = await new Promise(resolve => {
    sb.auth.getSession().then(({ data }) => {
      if (data?.session) { resolve(data.session); return; }
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
        subscription.unsubscribe();
        resolve(s);
      });
      setTimeout(() => { subscription.unsubscribe(); resolve(null); }, 4000);
    });
  });

  if (!session?.user) { location.href = '/login?returnTo=/screener'; return false; }
  _session = session;
  const user = session.user;
  const { data: profile } = await sb.from('profiles').select('tg_chat_id,tg_linked,tg_notify_alerts,plan,full_name,avatar_url').eq('id', user.id).single();
  _tgProfile = profile || {};
  _userPlan = profile?.plan || 'free';
  _isPaid = (_userPlan === 'lifetime' || _userPlan === 'monthly' || _userPlan === 'admin' || _userPlan === 'owner');
  const initials = (profile?.full_name || user.email || 'U').slice(0, 1).toUpperCase();
  document.getElementById('tb-user').textContent = initials;
  return true;
}

async function doLogout() {
  await sb.auth.signOut();
  location.href = '/login';
}

// ── COIN DATA via /api/ticker ────────────────────────────
async function loadCoins() {
  try {
    const r = await fetch('/api/ticker?type=screener&per_page=80&sparkline=true&price_change_percentage=1h,7d,30d');
    if (!r.ok) throw new Error('ticker fail');
    const data = await r.json();
    if (!data?.length) throw new Error('empty');
    processCoins(data);
  } catch(e) {
    // Fallback to CoinGecko directly
    try {
      const url = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=80&page=1&sparkline=true&price_change_percentage=1h,7d,30d';
      const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
      const data = await r.json();
      processCoins(data);
    } catch(e2) {
      showState('table-wrap', 'Ошибка загрузки данных');
    }
  }
}

function processCoins(raw) {
  allCoins = raw.map(c => {
    const score  = computeAIScore(c);
    const signal = computeSignal(c, score);
    const setup  = computeSetup(c);
    const rsi    = computeRSI(c.sparkline_in_7d?.price || []);
    const volMult = c.market_cap > 0 ? +(c.total_volume / c.market_cap * 100).toFixed(1) : 0;
    return { ...c, _score: score, _signal: signal, _setup: setup, _rsi: rsi, _volMult: volMult };
  });

  buildSignals();
  renderTable();
  renderHeatmap();
  renderSignalFeed();
  updateMarketMetrics();
  loadSAScore();
  connectWS();
  setLive(true);
}

function buildSignals() {
  _signals = allCoins
    .filter(c => c._signal !== 'watch' && c._score >= 68)
    .sort((a, b) => b._score - a._score)
    .slice(0, 8);
  document.getElementById('mkt-sigs').textContent = _signals.length;
}

function connectWS() {
  if (_wsConn) { try { _wsConn.close(); } catch(e) {} }
  const streams = WS_SYMBOLS.map(s => s + '@miniTicker').join('/');
  try {
    _wsConn = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    _wsConn.onmessage = e => {
      const d = JSON.parse(e.data)?.data;
      if (!d) return;
      const sym = d.s?.toLowerCase();
      _wsMap[sym] = { price: parseFloat(d.c), chg24: parseFloat(d.P) };
      updateTickerItem(sym);
    };
    _wsConn.onerror = () => {};
    _wsConn.onclose = () => setTimeout(connectWS, 5000);
  } catch(e) {}
}

function updateTickerItem(sym) {
  const d = _wsMap[sym];

// ── SPARKLINE ─────────────────────────────────────────────
function drawSpark(prices, isUp, w = 72, h = 26) {
  if (!prices || prices.length < 2) return '<svg width="'+w+'" height="'+h+'"></svg>';
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const pts = prices.map((v, i) => {
    const x = (i / (prices.length - 1)) * w;
    const y = h - 2 - ((v - min) / range) * (h - 4);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });
  const color = isUp ? '#2ecc71' : '#e74c3c';
  const lp = pts[pts.length - 1].split(',');
  return `<svg width="${w}" height="${h}" style="display:block">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lp[0]}" cy="${lp[1]}" r="2" fill="${color}"/>
  </svg>`;
}

function drawDetailSpark(prices, isUp) {
  if (!prices || prices.length < 2) return '';
  const w = 268, h = 66;
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const pts = prices.map((v, i) => {
    const x = 4 + (i / (prices.length - 1)) * (w - 8);
    const y = 4 + (1 - (v - min) / range) * (h - 8);
    return x.toFixed(1) + ',' + y.toFixed(1);
  });
  const color = isUp ? '#2ecc71' : '#e74c3c';
  const lastPt = pts[pts.length - 1].split(',');
  const fillPts = pts.join(' ') + ` ${(w-4).toFixed(1)},${h} 4,${h}`;
  return `<svg width="${w}" height="${h}" style="display:block;overflow:visible">
    <defs><linearGradient id="dsg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${fillPts}" fill="url(#dsg)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="2.5" fill="${color}" stroke="var(--bg2)" stroke-width="1.5"/>
  </svg>`;
}

// ── TABLE ─────────────────────────────────────────────────
function getDisplayData() {
  let data = allCoins.slice();
  const q = _search.toLowerCase();
  if (q) data = data.filter(c => (c.symbol||'').toLowerCase().includes(q) || (c.name||'').toLowerCase().includes(q));
  if (_filter === 'long')    data = data.filter(c => c._signal === 'long');
  if (_filter === 'short')   data = data.filter(c => c._signal === 'short');
  if (_filter === 'watch')   data = data.filter(c => c._signal === 'watch');
  if (_filter === 'breakout') data = data.filter(c => c._setup.some(s => s.toLowerCase().includes('breakout')));
  if (_filter === 'reversal') data = data.filter(c => c._setup.some(s => s.toLowerCase().includes('reversal')));
  if (_filter === 'volume')   data = data.filter(c => c._setup.some(s => s.toLowerCase().includes('vol')));

  const key = _sort.key;
  data.sort((a, b) => {
    let va, vb;
    if (key === 'ai_score')    { va = a._score; vb = b._score; }
    else if (key === 'price')  { va = a.current_price; vb = b.current_price; }
    else if (key === 'chg')    { va = a.price_change_percentage_24h; vb = b.price_change_percentage_24h; }
    else if (key === 'vol')    { va = a.total_volume; vb = b.total_volume; }
    else if (key === 'rsi')    { va = a._rsi; vb = b._rsi; }
    else if (key === 'mcap')   { va = a.market_cap; vb = b.market_cap; }
    else if (key === 'signal') {
      const ord = {long:0, short:1, watch:2};
      va = ord[a._signal]||2; vb = ord[b._signal]||2;
    }
    else { va = a[key]||0; vb = b[key]||0; }
    if (_sort.dir === 'asc') return va > vb ? 1 : -1;
    return va < vb ? 1 : -1;
  });
  return data;
}

        <div class="level-item" style="border-left:2px solid var(--r)"><div class="level-lbl">Стоп-лосс</div><div class="level-val" style="color:var(--r)">${fmtPShort(lvl.sl)}</div></div>
        <div class="level-item" style="border-left:2px solid var(--g)"><div class="level-lbl">Тейк 1</div><div class="level-val" style="color:var(--g)">${fmtPShort(lvl.tp1)}</div></div>

        <div class="ind-row"><span class="ind-name">EMA 21/50</span><span class="ind-val ${emaDir==='bull'?'ind-bull':'ind-bear'}">${emaDir==='bull'?'Бычий':'Медвежий'}</span></div>
        <div class="ind-row"><span class="ind-name">MACD</span><span class="ind-val ${macdDir==='bull'?'ind-bull':'ind-bear'}">${macdDir==='bull'?'Бычий':'Медвежий'}</span></div>
        <div class="ind-row"><span class="ind-name">Объём/MCap</span><span class="ind-val ${c._volMult>=12?'ind-bull':c._volMult<4?'ind-bear':'ind-neut'}">${c._volMult}%</span></div>
        <div class="ind-row"><span class="ind-name">Тренд 7Д</span><span class="ind-val ${(c.price_change_percentage_7d_in_currency||0)>=0?'ind-bull':'ind-bear'}">${fmtChg(c.price_change_percentage_7d_in_currency)}</span></div>
        <div class="ind-row"><span class="ind-name">AI Score</span><span class="ind-val" style="color:${scoreColor}">${sc}/100</span></div>
      </div>
    </div>

    <button class="det-tg-btn" onclick="sendSignalTG()" id="det-tg-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      Отправить сигнал в Telegram
    </button>

    <button class="det-jnl-btn" onclick="openJournal()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="2.5" y="1.5" width="11" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 5.5h6M5 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Записать в журнал
    </button>
  `;

  // Load AI insight always
  loadAIInsight(c);
}

function renderAILocked() {
  return `<div class="ai-locked">
    <div class="ai-locked-title">AI ANALYSIS · LOCKED</div>
    <div class="ai-locked-blur">Сильный пробой с объёмом 2.4x выше среднего. Структура бычья, RSI на уровне 62 — есть пространство до перекупленности. Вход приоритетен на откате к EMA21.</div>
    <button class="ai-locked-btn" onclick="location.href='/pay'">UNLOCK PREMIUM →</button>
  </div>`;
}

async function loadAIInsight(c) {
  const slot = document.getElementById('dp-ai-content');
  if (!slot) return;

  const sym = (c.symbol||'').toUpperCase();
  // 5-min cache
  if (_aiCache[sym] && Date.now() - _aiCache[sym].ts < 300000) {
    slot.innerHTML = `<div class="det-ai-text">${_aiCache[sym].text}</div>`;
    return;
  }

  const chg24 = (c.price_change_percentage_24h || 0).toFixed(1);
  const chg7d  = (c.price_change_percentage_7d_in_currency || 0).toFixed(1);
  const rsi = c._rsi;
  const setup = c._setup.join(', ');

  try {
    const r = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: `Ты AI-аналитик крипторынка. Дай краткий торговый инсайт (2-3 предложения) по ${sym}/USDT. Цена: $${c.current_price}, 24ч: ${chg24>=0?'+':''}${chg24}%, 7д: ${chg7d>=0?'+':''}${chg7d}%, RSI: ${rsi}, от ATH: ${(c.ath_change_percentage||0).toFixed(0)}%, объём: ${fmtB(c.total_volume)}. Сетапы: ${setup||'—'}. Будь конкретным, профессиональным. Без markdown. На русском.`,
        max_tokens: 220,
        temperature: 0.28,
      })
    });
    const d = await r.json();
    const text = (d.text || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (text.length > 20) {
      _aiCache[sym] = { text, ts: Date.now() };
      if (slot) slot.innerHTML = `<div class="det-ai-text">${text}</div>`;
    }
  } catch(e) {
    if (slot) slot.innerHTML = `<div class="det-ai-text" style="color:var(--m2)">AI недоступен. Проверь подключение.</div>`;
  }
}

// ── TELEGRAM SIGNAL ───────────────────────────────────────
async function sendSignalTG() {
  if (!_tgProfile.tg_linked || !_tgProfile.tg_chat_id) {
    showToast('Telegram не подключён — настрой в профиле', 'err'); return;
  }
  const c = allCoins.find(x => x.id === _selectedSym);
  if (!c) return;

  const btn = document.getElementById('det-tg-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Отправляю...'; }

  const s = c._signal;
  const dir = s==='long'?'▲ LONG':'▼ SHORT';
  const lvl = computeKeyLevels(c);
  const sc = c._score;
  const chg24 = (c.price_change_percentage_24h||0).toFixed(2);
  const rsi = c._rsi;
  const setup = c._setup.join(', ') || '—';
  const scoreBar = '█'.repeat(Math.round(sc/10)) + '░'.repeat(10-Math.round(sc/10));

  const text =
    `🧠 <b>ORBITUM · AI СИГНАЛ</b>\n` +
    `━━━━━━━━━━━━━━━━━━\n` +
    `💰 <b>${(c.symbol||'').toUpperCase()}/USDT · ${dir}</b>\n\n` +
    `💵 Цена: <b>${fmtP(c.current_price)}</b> (${chg24>=0?'+':''}${chg24}% 24ч)\n` +
    `📥 Вход: <b>${fmtPShort(lvl.entry)}</b>\n` +
    `🛑 Стоп: <b>${fmtPShort(lvl.sl)}</b>\n` +
    `🎯 Тейк 1: <b>${fmtPShort(lvl.tp1)}</b>\n` +
    `🎯 Тейк 2: <b>${fmtPShort(lvl.tp2)}</b>\n` +
    `━━━━━━━━━━━━━━━━━━\n` +
    `📊 RSI: <b>${rsi}${rsi>=70?' ⚠️OB':rsi<=30?' ⚠️OS':''}</b>\n` +
    `🔍 Сетап: <i>${setup}</i>\n` +
    `━━━━━━━━━━━━━━━━━━\n` +
    `🤖 AI Score: <b>${sc}/100</b>\n` +
    `<code>${scoreBar}</code>\n\n` +
    `<i>orbitum.trade · Signal Screener</i>`;

  try {
    const { data: { session } } = await sb.auth.getSession();
    const r = await fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Notify-User': session?.user?.id || '' },
      body: JSON.stringify({ chat_id: _tgProfile.tg_chat_id, text, parse_mode: 'HTML' })
    });
    if (r.ok) {
      showToast('✓ Сигнал отправлен в Telegram', 'ok');
      playSignal();
    } else {
      showToast('Ошибка отправки', 'err');
    }
  } catch(e) {
    showToast('Ошибка: ' + e.message, 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Отправить сигнал в Telegram'; }
  }
}

function openJournal() {
  const c = allCoins.find(x => x.id === _selectedSym);
  if (!c) return;
  const p = new URLSearchParams({ symbol: (c.symbol||'').toUpperCase(), price: c.current_price });
  location.href = '/journal?' + p;
}

// ── MARKET METRICS ────────────────────────────────────────
async function updateMarketMetrics() {
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/global', { signal: AbortSignal.timeout(8000) });
    const d = (await r.json()).data;
    if (!d) return;
    document.getElementById('mkt-cap').textContent = fmtB(d.total_market_cap?.usd);
    document.getElementById('mkt-vol').textContent = fmtB(d.total_volume?.usd);
    const dom = d.market_cap_percentage?.btc?.toFixed(1);
    document.getElementById('mkt-dom').textContent = dom ? dom + '%' : '—';
    // FNG
    loadFNG();
  } catch(e) {}
}

async function loadFNG() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=1', { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    const val = parseInt(d?.data?.[0]?.value || 50);
    const label = d?.data?.[0]?.value_classification || 'Neutral';
    document.getElementById('fng-num').textContent = val;
    const labels = { 'Extreme Fear':'ЭКСТР. СТРАХ', 'Fear':'СТРАХ', 'Neutral':'НЕЙТРАЛЬНО', 'Greed':'ЖАДНОСТЬ', 'Extreme Greed':'ЭКСТР. ЖАДНОСТЬ' };
    document.getElementById('fng-lbl').textContent = labels[label] || label.toUpperCase();
    const color = val < 25 ? 'var(--r)' : val < 45 ? 'var(--y)' : val < 75 ? 'var(--g)' : 'var(--a)';
    document.getElementById('fng-num').style.color = color;
    document.getElementById('fng-needle').style.left = val + '%';
  } catch(e) {}
}

// ── SA SCORE ─────────────────────────────────────────────
async function loadSAScore() {
  try {
    const r = await fetch('/api/ticker?type=sa_score');
    if (!r.ok) return;
    const d = await r.json();
    const w = document.getElementById('sa-widget');
    const dot = document.getElementById('sa-dot');
    const val = document.getElementById('sa-val');
    if (!w || !val || !dot) return;
    val.textContent = d.score + ' · ' + d.label;
    val.style.color = d.color;
    dot.style.background = d.color;
    dot.style.boxShadow = `0 0 5px ${d.color}`;
    w.style.display = 'flex';
  } catch(e) {}
}

// ── SETUP BARS ───────────────────────────────────────────
function renderSetupBars() {
  const setups = [
    { name: 'Breakout', pct: 78, count: allCoins.filter(c=>c._setup.includes('Breakout')).length },
    { name: 'Vol Surge', pct: 85, count: allCoins.filter(c=>c._setup.some(s=>s.includes('Vol'))).length },
    { name: 'Reversal',  pct: 62, count: allCoins.filter(c=>c._setup.includes('Reversal')).length },
    { name: 'Trend',     pct: 71, count: allCoins.filter(c=>c._setup.includes('Trend')).length },
  ];
  document.getElementById('setup-bars').innerHTML = setups.map(s => `
    <div class="setup-bar-row">
      <div class="setup-bar-head">
        <span class="setup-bar-name">${s.name} <span style="color:var(--m3)">(${s.count})</span></span>
        <span class="setup-bar-acc">${s.pct}%</span>
      </div>
      <div class="setup-bar-track"><div class="setup-bar-fill" style="width:${s.pct}%"></div></div>
    </div>
  `).join('');
}

// ── CONTROLS ─────────────────────────────────────────────
function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  playClick();
  renderTable();
  renderHeatmap();
}

function applySearch(q) { _search = q; renderTable(); renderHeatmap(); }

function sortBy(key) {
  if (_sort.key === key) _sort.dir = _sort.dir === 'asc' ? 'desc' : 'asc';
  else _sort = { key, dir: 'desc' };
  renderTable();
}

function setView(v, btn) {
  _view = v;
  document.querySelectorAll('.vb').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.view-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

// ── THEME ────────────────────────────────────────────────
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('orb_scr_theme', next);
}

// ── SIDEBAR ───────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('main-sidebar');
  sb.classList.toggle('expanded');
  localStorage.setItem('orb_sb_exp', sb.classList.contains('expanded') ? '1' : '0');
}

// ── LIVE INDICATOR ────────────────────────────────────────
function setLive(on) {
  document.getElementById('live-badge').classList.toggle('live', on);
}

// ── STATE HELPER ─────────────────────────────────────────
function showState(wrapId, msg) {
  const wrap = document.getElementById(wrapId);
  if (wrap) wrap.innerHTML = `<div class="state-wrap"><div class="state-text">${msg}</div></div>`;
}

// ── TOAST ─────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const ic = document.getElementById('toast-ic');
  const txt = document.getElementById('toast-txt');
  txt.innerHTML = msg;
  ic.className = 'toast-ic' + (type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
  ic.textContent = type === 'ok' ? '✓' : type === 'err' ? '✕' : '⚡';
  t.className = 'toast show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3400);
}

// ── BOOT SEQUENCE ─────────────────────────────────────────
function runBoot() {
  const today = new Date().toDateString();
  if (localStorage.getItem('orb_scr_boot') === today) return;
  localStorage.setItem('orb_scr_boot', today);

  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:9997;background:#06080c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;font-family:var(--mono);pointer-events:none;animation:bootFadeOut .4s ease 3s forwards;';
  const style = document.createElement('style');
  style.textContent = '@keyframes bootFadeOut{to{opacity:0;pointer-events:none;}}';
  document.head.appendChild(style);

  [
    { t:'ORBITUM SIGNAL SCREENER',    c:'rgba(232,114,42,.9)', s:'13px', ls:'5px', d:0 },
    { t:'──────────────────────────', c:'rgba(255,255,255,.07)', s:'10px', ls:'1px', d:200 },
    { t:'▸ CONNECTING MARKET DATA',   c:'rgba(232,228,220,.3)', s:'9px', ls:'2px', d:400 },
    { t:'▸ LOADING AI SIGNAL ENGINE', c:'rgba(232,228,220,.3)', s:'9px', ls:'2px', d:700 },
    { t:'▸ FETCHING COIN UNIVERSE',   c:'rgba(232,228,220,.3)', s:'9px', ls:'2px', d:1000 },
    { t:'▸ CALIBRATING SCORES',       c:'rgba(232,228,220,.3)', s:'9px', ls:'2px', d:1300 },
    { t:'──────────────────────────', c:'rgba(255,255,255,.07)', s:'10px', ls:'1px', d:1600 },
    { t:'● SYSTEM READY',             c:'#2ecc71',             s:'10px', ls:'3px', d:1800 },
  ].forEach(({ t, c, s, ls, d }) => {
    const el = document.createElement('div');
    el.textContent = t;
    el.style.cssText = `color:${c};font-size:${s};letter-spacing:${ls};margin:2px 0;opacity:0;transition:opacity .28s;`;
    setTimeout(() => { el.style.opacity = '1'; }, d);
    ov.appendChild(el);
  });

  document.body.appendChild(ov);
  setTimeout(() => ov.remove(), 3500);
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  _selectedSym = null;
  renderTable();
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if ((e.key === 'f' || e.key === 'а') && !e.ctrlKey && !e.metaKey) {
    const inp = document.getElementById('search-inp');
    if (document.activeElement !== inp) { e.preventDefault(); inp?.focus(); }
  }
});

// ── INIT ──────────────────────────────────────────────────
async function init() {
  // Restore prefs
  const savedTheme = localStorage.getItem('orb_scr_theme');
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  if (localStorage.getItem('orb_sb_exp') === '1') document.getElementById('main-sidebar')?.classList.add('expanded');
  document.getElementById('sound-btn').classList.toggle('on', _soundEnabled);

  // Boot animation
  runBoot();

  // Auth
  const ok = await initAuth();
  if (!ok) return;

  // Data
  await loadCoins();
  renderTicker();
  renderSetupBars();

  // Auto-refresh every 90s
  setInterval(async () => {
    await loadCoins();
    renderSetupBars();
  }, 90000);
}

// ── Wait for Supabase then init ───────────────────────────
function waitAndInit() {
  if (typeof supabase !== 'undefined') { init(); return; }
  const t = setInterval(() => { if (typeof supabase !== 'undefined') { clearInterval(t); init(); } }, 100);
  setTimeout(() => { clearInterval(t); if (typeof supabase === 'undefined') { document.getElementById('table-wrap').innerHTML = '<div class="state-wrap"><div class="state-text" style="color:var(--r)">Supabase не загружен. Проверь блокировщик рекламы.</div></div>'; } }, 8000);
}
document.addEventListener('DOMContentLoaded', waitAndInit);
</script>
