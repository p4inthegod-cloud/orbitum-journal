<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM · AI Разбор</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script>window.addEventListener('DOMContentLoaded',function(){if(typeof supabase==='undefined'){var s=document.createElement('script');s.src='https://unpkg.com/@supabase/supabase-js@2';document.head.appendChild(s);}});</script>
<style>
:root {
  --bg:   #0d0d0d;
  --bg2:  #0c0f15;
  --bg3:  #111520;
  --bg4:  #161b28;
  --bd:   rgba(255,255,255,0.06);
  --bd2:  rgba(255,255,255,0.11);
  --t:    #e8e4dc;
  --m:    rgba(232,228,220,0.50);
  --m2:   rgba(232,228,220,0.24);
  --m3:   rgba(232,228,220,0.10);
  --a: #FF3923;
  --a2:   rgba(255,57,35,0.10);
  --a3:   rgba(255,57,35,0.28);
  --g:    #2ecc71;
  --g2:   rgba(46,204,113,0.10);
  --r:    #e74c3c;
  --r2:   rgba(231,76,60,0.10);
  --y:    #f0c040;
  --mono: 'DM Mono', 'JetBrains Mono', monospace;
  --disp: 'Bebas Neue', sans-serif;
}
[data-theme="light"] {
  --bg:#f0f1f4;--bg2:#fff;--bg3:#e8eaef;--bg4:#dde0e8;
  --bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.13);
  --t:#141820;--m:rgba(20,24,32,.6);--m2:rgba(20,24,32,.3);--m3:rgba(20,24,32,.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--t);font-family:var(--mono);min-height:100vh;}
button{cursor:pointer;font-family:var(--mono);}

/* ── TOPBAR ── */
.topbar{
  height:48px;background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:12px;padding:0 20px;position:sticky;top:0;z-index:100;
}
.tb-back{
  display:flex;align-items:center;gap:6px;
  color:var(--m);font-size:10px;letter-spacing:1px;text-decoration:none;
  padding:5px 10px;border:1px solid var(--bd);border-radius:5px;
  transition:all .15s;
}
.tb-back:hover{color:var(--t);border-color:var(--bd2);}
.tb-logo{font-family:var(--disp);font-size:16px;letter-spacing:4px;color:var(--a);}
.tb-title{font-size:9px;letter-spacing:3px;color:var(--m2);text-transform:uppercase;}
.tb-spacer{flex:1;}
.tb-trade-sel{
  height:28px;padding:0 10px;background:var(--bg3);border:1px solid var(--bd);
  border-radius:5px;color:var(--t);font-size:10px;font-family:var(--mono);
  outline:none;cursor:pointer;
}

/* ── LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:320px 1fr;
  min-height:calc(100vh - 48px);
}

/* ── LEFT: Trade Selector ── */
.trades-panel{
  border-right:1px solid var(--bd);background:var(--bg2);
  display:flex;flex-direction:column;overflow:hidden;
  position:sticky;top:48px;height:calc(100vh - 48px);
}
.tp-header{
  padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.tp-label{font-size:8px;letter-spacing:2.5px;color:var(--m2);text-transform:uppercase;margin-bottom:10px;}
.tp-search{
  width:100%;height:28px;background:var(--bg3);border:1px solid var(--bd);
  border-radius:5px;color:var(--t);font-size:10px;padding:0 9px;
  outline:none;font-family:var(--mono);transition:border-color .15s;
}
.tp-search:focus{border-color:var(--a3);}
.tp-search::placeholder{color:var(--m2);}
.tp-filters{display:flex;gap:4px;margin-top:8px;}
.tp-flt{
  flex:1;height:22px;border:1px solid var(--bd);border-radius:4px;
  background:transparent;color:var(--m2);font-size:8px;letter-spacing:.5px;
  text-transform:uppercase;transition:all .12s;
}
.tp-flt:hover{color:var(--m);}
.tp-flt.active{background:var(--a2);border-color:var(--a3);color:var(--a);}

.trades-list{flex:1;overflow-y:auto;padding:8px;}
.trades-list::-webkit-scrollbar{width:3px;}
.trades-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* Trade card in list */
.tc{
  background:var(--bg3);border:1px solid var(--bd);border-radius:7px;
  padding:10px 12px;margin-bottom:5px;cursor:pointer;
  transition:all .13s;position:relative;overflow:hidden;
}
.tc::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
}
.tc.win::before{background:var(--g);}
.tc.loss::before{background:var(--r);}
.tc.be::before{background:var(--y);}
.tc:hover{border-color:var(--bd2);transform:translateX(2px);}
.tc.selected{background:var(--a2);border-color:var(--a3);}
.tc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.tc-pair{font-family:var(--disp);font-size:14px;letter-spacing:.5px;flex:1;}
.tc-dir{font-size:7px;letter-spacing:1.5px;padding:2px 6px;border-radius:3px;font-weight:600;}
.dir-long{background:var(--g2);color:var(--g);}
.dir-short{background:var(--r2);color:var(--r);}
.tc-pnl{font-size:11px;font-weight:600;}
.tc-meta{display:flex;justify-content:space-between;align-items:center;}
.tc-setup{font-size:8px;color:var(--m2);letter-spacing:.5px;}
.tc-date{font-size:7px;color:var(--m3);}
.tc-has-ai{
  position:absolute;top:8px;right:8px;
  width:16px;height:16px;border-radius:50%;
  background:var(--a2);border:1px solid var(--a3);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;
}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;height:200px;
  color:var(--m2);font-size:9px;letter-spacing:2px;text-align:center;
}

/* ── RIGHT: AI Analysis ── */
.analysis-panel{padding:24px;overflow-y:auto;}
.analysis-panel::-webkit-scrollbar{width:4px;}
.analysis-panel::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* Empty analysis */
.analysis-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:60vh;gap:14px;
}
.ae-icon{font-family:var(--disp);font-size:52px;color:var(--bd2);letter-spacing:4px;}
.ae-txt{font-size:9px;letter-spacing:2px;color:var(--m2);text-align:center;line-height:2;}

/* Trade summary header */
.trade-header{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:16px 20px;margin-bottom:16px;
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;
}
.th-left{}
.th-pair{font-family:var(--disp);font-size:28px;letter-spacing:2px;}
.th-sub{font-size:8px;color:var(--m2);letter-spacing:1.5px;margin-top:3px;}
.th-metrics{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;}
.th-m{display:flex;flex-direction:column;gap:2px;}
.th-m-lbl{font-size:7px;letter-spacing:1.5px;color:var(--m2);text-transform:uppercase;}
.th-m-val{font-size:13px;font-weight:500;}
.th-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.th-result{
  font-family:var(--disp);font-size:24px;letter-spacing:1px;
}
.th-pnl{font-size:13px;}
.th-date{font-size:8px;color:var(--m2);}

/* ── AI SECTION ── */
.ai-section{margin-bottom:16px;}
.sec-head{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.sec-icon{
  width:20px;height:20px;border-radius:5px;
  background:var(--a2);border:1px solid var(--a3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;
}
.sec-title{font-size:8px;letter-spacing:2.5px;color:var(--a);text-transform:uppercase;}
.sec-badge{
  margin-left:auto;font-size:7px;letter-spacing:1px;
  padding:2px 7px;border-radius:3px;border:1px solid var(--bd);color:var(--m2);
}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cards-grid.single{grid-template-columns:1fr;}
.cards-grid.triple{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:1100px){.cards-grid.triple{grid-template-columns:1fr 1fr;}}

.acard{
  border-radius:8px;padding:12px 14px;
  border-left:2px solid transparent;
  transition:all .15s;
}
.acard.ok    {background:rgba(46,204,113,.06); border-left-color:var(--g);}
.acard.warn  {background:rgba(240,192,64,.06);  border-left-color:var(--y);}
.acard.danger{background:rgba(231,76,60,.06);   border-left-color:var(--r);}
.acard.info  {background:rgba(232,114,42,.06);  border-left-color:var(--a);}
.acard.neutral{background:var(--bg3);           border-left-color:var(--bd2);}
.acard:hover{transform:translateX(2px);}

.acard-icon{font-size:14px;margin-bottom:6px;display:block;}
.acard-text{font-size:10px;color:var(--m);line-height:1.7;}
.acard-text strong{color:var(--t);font-weight:500;}

/* Verdict block */
.verdict-block{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:16px 20px;margin-bottom:8px;
  display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center;
}
.verdict-score{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  min-width:80px;
}
.vs-num{font-family:var(--disp);font-size:48px;letter-spacing:1px;line-height:1;}
.vs-label{font-size:7px;letter-spacing:2px;color:var(--m2);text-transform:uppercase;}
.vs-bar{width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:4px;}
.vs-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.verdict-text{font-size:11px;color:var(--m);line-height:1.8;}
.verdict-text strong{color:var(--t);font-weight:500;display:block;margin-bottom:4px;font-size:12px;}

/* Pattern recognition */
.pattern-block{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:16px 20px;margin-bottom:8px;
}
.pb-title{font-size:9px;letter-spacing:2px;color:var(--a);margin-bottom:12px;text-transform:uppercase;}
.pb-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.pb-tag{
  font-size:8px;letter-spacing:1px;padding:3px 9px;border-radius:3px;
  text-transform:uppercase;
}
.tag-ok    {background:var(--g2);color:var(--g);border:1px solid rgba(46,204,113,.2);}
.tag-warn  {background:var(--y2, rgba(240,192,64,.1));color:var(--y);border:1px solid rgba(240,192,64,.2);}
.tag-err   {background:var(--r2);color:var(--r);border:1px solid rgba(231,76,60,.2);}
.tag-neutral{background:var(--m3);color:var(--m2);border:1px solid var(--bd);}
.pb-rows{}
.pb-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--bd);
}
.pb-row:last-child{border-bottom:none;}
.pb-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.pb-content{flex:1;}
.pb-pattern{font-size:10px;color:var(--t);margin-bottom:2px;}
.pb-evidence{font-size:9px;color:var(--m2);line-height:1.5;}
.pb-action{
  font-size:8px;letter-spacing:.5px;color:var(--a);margin-top:4px;
  padding:3px 8px;border:1px solid var(--a3);border-radius:3px;
  display:inline-block;background:var(--a2);
}
.pb-impact{font-size:8px;color:var(--m2);flex-shrink:0;margin-top:4px;}

/* Improvement plan */
.improve-block{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:16px 20px;margin-bottom:8px;
}
.improve-steps{counter-reset:steps;}
.improve-step{
  display:flex;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--bd);align-items:flex-start;
}
.improve-step:last-child{border-bottom:none;}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--a2);border:1px solid var(--a3);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--a);flex-shrink:0;font-weight:600;
}
.step-content{}
.step-title{font-size:10px;color:var(--t);margin-bottom:3px;font-weight:500;}
.step-desc{font-size:9px;color:var(--m);line-height:1.6;}

/* Comparison block */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.compare-card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;
}
.cc-title{font-size:8px;letter-spacing:2px;color:var(--m2);text-transform:uppercase;margin-bottom:10px;}
.cc-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);}
.cc-stat:last-child{border-bottom:none;}
.cc-stat-name{font-size:9px;color:var(--m2);}
.cc-stat-val{font-size:10px;color:var(--t);font-weight:500;}

/* Emotion analysis */
.emotion-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.em-card{
  flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:8px;padding:12px 14px;
}
.em-label{font-size:7px;letter-spacing:2px;color:var(--m2);text-transform:uppercase;margin-bottom:7px;}
.em-bar-wrap{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.em-bar-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.em-val-row{display:flex;justify-content:space-between;align-items:center;}
.em-score{font-family:var(--disp);font-size:18px;letter-spacing:.5px;}
.em-status{font-size:8px;color:var(--m2);}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:5px;}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-line{height:12px;margin-bottom:8px;}
.sk-line.sm{height:9px;width:60%;}
.sk-line.lg{height:16px;width:40%;}
.sk-card{height:80px;border-radius:8px;margin-bottom:8px;}

/* AI loading dots */
.ai-thinking{
  display:flex;align-items:center;gap:8px;padding:16px;
  background:var(--bg3);border:1px solid var(--bd);border-radius:8px;
  font-size:9px;color:var(--m2);letter-spacing:1.5px;
}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--a);animation:aiD 1.2s ease-in-out infinite;}
.ai-dot:nth-child(2){animation-delay:.2s;}
.ai-dot:nth-child(3){animation-delay:.4s;}
@keyframes aiD{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Analyze button */
.btn-analyze{
  width:100%;padding:14px;margin-bottom:16px;
  background:var(--a2);border:1px solid var(--a3);border-radius:8px;
  color:var(--a);font-size:9px;letter-spacing:2px;text-transform:uppercase;
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-analyze:hover{background:var(--a3);color:var(--t);}
.btn-analyze:disabled{opacity:.35;cursor:not-allowed;}

/* Re-analyze */
.btn-reanalyze{
  padding:6px 14px;background:transparent;border:1px solid var(--bd);
  border-radius:5px;color:var(--m2);font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;transition:all .15s;margin-left:auto;
}
.btn-reanalyze:hover{border-color:var(--a3);color:var(--a);}

/* Section separator */
.sep{height:1px;background:var(--bd);margin:16px 0;}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;z-index:1000;
  background:var(--bg3);border:1px solid var(--a3);border-radius:8px;
  padding:10px 14px;font-size:10px;color:var(--t);
  transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}

/* Stats strip at top of analysis */
.stats-strip{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px;
}
.ss-item{
  background:var(--bg2);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;
}
.ss-lbl{font-size:7px;letter-spacing:1.5px;color:var(--m2);text-transform:uppercase;margin-bottom:4px;}
.ss-val{font-family:var(--disp);font-size:18px;letter-spacing:.5px;}

/* up/dn */
.up{color:var(--g);}.dn{color:var(--r);}.neu{color:var(--y);}
</style>
</head>
<body>

<div class="topbar">
  <a href="/journal" class="tb-back">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2L4 6l4 4"/></svg>
    Журнал
  </a>
  <div class="tb-logo">ORBITUM</div>
  <div class="tb-title">AI Разбор сделок</div>
  <div class="tb-spacer"></div>
  <div id="tb-stats" style="font-size:9px;color:var(--m2);letter-spacing:1px;"></div>
</div>

<div class="layout">

  <!-- ── LEFT: Trade List ── -->
  <div class="trades-panel">
    <div class="tp-header">
      <div class="tp-label">Сделки</div>
      <input class="tp-search" type="text" placeholder="Поиск по паре..." id="tp-search" oninput="filterTrades(this.value)">
      <div class="tp-filters">
        <button class="tp-flt active" onclick="setTpFilter('all',this)">Все</button>
        <button class="tp-flt" onclick="setTpFilter('win',this)" style="color:var(--g)">Профит</button>
        <button class="tp-flt" onclick="setTpFilter('loss',this)" style="color:var(--r)">Убыток</button>
        <button class="tp-flt" onclick="setTpFilter('no-ai',this)">Без AI</button>
      </div>
    </div>
    <div class="trades-list" id="trades-list">
      <div class="empty-state">
        <div class="skeleton" style="width:120px;height:10px;"></div>
        <div class="skeleton" style="width:80px;height:8px;"></div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Analysis ── -->
  <div class="analysis-panel" id="analysis-panel">
    <div class="analysis-empty" id="analysis-empty">
      <div class="ae-icon">⊙</div>
      <div class="ae-txt">Выбери сделку<br>для AI-разбора</div>
    </div>
    <div id="analysis-content" style="display:none;"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════
   ORBITUM AI JOURNAL — Trade Analysis Engine
   API: /api/ai (mode: coach), Supabase trades table
══════════════════════════════════════════════════ */

const SB_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';

let sb, allTrades = [], filteredTrades = [], selectedTrade = null;
let _aiCache = {}, _tpFilter = 'all', _search = '';

// ── INIT ────────────────────────────────────────
async function init() {
  const { createClient } = supabase;
  sb = createClient(SB_URL, SB_KEY, { auth: { persistSession: true, autoRefreshToken: true } });

  const session = await new Promise(resolve => {
    sb.auth.getSession().then(({ data }) => {
      if (data?.session) { resolve(data.session); return; }
      const { data: { subscription } } = sb.auth.onAuthStateChange((_, s) => {
        subscription.unsubscribe(); resolve(s);
      });
      setTimeout(() => { subscription.unsubscribe(); resolve(null); }, 4000);
    });
  });

  if (!session?.user) { location.href = '/login?returnTo=/ai-journal'; return; }

  await loadTrades(session.user.id);

  // Auto-select trade from URL param
  const params = new URLSearchParams(location.search);
  const tradeId = params.get('trade');
  if (tradeId) {
    const t = allTrades.find(x => x.id === tradeId);
    if (t) selectTrade(t);
  }
}

// ── LOAD TRADES ─────────────────────────────────
async function loadTrades(userId) {
  const { data, error } = await sb
    .from('trades')
    .select('*')
    .eq('user_id', userId)
    .order('created_at', { ascending: false })
    .limit(200);

  if (error || !data) { showToast('Ошибка загрузки сделок'); return; }
  allTrades = data;

  // Stats
  const wins = data.filter(t => t.result === 'win').length;
  const wr = data.length ? Math.round(wins / data.length * 100) : 0;
  const pnl = data.reduce((s, t) => s + (t.pnl_pct || 0), 0);
  const aiDone = data.filter(t => _aiCache[t.id]).length;
  document.getElementById('tb-stats').textContent =
    `${data.length} сделок · WR ${wr}% · P&L ${pnl >= 0 ? '+' : ''}${pnl.toFixed(1)}%`;

  renderTradeList();
}

// ── RENDER TRADE LIST ────────────────────────────
function renderTradeList() {
  const q = _search.toLowerCase();
  filteredTrades = allTrades.filter(t => {
    if (q && !(t.pair || '').toLowerCase().includes(q)) return false;
    if (_tpFilter === 'win')   return t.result === 'win';
    if (_tpFilter === 'loss')  return t.result === 'loss';
    if (_tpFilter === 'no-ai') return !_aiCache[t.id];
    return true;
  });

  const list = document.getElementById('trades-list');
  if (!filteredTrades.length) {
    list.innerHTML = '<div class="empty-state"><div>Нет сделок</div></div>';
    return;
  }

  list.innerHTML = filteredTrades.map(t => {
    const isWin = t.result === 'win';
    const isLoss = t.result === 'loss';
    const pnl = t.pnl_pct != null ? (t.pnl_pct >= 0 ? '+' : '') + t.pnl_pct.toFixed(1) + '%' : '—';
    const pnlColor = isWin ? 'var(--g)' : isLoss ? 'var(--r)' : 'var(--y)';
    const date = new Date(t.created_at).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
    const hasAI = !!_aiCache[t.id];
    const isSelected = selectedTrade?.id === t.id;
    return `<div class="tc ${t.result||'be'} ${isSelected ? 'selected' : ''}" onclick="selectTrade(${JSON.stringify(t).replace(/"/g, '&quot;')})">
      ${hasAI ? '<div class="tc-has-ai">⚡</div>' : ''}
      <div class="tc-top">
        <div class="tc-pair">${t.pair || '—'}</div>
        <span class="tc-dir ${t.direction === 'long' ? 'dir-long' : 'dir-short'}">${(t.direction || 'long').toUpperCase()}</span>
        <span class="tc-pnl" style="color:${pnlColor}">${pnl}</span>
      </div>
      <div class="tc-meta">
        <span class="tc-setup">${t.setup_type || '—'}</span>
        <span class="tc-date">${date}</span>
      </div>
    </div>`;
  }).join('');
}

// ── SELECT TRADE ─────────────────────────────────
function selectTrade(t) {
  if (typeof t === 'string') t = JSON.parse(t);
  selectedTrade = t;
  renderTradeList(); // update selected state
  showTradeAnalysis(t);
}

// ── SHOW TRADE ANALYSIS ──────────────────────────
function showTradeAnalysis(t) {
  document.getElementById('analysis-empty').style.display = 'none';
  const content = document.getElementById('analysis-content');
  content.style.display = 'block';

  const isWin  = t.result === 'win';
  const isLoss = t.result === 'loss';
  const pnlColor = isWin ? 'var(--g)' : isLoss ? 'var(--r)' : 'var(--y)';
  const pnl = t.pnl_pct != null ? (t.pnl_pct >= 0 ? '+' : '') + t.pnl_pct.toFixed(1) + '%' : '—';
  const pnlUsd = t.pnl_usd != null ? (t.pnl_usd >= 0 ? '+$' : '-$') + Math.abs(t.pnl_usd).toFixed(0) : '—';
  const rr = t.entry_price && t.stop_price && t.exit_price
    ? Math.abs((t.exit_price - t.entry_price) / (t.entry_price - t.stop_price)).toFixed(2)
    : '—';
  const date = new Date(t.created_at).toLocaleString('ru-RU', { day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' });

  // Emotion scores
  const conf  = t.emotion_conf  || 5;
  const fear  = t.emotion_fear  || 3;
  const greed = t.emotion_greed || 3;
  const calm  = t.emotion_calm  || 7;

  const cached = _aiCache[t.id];

  content.innerHTML = `
    <!-- TRADE HEADER -->
    <div class="trade-header">
      <div class="th-left">
        <div class="th-pair">${t.pair || '—'}</div>
        <div class="th-sub">${(t.direction || 'LONG').toUpperCase()} · ${t.setup_type || 'Без сетапа'} · ${date}</div>
        <div class="th-metrics">
          ${t.entry_price ? `<div class="th-m"><div class="th-m-lbl">Вход</div><div class="th-m-val">$${t.entry_price}</div></div>` : ''}
          ${t.stop_price  ? `<div class="th-m"><div class="th-m-lbl">Стоп</div><div class="th-m-val" style="color:var(--r)">$${t.stop_price}</div></div>` : ''}
          ${t.exit_price  ? `<div class="th-m"><div class="th-m-lbl">Выход</div><div class="th-m-val">$${t.exit_price}</div></div>` : ''}
          ${rr !== '—'   ? `<div class="th-m"><div class="th-m-lbl">R:R</div><div class="th-m-val" style="color:var(--a)">1:${rr}</div></div>` : ''}
          ${t.pnl_usd != null ? `<div class="th-m"><div class="th-m-lbl">P&L $</div><div class="th-m-val" style="color:${pnlColor}">${pnlUsd}</div></div>` : ''}
        </div>
      </div>
      <div class="th-right">
        <div class="th-result" style="color:${pnlColor}">${isWin ? 'ПРОФИТ' : isLoss ? 'УБЫТОК' : 'BE'}</div>
        <div class="th-pnl" style="color:${pnlColor}">${pnl}</div>
        <div class="th-date">${date}</div>
      </div>
    </div>

    <!-- EMOTION ANALYSIS -->
    <div class="ai-section">
      <div class="sec-head">
        <div class="sec-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2C5.8 2 4 3.8 4 6c0 1 .4 2 1 2.7V14h6V8.7c.6-.7 1-1.7 1-2.7 0-2.2-1.8-4-4-4z" stroke="currentColor" stroke-width="1.3" fill="rgba(255,57,35,0.08)"/><path d="M6 6c0-.5.3-1 .8-1.2M8 2v2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg></div>
        <div class="sec-title">Эмоциональный профиль</div>
      </div>
      <div class="emotion-row">
        ${buildEmCard('Уверенность', conf, 10, conf>=7?'var(--g)':conf>=4?'var(--y)':'var(--r)', conf>=7?'Высокая':conf>=4?'Норма':'Низкая')}
        ${buildEmCard('Страх', fear, 10, fear>=7?'var(--r)':fear>=4?'var(--y)':'var(--g)', fear>=7?'Высокий':fear>=4?'Умеренный':'Спокойно')}
        ${buildEmCard('Жадность', greed, 10, greed>=7?'var(--r)':greed>=4?'var(--y)':'var(--g)', greed>=7?'Высокая':greed>=4?'Умеренная':'Под контролем')}
        ${buildEmCard('Фокус', calm, 10, calm>=7?'var(--g)':calm>=4?'var(--y)':'var(--r)', calm>=7?'В потоке':calm>=4?'Норма':'Рассеян')}
      </div>
    </div>

    <!-- AI ANALYSIS -->
    <div class="ai-section">
      <div class="sec-head">
        <div class="sec-icon">⚡</div>
        <div class="sec-title">AI Разбор сделки</div>
        ${cached ? `<button class="btn-reanalyze" onclick="runAnalysis(true)">↻ Пересчитать</button>` : ''}
      </div>
      <div id="ai-content">
        ${cached ? renderCachedAnalysis(cached, t) : renderAnalysisPrompt(t)}
      </div>
    </div>

    <!-- NOTES -->
    ${(t.note_why || t.note_feel || t.note_lesson) ? `
    <div class="ai-section">
      <div class="sec-head"><div class="sec-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M5.5 6h5M5.5 8.5h5M5.5 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></div><div class="sec-title">Заметки</div></div>
      <div class="cards-grid">
        ${t.note_why    ? `<div class="acard neutral"><div class="acard-text"><strong>Почему вошёл</strong>${escHtml(t.note_why)}</div></div>` : ''}
        ${t.note_feel   ? `<div class="acard neutral"><div class="acard-text"><strong>Эмоции / ошибки</strong>${escHtml(t.note_feel)}</div></div>` : ''}
        ${t.note_lesson ? `<div class="acard info"><div class="acard-text"><strong>Урок</strong>${escHtml(t.note_lesson)}</div></div>` : ''}
      </div>
    </div>` : ''}
  `;
}

function buildEmCard(label, val, max, color, status) {
  const pct = Math.round(val / max * 100);
  return `<div class="em-card">
    <div class="em-label">${label}</div>
    <div class="em-bar-wrap"><div class="em-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="em-val-row">
      <div class="em-score" style="color:${color}">${val}</div>
      <div class="em-status">${status}</div>
    </div>
  </div>`;
}

function renderAnalysisPrompt(t) {
  return `<button class="btn-analyze" onclick="runAnalysis(false)" id="btn-analyze">
    <span>⚡</span> Запустить AI-разбор этой сделки
  </button>
  <div style="font-size:9px;color:var(--m2);text-align:center;letter-spacing:1px;margin-top:-8px;">
    Анализ паттернов · Ошибки · Рекомендации · План улучшений
  </div>`;
}

function renderCachedAnalysis(cached, t) {
  return renderFullAnalysis(cached, t);
}

// ── RUN AI ANALYSIS ──────────────────────────────
async function runAnalysis(force = false) {
  if (!selectedTrade) return;
  const t = selectedTrade;

  if (!force && _aiCache[t.id]) {
    const slot = document.getElementById('ai-content');
    if (slot) slot.innerHTML = renderFullAnalysis(_aiCache[t.id], t);
    return;
  }

  const slot = document.getElementById('ai-content');
  if (!slot) return;

  slot.innerHTML = `<div class="ai-thinking">
    <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
    <span>AI анализирует сделку...</span>
  </div>`;

  // Get context: last 20 trades for pattern comparison
  const recentTrades = allTrades.slice(0, 20);
  const pairTrades   = allTrades.filter(x => x.pair === t.pair).slice(0, 10);

  // Build context string
  const ctx = {
    trade: {
      pair:        t.pair,
      direction:   t.direction,
      result:      t.result,
      pnl_pct:     t.pnl_pct,
      pnl_usd:     t.pnl_usd,
      entry_price: t.entry_price,
      stop_price:  t.stop_price,
      exit_price:  t.exit_price,
      setup_type:  t.setup_type,
      emotion_conf:  t.emotion_conf,
      emotion_fear:  t.emotion_fear,
      emotion_greed: t.emotion_greed,
      emotion_calm:  t.emotion_calm,
      note_why:    t.note_why,
      note_feel:   t.note_feel,
      note_lesson: t.note_lesson,
    },
    pair_stats: pairTrades.length > 1 ? {
      total: pairTrades.length,
      wr: Math.round(pairTrades.filter(x => x.result === 'win').length / pairTrades.length * 100),
      avg_pnl: (pairTrades.reduce((s, x) => s + (x.pnl_pct || 0), 0) / pairTrades.length).toFixed(1),
    } : null,
    overall_stats: {
      total:    recentTrades.length,
      wr:       Math.round(recentTrades.filter(x => x.result === 'win').length / recentTrades.length * 100),
      avg_pnl:  (recentTrades.reduce((s, x) => s + (x.pnl_pct || 0), 0) / recentTrades.length).toFixed(1),
    }
  };

  const prompt = `Ты — опытный AI-коуч трейдера ICT/SMC. Проведи детальный разбор конкретной сделки.

СДЕЛКА:
${JSON.stringify(ctx.trade, null, 2)}

СТАТИСТИКА ПО ПАРЕ ${t.pair || ''}:
${ctx.pair_stats ? JSON.stringify(ctx.pair_stats) : 'недостаточно данных'}

ОБЩАЯ СТАТИСТИКА (последние ${ctx.overall_stats.total} сделок):
WR: ${ctx.overall_stats.wr}% | Средний P&L: ${ctx.overall_stats.avg_pnl}%

ВЕРНИ ТОЛЬКО валидный JSON объект (без markdown) со следующими полями:

{
  "score": число 0-100 (общая оценка качества сделки),
  "verdict": "2-3 предложения — итоговый вердикт по сделке с конкретными числами",
  "what_worked": ["до 3 пунктов — что было сделано правильно"],
  "what_failed": ["до 3 пунктов — конкретные ошибки с доказательствами"],
  "emotion_verdict": "1 предложение — оценка эмоционального состояния",
  "pattern": "название паттерна или 'нет паттерна'",
  "risk_assessment": "оценка управления риском",
  "next_steps": [
    {"step": "название шага", "desc": "конкретное действие"},
    {"step": "название шага", "desc": "конкретное действие"},
    {"step": "название шага", "desc": "конкретное действие"}
  ],
  "tags": [{"text": "тег до 15 символов", "type": "ok|warn|err|neutral"}]
}

Требования: конкретные числа из данных, на русском, профессионально.`;

  try {
    const r = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, max_tokens: 1000, temperature: 0.2 })
    });
    const d = await r.json();
    let raw = d.text || '';

    // Strip markdown fences if present
    raw = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();

    let analysis;
    try {
      analysis = JSON.parse(raw);
    } catch(e) {
      // Try to extract JSON from response
      const match = raw.match(/\{[\s\S]+\}/);
      if (match) analysis = JSON.parse(match[0]);
      else throw new Error('Bad JSON');
    }

    _aiCache[t.id] = analysis;
    renderTradeList(); // update AI badge

    if (slot) slot.innerHTML = renderFullAnalysis(analysis, t);
    showToast('✓ AI-разбор готов');

  } catch(e) {
    if (slot) slot.innerHTML = `
      <div class="acard danger">
        <div class="acard-text">Ошибка AI-анализа: ${escHtml(e.message)}. Попробуй ещё раз.</div>
      </div>
      ${renderAnalysisPrompt(t)}
    `;
  }
}

// ── RENDER FULL ANALYSIS ─────────────────────────
function renderFullAnalysis(a, t) {
  const score = a.score || 50;
  const scoreColor = score >= 75 ? 'var(--g)' : score >= 50 ? 'var(--y)' : 'var(--r)';

  // Verdict block
  const verdictHtml = `
    <div class="verdict-block">
      <div class="verdict-score">
        <div class="vs-num" style="color:${scoreColor}">${score}</div>
        <div class="vs-label">Оценка</div>
        <div class="vs-bar"><div class="vs-bar-fill" style="width:${score}%;background:${scoreColor}"></div></div>
      </div>
      <div class="verdict-text">
        <strong>Вердикт</strong>
        ${escHtml(a.verdict || '—')}
        ${a.emotion_verdict ? `<br><br><em style="color:var(--m2);font-size:9px;">${escHtml(a.emotion_verdict)}</em>` : ''}
      </div>
    </div>`;

  // Tags
  const tagsHtml = a.tags?.length ? `
    <div class="pattern-block">
      <div class="pb-title">Теги сделки</div>
      <div class="pb-tags">
        ${a.tags.map(tg => `<span class="pb-tag tag-${tg.type || 'neutral'}">${escHtml(tg.text)}</span>`).join('')}
      </div>
      ${a.pattern ? `<div style="font-size:9px;color:var(--m2);margin-top:4px;">Паттерн: <span style="color:var(--t)">${escHtml(a.pattern)}</span></div>` : ''}
      ${a.risk_assessment ? `<div style="font-size:9px;color:var(--m2);margin-top:4px;">Риск: <span style="color:var(--t)">${escHtml(a.risk_assessment)}</span></div>` : ''}
    </div>` : '';

  // What worked / failed
  const workedHtml = (a.what_worked?.length || a.what_failed?.length) ? `
    <div class="compare-grid">
      ${a.what_worked?.length ? `
      <div class="compare-card">
        <div class="cc-title" style="color:var(--g)">✓ Что сработало</div>
        ${a.what_worked.map(w => `<div class="cc-stat"><span class="cc-stat-name" style="font-size:10px;color:var(--m)">${escHtml(w)}</span></div>`).join('')}
      </div>` : ''}
      ${a.what_failed?.length ? `
      <div class="compare-card">
        <div class="cc-title" style="color:var(--r)">✗ Ошибки</div>
        ${a.what_failed.map(w => `<div class="cc-stat"><span class="cc-stat-name" style="font-size:10px;color:var(--m)">${escHtml(w)}</span></div>`).join('')}
      </div>` : ''}
    </div>` : '';

  // Next steps
  const stepsHtml = a.next_steps?.length ? `
    <div class="improve-block">
      <div class="pb-title">План улучшений</div>
      <div class="improve-steps">
        ${a.next_steps.map((s, i) => `
          <div class="improve-step">
            <div class="step-num">${i + 1}</div>
            <div class="step-content">
              <div class="step-title">${escHtml(s.step || '')}</div>
              <div class="step-desc">${escHtml(s.desc || '')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return verdictHtml + tagsHtml + workedHtml + stepsHtml +
    `<button class="btn-analyze" onclick="runAnalysis(true)" style="margin-top:8px;opacity:.6;">
      ↻ Пересчитать анализ
    </button>`;
}

// ── FILTERS ──────────────────────────────────────
function setTpFilter(f, btn) {
  _tpFilter = f;
  document.querySelectorAll('.tp-flt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTradeList();
}

function filterTrades(q) {
  _search = q;
  renderTradeList();
}

// ── HELPERS ──────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _toastT;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(_toastT);
  _toastT = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── WAIT FOR SUPABASE ────────────────────────────
function waitAndInit() {
  if (typeof supabase !== 'undefined') { init(); return; }
  const t = setInterval(() => { if (typeof supabase !== 'undefined') { clearInterval(t); init(); } }, 100);
  setTimeout(() => clearInterval(t), 8000);
}
document.addEventListener('DOMContentLoaded', waitAndInit);
</script>
</body>
</html>
