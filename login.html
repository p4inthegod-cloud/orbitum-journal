<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ORBITUM · Sign In</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--bg2:#111111;--bg3:#161616;--bg4:#1c1c1c;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--bd3:rgba(255,255,255,0.2);
  --t:#ffffff;--m:rgba(255,255,255,0.55);--m2:rgba(255,255,255,0.28);
  --fire:#FF3923;--fire2:rgba(255,57,35,0.1);--fire3:rgba(255,57,35,0.28);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;--rad:10px;
}
html,body{min-height:100%;background:var(--bg);color:var(--t);font-family:var(--font);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}

/* ambient glow */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 45% at 20% 15%,rgba(255,57,35,0.06) 0%,transparent 65%),
    radial-gradient(ellipse 45% 55% at 80% 85%,rgba(255,57,35,0.04) 0%,transparent 65%);
}
/* noise */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px;opacity:0.4;
}

/* grid bg */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 100%);
}

/* topbar */
.topbar{
  position:relative;z-index:10;
  height:52px;background:rgba(7,7,7,0.96);
  border-bottom:1px solid rgba(255,57,35,0.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;padding:0 32px;gap:10px;
}
.tb-logo{
  font-weight:800;font-size:14px;letter-spacing:4px;
  color:var(--t);text-transform:uppercase;text-decoration:none;
  position:relative;
}
.tb-logo::after{
  content:'';display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--fire);margin-left:3px;
  box-shadow:0 0 6px rgba(255,57,35,0.8);
  vertical-align:super;font-size:6px;
}
.tb-back{
  margin-left:auto;height:26px;padding:0 12px;border-radius:6px;
  border:1px solid var(--bd);background:transparent;
  color:var(--m);font-family:var(--mono);font-size:10px;
  letter-spacing:.5px;cursor:pointer;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;transition:all .15s;
}
.tb-back:hover{color:var(--t);border-color:var(--bd2);}

/* page layout */
.page{
  min-height:calc(100vh - 52px);
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;position:relative;z-index:1;
}

/* card */
.card{
  width:100%;max-width:400px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,57,35,0.12);
  border-radius:20px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:40px 36px;
  box-shadow:0 40px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,57,35,0.06),inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
  animation:cardIn .5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.card::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,57,35,0.7) 30%,rgba(255,57,35,0.9) 50%,rgba(255,57,35,0.7) 70%,transparent);
}

/* tabs */
.card-tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:28px;}
.card-tab{
  flex:1;padding:10px 0;
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--m2);background:transparent;border:none;border-bottom:1px solid transparent;
  cursor:pointer;transition:all .2s;margin-bottom:-1px;
}
.card-tab.active{color:var(--fire);border-bottom-color:var(--fire);}
.card-tab:hover:not(.active){color:var(--m);}

.card-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--t);margin-bottom:4px;}
.card-sub{font-family:var(--mono);font-size:10px;color:var(--m2);letter-spacing:.5px;margin-bottom:24px;}

/* fields */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--m);letter-spacing:.5px;margin-bottom:6px;}
.field input{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid var(--bd);border-radius:8px;
  color:var(--t);font-family:var(--font);font-size:14px;
  padding:12px 14px;outline:none;transition:all .18s;
}
.field input:focus{
  border-color:rgba(255,57,35,0.45);
  background:rgba(255,57,35,0.05);
  box-shadow:0 0 0 3px rgba(255,57,35,0.1);
}
.field input::placeholder{color:var(--m2);}

/* submit */
.btn-submit{
  width:100%;height:46px;margin-top:6px;border-radius:var(--rad);
  background:var(--fire);color:#fff;border:1px solid var(--fire);
  font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(255,57,35,0.4);
  transition:all .2s;cursor:pointer;
}
.btn-submit:hover{background:#ff4d38;box-shadow:0 6px 28px rgba(255,57,35,0.6);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* divider */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd);}
.divider span{font-family:var(--mono);font-size:9px;color:var(--m2);letter-spacing:1px;}

/* ghost btn */
.btn-ghost{
  width:100%;height:40px;border-radius:var(--rad);
  border:1px solid var(--bd2);background:rgba(255,255,255,0.03);
  color:var(--m);font-family:var(--font);font-size:11px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.btn-ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--t);background:rgba(255,255,255,0.05);}

/* messages */
.msg{border-radius:8px;padding:10px 13px;font-family:var(--mono);font-size:11px;margin-bottom:14px;display:none;}
.msg.err{background:rgba(255,57,35,0.1);border:1px solid rgba(255,57,35,0.25);color:#ff8070;}
.msg.ok{background:rgba(255,255,255,0.05);border:1px solid var(--bd2);color:var(--m);}

/* footer link */
.card-footer{text-align:center;margin-top:18px;font-size:11px;color:var(--m2);}
.card-footer a{color:var(--fire);text-decoration:none;font-weight:600;}
.card-footer a:hover{text-decoration:underline;}

/* panel toggle */
.panel{display:none;}
.panel.active{display:block;}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="topbar">
  <a href="/" class="tb-logo">ORBITUM</a>
  <a href="/" class="tb-back">← На главную</a>
</div>

<div class="page">
  <div class="card">
    <div class="card-tabs">
      <button class="card-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="card-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>

    <div class="msg err" id="err-msg"></div>
    <div class="msg ok" id="ok-msg"></div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">Войти →</button>
      <div class="divider"><span>или</span></div>
      <button class="btn-ghost" onclick="doMagicLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        Войти по magic link
      </button>
      <div class="card-footer">Нет аккаунта? <a href="#" onclick="switchTab('register');return false">Создать бесплатно</a></div>
    </div>

    <!-- REGISTER -->
    <div class="panel" id="panel-register">
      <div class="field">
        <label>Имя / Никнейм</label>
        <input type="text" id="reg-name" placeholder="Твоё имя" autocomplete="name">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль <span style="color:var(--m2);font-size:9px">мин. 8 символов</span></label>
        <input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn-submit" id="btn-reg" onclick="doRegister()">Создать аккаунт →</button>
      <div class="card-footer">Уже есть аккаунт? <a href="#" onclick="switchTab('login');return false">Войти</a></div>
    </div>

    <!-- MAGIC LINK -->
    <div class="panel" id="panel-magic">
      <div class="field">
        <label>Email</label>
        <input type="email" id="magic-email" placeholder="you@example.com">
      </div>
      <button class="btn-submit" onclick="sendMagic()">Отправить magic link →</button>
      <div class="card-footer"><a href="#" onclick="switchTab('login');return false">← Назад</a></div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
let sb;

function initSB(){
  if(typeof supabase==='undefined'){setTimeout(initSB,100);return;}
  sb=supabase.createClient(SB_URL,SB_KEY);
  sb.auth.getSession().then(({data:{session}})=>{if(session)location.href='/journal';});
}
initSB();

function switchTab(t){
  ['login','register','magic'].forEach(id=>{
    document.getElementById('panel-'+id).classList.toggle('active',id===t);
  });
  ['login','register'].forEach(id=>{
    const el=document.getElementById('tab-'+id);
    if(el)el.classList.toggle('active',id===t);
  });
  clearMsgs();
}

function showErr(msg){const el=document.getElementById('err-msg');el.textContent=msg;el.style.display='block';document.getElementById('ok-msg').style.display='none';}
function showOk(msg){const el=document.getElementById('ok-msg');el.textContent=msg;el.style.display='block';document.getElementById('err-msg').style.display='none';}
function clearMsgs(){document.getElementById('err-msg').style.display='none';document.getElementById('ok-msg').style.display='none';}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!email||!pass){showErr('Заполни email и пароль');return;}
  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Входим...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr(error.message);btn.disabled=false;btn.textContent='Войти →';}
  else location.href='/journal';
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  if(!name||!email||!pass){showErr('Заполни все поля');return;}
  if(pass.length<8){showErr('Пароль минимум 8 символов');return;}
  const btn=document.getElementById('btn-reg');
  btn.disabled=true;btn.textContent='Создаём...';
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,username:name.toLowerCase().replace(/\s+/g,'_')}}});
  if(error){showErr(error.message);btn.disabled=false;btn.textContent='Создать аккаунт →';return;}
  if(data.user){
    await sb.from('profiles').upsert({id:data.user.id,email,full_name:name,username:name.toLowerCase().replace(/\s+/g,'_'),role:'user',plan:'free',created_at:new Date().toISOString()},{onConflict:'id',ignoreDuplicates:true});
  }
  if(data.session){showOk('Аккаунт создан! Переходим...');setTimeout(()=>location.href='/journal',1000);}
  else{showOk('Аккаунт создан! Проверь почту для подтверждения.');btn.disabled=false;btn.textContent='Создать аккаунт →';}
}

function doMagicLink(){
  document.getElementById('magic-email').value=document.getElementById('login-email').value;
  ['login','register','magic'].forEach(id=>document.getElementById('panel-'+id).classList.toggle('active',id==='magic'));
  clearMsgs();
}

async function sendMagic(){
  const email=document.getElementById('magic-email').value.trim();
  if(!email){showErr('Введи email');return;}
  const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+'/journal'}});
  if(error)showErr(error.message);
  else showOk('Magic link отправлен — проверь почту.');
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const active=document.querySelector('.panel.active');
  if(!active)return;
  if(active.id==='panel-login')doLogin();
  else if(active.id==='panel-register')doRegister();
  else sendMagic();
});
</script>
</body>
</html>
