<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ORBITUM · Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#161616;--bg2:#1c1c1c;--bg3:#222222;--bg4:#282828;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);
  --t:#ffffff;--m:rgba(255,255,255,0.55);--m2:rgba(255,255,255,0.28);
  --fire:#FF3923;--fire2:rgba(255,57,35,0.12);--fire3:rgba(255,57,35,0.28);
  --font:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--font);-webkit-font-smoothing:antialiased;}

/* Ghost topbar */
.topbar{height:48px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;position:relative;overflow:hidden;}
.logo{font-weight:800;font-size:15px;letter-spacing:4px;color:var(--fire);text-transform:uppercase;position:relative;z-index:2;}





4%{opacity:.75;}92%{opacity:.75;}100%{left:-8%;opacity:0;}}

/* Page */
.page{min-height:calc(100vh - 48px);display:flex;align-items:center;justify-content:center;padding:24px;}

.card{
  width:100%;max-width:380px;
  background:var(--bg2);
  border:1px solid var(--bd2);
  border-radius:16px;
  padding:36px 32px;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}

.card-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--t);margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--m2);margin-bottom:28px;font-weight:400;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--m);letter-spacing:0.5px;margin-bottom:6px;}
.field input{
  width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;
  color:var(--t);font-family:var(--font);font-size:13px;font-weight:500;
  padding:11px 14px;outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--fire3);}
.field input::placeholder{color:var(--m2);}

.btn-primary{
  width:100%;height:44px;margin-top:4px;border-radius:8px;
  border:1px solid rgba(255,57,35,0.5);
  background:linear-gradient(135deg,rgba(255,57,35,0.18) 0%,rgba(255,57,35,0.08) 100%);
  backdrop-filter:blur(8px);
  color:var(--fire);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 0 20px rgba(255,57,35,0.2),inset 0 1px 0 rgba(255,255,255,0.07);
  transition:all .2s;cursor:pointer;position:relative;overflow:hidden;
animation:btnBreathe 2.4s ease-in-out infinite;}


.btn-primary:hover{background:linear-gradient(135deg,rgba(255,57,35,0.3) 0%,rgba(255,57,35,0.15) 100%);box-shadow:0 0 30px rgba(255,57,35,0.4);color:#ff6b5b;border-color:rgba(255,57,35,.9);}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd);}
.divider span{font-size:10px;color:var(--m2);letter-spacing:1px;}

.btn-ghost{
  width:100%;height:40px;border-radius:8px;border:1px solid var(--bd2);
  background:transparent;color:var(--m);font-family:var(--font);font-size:11px;
  font-weight:600;letter-spacing:0.5px;transition:all .15s;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-ghost:hover{border-color:var(--bd3);color:var(--t);}
.btn-ghost svg{flex-shrink:0;}

.footer-link{text-align:center;margin-top:20px;font-size:11px;color:var(--m2);}
.footer-link a{color:var(--fire);text-decoration:none;font-weight:600;}
.footer-link a:hover{text-decoration:underline;}

.error-msg{background:rgba(255,57,35,0.1);border:1px solid rgba(255,57,35,0.25);border-radius:6px;padding:9px 12px;font-size:11px;color:#ff8070;margin-bottom:14px;display:none;}
.success-msg{background:rgba(255,255,255,0.06);border:1px solid var(--bd2);border-radius:6px;padding:9px 12px;font-size:11px;color:var(--m);margin-bottom:14px;display:none;}
@keyframes btnBreathe{
  0%,100%{box-shadow:0 0 14px rgba(255,57,35,0.18),inset 0 1px 0 rgba(255,255,255,0.07);}
  50%{box-shadow:0 0 28px rgba(255,57,35,0.42),inset 0 1px 0 rgba(255,255,255,0.1);}
}
</style>
</head>
<body>

<div class="topbar">
  </div>
  </div>
  <div class="logo">ORBITUM</div>
</div>

<div class="page">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>

    <div class="error-msg" id="err-msg"></div>
    <div class="success-msg" id="ok-msg"></div>

    <div id="form-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>

      <div class="divider"><span>or</span></div>

      <button class="btn-ghost" onclick="doMagicLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        Continue with magic link
      </button>

      <div class="footer-link">
        No account? <a href="/register">Create one free</a>
      </div>
    </div>

    <div id="form-magic" style="display:none;">
      <div class="field">
        <label>Email</label>
        <input type="email" id="magic-email" placeholder="you@example.com">
      </div>
      <button class="btn-primary" onclick="sendMagic()">Send magic link</button>
      <div class="footer-link" style="margin-top:16px;">
        <a href="#" onclick="showLogin()">← Back to login</a>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
let sb;

function initSB() {
  if (typeof supabase === 'undefined') { setTimeout(initSB, 100); return; }
  sb = supabase.createClient(SB_URL, SB_KEY);
  // Check existing session
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) location.href = '/journal';
  });
}
initSB();

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('ok-msg').style.display = 'none';
}
function showOk(msg) {
  const el = document.getElementById('ok-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('err-msg').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  if (!email || !pass) { showErr('Fill in email and password'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Sign In'; }
  else location.href = '/journal';
}

function doMagicLink() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-magic').style.display = 'block';
  document.getElementById('magic-email').value = document.getElementById('email').value;
}
function showLogin() {
  document.getElementById('form-magic').style.display = 'none';
  document.getElementById('form-login').style.display = 'block';
}

async function sendMagic() {
  const email = document.getElementById('magic-email').value.trim();
  if (!email) { showErr('Enter your email'); return; }
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin + '/journal' } });
  if (error) showErr(error.message);
  else showOk('Magic link sent — check your inbox.');
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('form-login').style.display !== 'none') doLogin();
    else sendMagic();
  }
});
</script>
</body>
</html>
