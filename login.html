<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBITUM — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--o:#e86c2a;--od:rgba(232,108,42,0.15);--og:rgba(232,108,42,0.4);--bg:#080808;--bg2:#0f0f0f;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);--t:#e8e4dc;--m:rgba(232,228,220,0.45);--m2:rgba(232,228,220,0.22);--g:#2ecc71;--r:#e74c3c;--mono:'DM Mono',monospace;}
html,body{height:100%;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-weight:300;overflow:hidden;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0;opacity:0.5;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 100%);pointer-events:none;z-index:0;}
.bg-glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(232,108,42,.07),transparent 70%);pointer-events:none;z-index:0;}
.card{width:420px;position:relative;z-index:1;animation:fadeUp .6s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.card-logo{text-align:center;margin-bottom:40px;}
.logo-mark{display:flex;align-items:center;justify-content:center;gap:10px;}
.logo-text{font-family:'Bebas Neue',cursive;font-size:26px;font-weight:400;letter-spacing:5px;color:rgba(255,255,255,0.92);display:inline-block;}
.card-subtitle{font-family:var(--mono);font-size:10px;color:var(--m2);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:32px;}
.tab{flex:1;padding:10px 0;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--m2);background:transparent;border:none;cursor:pointer;transition:all .25s;position:relative;}
.tab.active{color:var(--o);}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--o);}
.field{margin-bottom:18px;}
.field label{display:block;font-family:var(--mono);font-size:9px;color:var(--m2);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.field input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);padding:10px 0;color:var(--t);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .25s;}
.field input::placeholder{color:var(--m2);}
.field input:focus{border-bottom-color:var(--o);}
.btn-submit{width:100%;padding:14px;background:transparent;border:1px solid var(--o);color:var(--o);font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .25s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{background:var(--o);color:#080808;}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:16px;margin:20px 0;font-family:var(--mono);font-size:9px;color:var(--m2);letter-spacing:1px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line);}
.btn-google{width:100%;padding:12px;background:transparent;border:1px solid var(--line2);color:var(--m);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-google:hover{border-color:rgba(232,108,42,.35);color:var(--o);}
.btn-demo{width:100%;padding:10px;background:transparent;border:none;color:var(--m2);font-family:var(--mono);font-size:9px;letter-spacing:1px;cursor:pointer;transition:color .2s;text-transform:uppercase;margin-top:8px;}
.btn-demo:hover{color:var(--m);}
.msg{font-family:var(--mono);font-size:10px;text-align:center;margin-top:12px;padding:10px;display:none;}
.msg.err{color:var(--r);border:1px solid rgba(231,76,60,.2);background:rgba(231,76,60,.04);}
.msg.ok{color:var(--g);border:1px solid rgba(46,204,113,.2);background:rgba(46,204,113,.04);}
.back-link{display:block;text-align:center;margin-top:28px;font-family:var(--mono);font-size:9px;color:var(--m2);letter-spacing:1px;text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--m);}
.panel{display:none;}
.panel.active{display:block;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="card-logo">
    <div class="logo-mark">
      <svg width="24" height="24" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="3.2" fill="#e8722a"/>
        <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="#e8722a" stroke-width="1.2" opacity="0.6" transform="rotate(-30 11 11)"/>
        <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="rgba(255,255,255,0.2)" stroke-width="1" transform="rotate(60 11 11)"/>
      </svg>
      <div class="logo-text">ORBITUM</div>
    </div>
    <div class="card-subtitle" id="card-subtitle">Welcome back</div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>
  <!-- LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="you@mail.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">Sign In <span>→</span></button>
    <div class="msg" id="l-msg"></div>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button class="btn-demo" onclick="tryDemo()">Try Demo without registration</button>
  </div>
  <!-- REGISTER -->
  <div class="panel" id="panel-register">
    <div class="field"><label>Name / Nickname</label><input type="text" id="r-name" placeholder="Your Name" autocomplete="name"/></div>
    <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="you@mail.com" autocomplete="email"/></div>
    <div class="field"><label>Password <span style="color:var(--m2);font-size:8px;">min 8 chars</span></label><input type="password" id="r-pass" placeholder="••••••••" autocomplete="new-password"/></div>
    <button class="btn-submit" id="btn-reg" onclick="doRegister()">Create Account <span>→</span></button>
    <div class="msg" id="r-msg"></div>
    <div class="divider">or</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>
  </div>
  <a href="/" class="back-link">← Back to site</a>
</div>
<script>
const SUPABASE_URL='https://kgutmsosfyyxnlnhucaa.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
const _returnTo=new URLSearchParams(window.location.search).get('returnTo')||'';
function _getRedirect(role){if(_returnTo&&_returnTo.startsWith('/'))return _returnTo;return role==='admin'?'/admin':'/cabinet';}
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session){const{data:p}=await sb.from('profiles').select('role').eq('id',session.user.id).single();window.location.href=_getRedirect(p?.role);}})();
const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get('tab')==='register')switchTab('register');
function switchTab(t){document.getElementById('tab-login').classList.toggle('active',t==='login');document.getElementById('tab-register').classList.toggle('active',t==='register');document.getElementById('panel-login').classList.toggle('active',t==='login');document.getElementById('panel-register').classList.toggle('active',t==='register');document.getElementById('card-subtitle').textContent=t==='login'?'Welcome back':'Create your account';}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';}
async function doLogin(){const email=document.getElementById('l-email').value.trim();const pass=document.getElementById('l-pass').value;if(!email||!pass){showMsg('l-msg','Fill in all fields','err');return;}const btn=document.getElementById('btn-login');if(btn._busy)return;btn._busy=true;btn.disabled=true;btn.textContent='Signing in...';const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error){showMsg('l-msg','Wrong email or password','err');btn.disabled=false;btn._busy=false;btn.innerHTML='Sign In <span>→</span>';return;}const{data:p}=await sb.from('profiles').select('role').eq('id',data.user.id).single();window.location.href=_getRedirect(p?.role);}
async function doRegister(){const name=document.getElementById('r-name').value.trim();const email=document.getElementById('r-email').value.trim();const pass=document.getElementById('r-pass').value;if(!name||!email||!pass){showMsg('r-msg','Fill in all fields','err');return;}if(pass.length<8){showMsg('r-msg','Password must be at least 8 characters','err');return;}const btn=document.getElementById('btn-reg');btn.disabled=true;btn.textContent='Creating...';const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name,username:name.toLowerCase().replace(/\s+/g,'_')}}});if(error){showMsg('r-msg',error.message,'err');btn.disabled=false;btn.innerHTML='Create Account <span>→</span>';return;}if(data.user){await sb.from('profiles').upsert({id:data.user.id,email,full_name:name,username:name.toLowerCase().replace(/\s+/g,'_'),role:'user',plan:'free',created_at:new Date().toISOString()},{onConflict:'id',ignoreDuplicates:true});}if(data.session){showMsg('r-msg','Account created! Redirecting...','ok');setTimeout(()=>window.location.href='/cabinet',1200);}else{showMsg('r-msg','Account created! Check your email to confirm, then sign in.','ok');btn.disabled=false;btn.innerHTML='Create Account <span>→</span>';setTimeout(()=>switchTab('login'),3000);}}
async function signInWithGoogle(){const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://orbitum.trade/cabinet'}});if(error)showMsg('l-msg',error.message,'err');}
function tryDemo(){localStorage.setItem('orb_demo_mode','1');window.location.href='/journal?demo=1';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('panel-login').classList.contains('active'))doLogin();else doRegister();}});
</script>
</body>
</html>
