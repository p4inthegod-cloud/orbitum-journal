<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ORBITUM · Login</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--bg2:#111111;--bg3:#161616;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);
  --t:#ffffff;--m:rgba(255,255,255,0.55);--m2:rgba(255,255,255,0.28);
  --fire:#FF3923;--fire2:rgba(255,57,35,0.12);--fire3:rgba(255,57,35,0.28);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'Fira Code',monospace;
}
html,body{min-height:100%;background:var(--bg);color:var(--t);font-family:var(--font);-webkit-font-smoothing:antialiased;}

/* Subtle ambient bg */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(255,57,35,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 80%, rgba(255,57,35,0.04) 0%, transparent 60%);
}

/* Topbar — original simple style */
.topbar{
  height:48px;background:#0a0a0a;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 24px;
  position:relative;z-index:10;
}
.logo{
  font-weight:800;font-size:15px;letter-spacing:4px;
  color:var(--fire);text-transform:uppercase;
}

/* Page */
.page{
  min-height:calc(100vh - 48px);display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;z-index:1;
}

/* Card */
.card{
  width:100%;max-width:390px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,57,35,0.12);border-radius:16px;
  backdrop-filter:blur(20px);
  padding:38px 34px;
  box-shadow:0 32px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(255,57,35,0.08),inset 0 1px 0 rgba(255,255,255,0.04);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,57,35,0.7) 30%,rgba(255,57,35,0.9) 50%,rgba(255,57,35,0.7) 70%,transparent);
}

.card-title{font-family:'Bebas Neue',sans-serif;font-size:28px;font-weight:400;letter-spacing:3px;color:var(--t);margin-bottom:6px;}
.card-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--m2);letter-spacing:0.5px;margin-bottom:28px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--m);letter-spacing:0.5px;margin-bottom:6px;}
.field input{
  width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:8px;
  color:var(--t);font-family:var(--font);font-size:14px;font-weight:400;
  padding:12px 14px;outline:none;transition:all .18s;
}
.field input:focus{border-color:rgba(252,53,3,0.5);background:rgba(252,53,3,0.06);box-shadow:0 0 0 3px rgba(252,53,3,0.1);}
.field input::placeholder{color:var(--m2);}

.btn-primary{
  width:100%;height:46px;margin-top:4px;border-radius:8px;
  border:1px solid rgba(255,57,35,0.8);
  background:linear-gradient(135deg,#FF3923,#cc2a18);
  color:#fff;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(255,57,35,0.35);
  transition:all .2s;cursor:pointer;position:relative;overflow:hidden;
}
.btn-primary:hover{
  background:linear-gradient(135deg,#ff4d38,#d62d1a);
  box-shadow:0 6px 28px rgba(255,57,35,0.55);transform:translateY(-1px);
}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;}
@keyframes btnBreathe{
  0%,100%{box-shadow:0 0 12px rgba(252,53,3,0.15),inset 0 1px 0 rgba(255,255,255,0.07);}
  50%{box-shadow:0 0 28px rgba(252,53,3,0.42),inset 0 1px 0 rgba(255,255,255,0.1);}
}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd);}
.divider span{font-size:10px;color:var(--m2);letter-spacing:1px;}

.btn-ghost{
  width:100%;height:40px;border-radius:8px;border:1px solid var(--bd2);
  background:rgba(255,255,255,0.03);color:var(--m);font-family:var(--font);font-size:11px;
  font-weight:600;letter-spacing:0.5px;transition:all .15s;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--t);background:rgba(255,255,255,0.05);}

.footer-link{text-align:center;margin-top:20px;font-size:11px;color:var(--m2);}
.footer-link a{color:var(--fire);text-decoration:none;font-weight:500;border-bottom:1px solid rgba(255,57,35,0.3);}
.footer-link a:hover{text-decoration:underline;}

.error-msg{background:rgba(252,53,3,0.1);border:1px solid rgba(252,53,3,0.25);border-radius:6px;padding:9px 12px;font-size:11px;color:#ff8070;margin-bottom:14px;display:none;}
.success-msg{background:rgba(255,255,255,0.06);border:1px solid var(--bd2);border-radius:6px;padding:9px 12px;font-size:11px;color:var(--m);margin-bottom:14px;display:none;}
</style>
</head>
<body>

<div class="topbar" style="border-bottom:1px solid rgba(255,57,35,0.12);">
  <svg width="18" height="18" viewBox="0 0 22 22" fill="none" style="flex-shrink:0">
    <circle cx="11" cy="11" r="3.2" fill="#FF3923"/>
    <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="#FF3923" stroke-width="1.2" opacity="0.7" transform="rotate(-30 11 11)" fill="none"/>
    <ellipse cx="11" cy="11" rx="9" ry="4.5" stroke="rgba(255,255,255,0.25)" stroke-width="1" transform="rotate(60 11 11)" fill="none"/>
  </svg>
  <div class="logo" style="font-family:'Bebas Neue',sans-serif;letter-spacing:4px;font-weight:400">ORBITUM</div>
</div>

<div class="page">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to continue to your journal</div>

    <div class="error-msg" id="err-msg"></div>
    <div class="success-msg" id="ok-msg"></div>

    <div id="form-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>

      <div class="divider"><span>or</span></div>

      <button class="btn-ghost" onclick="doMagicLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
        Continue with magic link
      </button>

      <div class="footer-link">
        No account? <a href="/register">Create one free</a>
      </div>
    </div>

    <div id="form-magic" style="display:none;">
      <div class="field">
        <label>Email</label>
        <input type="email" id="magic-email" placeholder="you@example.com">
      </div>
      <button class="btn-primary" onclick="sendMagic()">Send magic link</button>
      <div class="footer-link" style="margin-top:16px;">
        <a href="#" onclick="showLogin()">← Back to login</a>
      </div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://kgutmsosfyyxnlnhucaa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtndXRtc29zZnl5eG5sbmh1Y2FhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Njk2NTMsImV4cCI6MjA4ODQ0NTY1M30.yDPTEkhCvVNpLjSSUqEqD_UTR5N0IeZKtkLCNpW7W_Q';
let sb;
function initSB(){
  if(typeof supabase==='undefined'){setTimeout(initSB,100);return;}
  sb=supabase.createClient(SB_URL,SB_KEY);
  sb.auth.getSession().then(({data:{session}})=>{if(session)location.href='/journal';});
}
initSB();
function showErr(msg){const el=document.getElementById('err-msg');el.textContent=msg;el.style.display='block';document.getElementById('ok-msg').style.display='none';}
function showOk(msg){const el=document.getElementById('ok-msg');el.textContent=msg;el.style.display='block';document.getElementById('err-msg').style.display='none';}
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!email||!pass){showErr('Fill in email and password');return;}
  const btn=document.getElementById('btn-login');
  btn.disabled=true;btn.textContent='Signing in...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr(error.message);btn.disabled=false;btn.textContent='Sign In';}
  else location.href='/journal';
}
function doMagicLink(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-magic').style.display='block';
  document.getElementById('magic-email').value=document.getElementById('email').value;
}
function showLogin(){
  document.getElementById('form-magic').style.display='none';
  document.getElementById('form-login').style.display='block';
}
async function sendMagic(){
  const email=document.getElementById('magic-email').value.trim();
  if(!email){showErr('Enter your email');return;}
  const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+'/journal'}});
  if(error)showErr(error.message);
  else showOk('Magic link sent — check your inbox.');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('form-login').style.display!=='none')doLogin();
    else sendMagic();
  }
});
</script>
</body>
</html>
